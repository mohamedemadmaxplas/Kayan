// ==================== PAGE: POINTS & EVALUATION (النقاط والتقييم) ====================

function renderPointsEvaluationPage() {
    const container = document.getElementById(isAdmin ? 'adminPageContent' : 'leaderPageContent');
    if (!container) return;
    
    // تحديد نوع المستخدم لعرض البيانات الصحيحة
    let availableSubBranches = [];
    let availableSquads = [];
    
    if (isAdmin) {
        availableSubBranches = [...appData.subBranches];
        availableSquads = [...appData.squads];
    } else if (isLeader) {
        const mySubBranchIds = currentUser.subBranchIds || [];
        availableSubBranches = appData.subBranches.filter(sb => mySubBranchIds.includes(sb.id));
        const myBranchIds = [...new Set(availableSubBranches.map(sb => sb.branchId))];
        availableSquads = appData.squads.filter(s => myBranchIds.includes(s.branchId));
    }
    
    // جمع المراحل (أنواع الطلايع) الفريدة
    const squadTypes = [...new Set(appData.squads.map(s => s.type).filter(t => t))];
    const squadTypeNames = {
        'الكشافة': '⚜️ الكشافة',
        'المرشدات': '🌸 المرشدات',
        'أشبال وزهرات': '🦁🌸 أشبال وزهرات',
        'البراعم': '🌱 البراعم'
    };
    
    // بناء خيارات الهيئات
    let subBranchesHtml = '<option value="all">🌍 جميع الهيئات</option>';
    availableSubBranches.forEach(sb => {
        subBranchesHtml += `<option value="${sb.id}">📍 ${sb.name}</option>`;
    });
    
    // بناء خيارات الطلايع
    let squadsHtml = '<option value="all">🏴 جميع الطلايع</option>';
    availableSquads.forEach(s => {
        squadsHtml += `<option value="${s.id}">🏴 ${s.name} (${s.type || 'كشافة'})</option>`;
    });
    
    // بناء خيارات المراحل
    let typesHtml = '<option value="all">🎯 جميع المراحل</option>';
    squadTypes.forEach(type => {
        typesHtml += `<option value="${type}">${squadTypeNames[type] || type}</option>`;
    });
    
    container.innerHTML = `
        <div class="card">
            <h3><i class="fas fa-star"></i> النقاط والتقييم</h3>
            <div class="squad-filter">
                <select id="pointsSubBranchFilter" onchange="filterPointsEvaluationTable()">
                    ${subBranchesHtml}
                </select>
                <select id="pointsSquadFilter" onchange="filterPointsEvaluationTable()">
                    ${squadsHtml}
                </select>
                <select id="pointsTypeFilter" onchange="filterPointsEvaluationTable()">
                    ${typesHtml}
                </select>
                <button class="btn btn-info" onclick="exportPointsEvaluationToPDF()" style="background: #e74c3c;">
                    <i class="fas fa-file-pdf"></i> تصدير PDF
                </button>
            </div>
            <div id="pointsEvaluationTableContainer"></div>
        </div>
    `;
    
    // عرض الجدول
    filterPointsEvaluationTable();
}

function filterPointsEvaluationTable() {
    const subBranchFilter = document.getElementById('pointsSubBranchFilter')?.value || 'all';
    const squadFilter = document.getElementById('pointsSquadFilter')?.value || 'all';
    const typeFilter = document.getElementById('pointsTypeFilter')?.value || 'all';
    
    let filteredMembers = [];
    
    if (isAdmin) {
        filteredMembers = [...appData.members];
    } else if (isLeader) {
        const mySubBranchIds = currentUser.subBranchIds || [];
        const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
        const mySquadIds = mySquads.map(s => s.id);
        filteredMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    }
    
    // فلتر الهيئة
    if (subBranchFilter !== 'all') {
        filteredMembers = filteredMembers.filter(m => m.subBranchId == subBranchFilter);
    }
    
    // فلتر الطليعة
    if (squadFilter !== 'all') {
        filteredMembers = filteredMembers.filter(m => m.squadId == squadFilter);
    }
    
    // فلتر المرحلة
    if (typeFilter !== 'all') {
        const squadIdsOfType = appData.squads.filter(s => s.type === typeFilter).map(s => s.id);
        filteredMembers = filteredMembers.filter(m => squadIdsOfType.includes(m.squadId));
    }
    
    // ترتيب حسب النقاط
    filteredMembers.sort((a, b) => b.points - a.points);
    
    const container = document.getElementById('pointsEvaluationTableContainer');
    if (!container) return;
    
    if (filteredMembers.length === 0) {
        container.innerHTML = '<div class="no-data"><i class="fas fa-info-circle"></i> لا توجد بيانات لعرضها</div>';
        return;
    }
    
    let tableHtml = `
        <div style="overflow-x:auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th><th>الاسم</th><th>المجموعة / الهيئة</th><th>الطليعة</th><th>المرحلة</th><th>الرتبة</th><th>النقاط</th><th>الحالة</th><th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    filteredMembers.forEach((member, index) => {
        const branch = appData.branches.find(b => b.id === member.branchId);
        const subBranch = appData.subBranches.find(sb => sb.id === member.subBranchId);
        const squad = appData.squads.find(s => s.id === member.squadId);
        
        tableHtml += `
            <tr>
                <td>${index + 1}</td>
                <td><strong>${escapeHtml(member.name)}</strong></td>
                <td>${branch?.name || '-'} / ${subBranch?.name || '-'}</td>
                <td>${squad?.name || '-'}</td>
                <td>${squad?.type || member.squadType || '-'}</td>
                <td><span class="badge" style="background:#d4a01720; color:#1a472a;">${member.rank || 'عضو'}</span></td>
                <td><strong style="color:#d4a017; font-size:18px;">${member.points}</strong></td>
                <td><span class="badge" style="background: ${member.isActive ? '#2ecc71' : '#e74c3c'};">${member.isActive ? 'نشط' : 'غير نشط'}</span></td>
                <td>
                    <button class="btn btn-sm btn-success" onclick="showPointsModal(${member.id})">
                        <i class="fas fa-coins"></i> تعديل النقاط
                    </button>
                </td>
            </tr>
        `;
    });
    
    tableHtml += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = tableHtml;
}

// نافذة تعديل النقاط
function showPointsModal(memberId) {
    const member = appData.members.find(m => m.id === memberId);
    if (!member) return;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:450px;">
            <div class="modal-header">
                <h3><i class="fas fa-coins"></i> تعديل نقاط العضو: ${escapeHtml(member.name)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <div style="text-align:center; margin-bottom:20px;">
                <div style="font-size:48px; font-weight:bold; color:#d4a017;">${member.points}</div>
                <div>النقاط الحالية</div>
            </div>
            <form id="pointsModalForm">
                <div class="input-group">
                    <label><i class="fas fa-plus-circle"></i> إضافة نقاط (+)</label>
                    <input type="number" id="addPointsValue" value="0" min="0" step="1">  <!-- تم التعديل: step="5" → step="1" -->
                </div>
                <div class="input-group">
                    <label><i class="fas fa-minus-circle"></i> خصم نقاط (-)</label>
                    <input type="number" id="subtractPointsValue" value="0" min="0" step="1">  <!-- تم التعديل: step="5" → step="1" -->
                </div>
                <div class="input-group">
                    <label><i class="fas fa-comment"></i> سبب التعديل (اختياري)</label>
                    <input type="text" id="pointsReason" placeholder="مثال: إنجاز مهمة، مخالفة...">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">
                    <i class="fas fa-save"></i> تطبيق التعديل
                </button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('pointsModalForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const addPoints = parseInt(document.getElementById('addPointsValue').value) || 0;
        const subtractPoints = parseInt(document.getElementById('subtractPointsValue').value) || 0;
        const reason = document.getElementById('pointsReason').value;
        
        if (addPoints === 0 && subtractPoints === 0) {
            showToast('الرجاء إدخال قيمة للتعديل', 'error');
            return;
        }
        
        let newPoints = member.points + addPoints - subtractPoints;
        if (newPoints < 0) newPoints = 0;
        
        const oldPoints = member.points;
        member.points = newPoints;
        
        // تحديث الرتبة تلقائياً
        if (member.points >= 200) member.rank = "قائد متميز";
        else if (member.points >= 100) member.rank = "قائد";
        else if (member.points >= 50) member.rank = "نائب قائد";
        else member.rank = "عضو";
        
        await saveAllDataToFirebase();
        
        // إشعار للعضو
        if (member.id !== currentUser?.id) {
            await addNotification(
                member.id,
                NOTIFICATION_TYPES.POINTS_CHANGED,
                addPoints > subtractPoints ? '🎉 زيادة في النقاط!' : '⚠️ خصم نقاط',
                `${addPoints > subtractPoints ? `تمت إضافة ${addPoints - subtractPoints} نقطة` : `تم خصم ${subtractPoints - addPoints} نقطة`} ${reason ? `السبب: ${reason}` : ''}`,
                null,
                { oldPoints: oldPoints, newPoints: newPoints }
            );
        }
        
        showToast(`✅ تم تحديث نقاط ${member.name} إلى ${newPoints} نقطة`);
        modal.remove();
        filterPointsEvaluationTable();
        
        // تحديث الجداول الأخرى إذا كانت مفتوحة
        if (document.getElementById('membersTable')) renderMembersTable();
        if (document.getElementById('leaderMembersTable')) filterLeaderMembers();
        if (document.getElementById('leaderRankingList')) updateLeaderRankingList();
        if (document.getElementById('squadRankingList')) displayRankingList(localStorage.getItem('selectedSquad') || 'all');
    });
}
// دالة تصدير صفحة النقاط والتقييم إلى PDF
function exportPointsEvaluationToPDF() {
    const subBranchFilter = document.getElementById('pointsSubBranchFilter')?.value || 'all';
    const squadFilter = document.getElementById('pointsSquadFilter')?.value || 'all';
    const typeFilter = document.getElementById('pointsTypeFilter')?.value || 'all';
    
    let filteredMembers = [];
    
    if (isAdmin) {
        filteredMembers = [...appData.members];
    } else if (isLeader) {
        const mySubBranchIds = currentUser.subBranchIds || [];
        const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
        const mySquadIds = mySquads.map(s => s.id);
        filteredMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    }
    
    if (subBranchFilter !== 'all') filteredMembers = filteredMembers.filter(m => m.subBranchId == subBranchFilter);
    if (squadFilter !== 'all') filteredMembers = filteredMembers.filter(m => m.squadId == squadFilter);
    if (typeFilter !== 'all') {
        const squadIdsOfType = appData.squads.filter(s => s.type === typeFilter).map(s => s.id);
        filteredMembers = filteredMembers.filter(m => squadIdsOfType.includes(m.squadId));
    }
    
    filteredMembers.sort((a, b) => b.points - a.points);
    
    if (filteredMembers.length === 0) {
        showToast('لا توجد بيانات لتصديرها', 'error');
        return;
    }
    
    openPointsEvaluationPrintPreview(filteredMembers);
}

// أضف هذه الدالة الجديدة:
async function completeMemberRegistration(requestId, selectedRank, selectedSquadId) {
    const request = appData.joinRequests.find(r => r.id === requestId);
    if (!request) return;
    
    const squad = appData.squads.find(s => s.id === selectedSquadId);
    
    const newMember = {
        id: Date.now(),
        code: request.code,
        name: request.name,
        age: null,
        rank: selectedRank,
        username: request.username,
        password: request.password,
        phone: null,
        branchId: request.branchId,
        subBranchId: request.subBranchId,
        squadId: selectedSquadId,
        squadType: request.squadType,
        points: 0,
        joinedAt: new Date().toISOString(),
        isProfileCompleted: false,
        isActive: false      // <-- السطر الجديد: العضو غير مفعل حتى يكمل بياناته
    };
    
    appData.members.push(newMember);
    appData.joinRequests = appData.joinRequests.filter(r => r.id !== requestId);
    
    await saveAllDataToFirebase();
    showToast(`✅ تم قبول ${request.name} وإضافته إلى طليعة ${squad?.name || ''} برتبة ${selectedRank} (سيتم تفعيله بعد إكمال بياناته)`);
    
    if (isAdmin && document.getElementById('adminPageContent')) {
        renderMembersTable();
        renderAdminDashboard();
    }
    if (isLeader && document.getElementById('leaderPageContent')) {
        renderLeaderJoinRequests();
        renderLeaderDashboard();
    }
    
    document.querySelectorAll('.modal').forEach(m => m.remove());
}

        const myMembersSubmissions = submissions.filter(s => {
            const member = appData.members.find(m => m.id === s.memberId);
            return member && mySquadIds.includes(member.squadId);

    document.getElementById('leaderTasksList').innerHTML = tasksHtml;

        squadMembers.forEach(member => {

        }
    });
    
    // تحديث الطلايع عند اختيار المرحلة والهيئة
    function updateSquads() {
        const selectedBranchId = parseInt(branchSelect.value);
        const selectedStage = stageSelect.value;
        const selectedSubBranchId = parseInt(subBranchSelect.value);
        
        if (selectedBranchId && selectedStage && selectedSubBranchId) {
            const availableSquads = appData.squads.filter(s => 
                s.branchId === selectedBranchId &&
                s.subBranchId === selectedSubBranchId &&
                s.type === selectedStage &&
                s.isOpen === true
            );
            
            if (availableSquads.length > 0) {

            } else {
                squadSelect.disabled = true;
                squadSelect.innerHTML = '<option value="">-- لا توجد طلايع متاحة --</option>';

                    showToast('⚠️ لا توجد طلايع مفتوحة من هذه المرحلة في هذه الهيئة', 'error');

            }
        } else {
            squadSelect.disabled = true;
            squadSelect.innerHTML = '<option value="">-- اختر الهيئة أولاً --</option>';
        }
    }
    
    stageSelect.addEventListener('change', updateSquads);
    subBranchSelect.addEventListener('change', updateSquads);
    
    document.getElementById('addMemberFormLeader').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('memberUsername').value;
        
        if (appData.members.some(m => m.username === username)) {
            showToast('اسم المستخدم موجود مسبقاً', 'error');

        const branchId = parseInt(document.getElementById('memberBranch').value);
        const subBranchId = parseInt(document.getElementById('memberSubBranch').value);

        if (!branchId || !subBranchId || !squadId || !selectedStage) {
            showToast('الرجاء اختيار جميع البيانات', 'error');

        const newMember = {

        showToast('تم إضافة العضو بنجاح');

                </select>

            </div>

                <div class="chat-messages" id="leaderChatMessages"></div>

                </div>
            </div>
        </div>
    `;

function loadLeaderMessages() {
    const filter = document.getElementById('leaderChatFilter')?.value || 'all';
    const leader = currentUser;
    
    const mySquads = appData.squads.filter(s => s.branchId === leader.branchId);
    const mySquadIds = mySquads.map(s => s.id);
    
    let messages = appData.messages.filter(m => {
        if (filter === 'all') {
            return (m.squadId && mySquadIds.includes(m.squadId)) || m.isBroadcast === true;
        } else {
            return m.squadId == filter && !m.isBroadcast;
        }
    });
    messages.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    
    const container = document.getElementById('leaderChatMessages');
    if (!container) return;
    container.innerHTML = messages.map(m => `
        <div class="message ${m.senderId === leader.id || m.senderId === 'admin' ? 'sent' : 'received'}">
            <div class="sender"><i class="fas fa-user"></i> ${m.senderName}</div>
            <div class="text">${escapeHtml(m.text)}</div>
            <div class="time">${new Date(m.timestamp).toLocaleString('ar-EG')}</div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

async function sendLeaderMessage() {
    const input = document.getElementById('leaderMessageInput');
    const text = input.value.trim();
    if (!text) return;
    const filter = document.getElementById('leaderChatFilter')?.value || 'all';
    const leader = currentUser;
    
    const newMessage = {
        id: Date.now(),
        squadId: filter === 'all' ? null : parseInt(filter),
        senderId: leader.id,
        senderName: leader.name,
        text: text,
        timestamp: new Date().toISOString(),
        isBroadcast: filter === 'all'
    };
    appData.messages.push(newMessage);
    await saveAllDataToFirebase();
    input.value = '';
    loadLeaderMessages();
    showToast('تم إرسال الرسالة');
}

async function confirmDeleteBranch(branchId) {
    // جلب الهيئات التابعة للمجموعة
    const subBranchesToDelete = appData.subBranches.filter(sb => sb.branchId === branchId);
    
    // جلب جميع الطلايع التابعة لهذه الهيئات
    const subBranchIds = subBranchesToDelete.map(sb => sb.id);
    const squadsToDelete = appData.squads.filter(s => subBranchIds.includes(s.subBranchId));
    
    // حذف الأعضاء المرتبطين بهذه الطلايع
    squadsToDelete.forEach(squad => {
        appData.members = appData.members.filter(m => m.squadId !== squad.id);
    });
    
    // حذف الطلايع
    appData.squads = appData.squads.filter(s => !subBranchIds.includes(s.subBranchId));
    
    // حذف الهيئات
    appData.subBranches = appData.subBranches.filter(sb => sb.branchId !== branchId);
    
    // حذف المجموعة
    appData.branches = appData.branches.filter(b => b.id !== branchId);
    
    await saveAllDataToFirebase();
    renderSquadsList();
    renderAdminDashboard();
    showToast('✅ تم حذف المجموعة وجميع هيئاتها وطلايعها وأعضائها');
}
// حذف فرع
async function deleteSubBranch(subBranchId) {
    if (!confirm('⚠️ هل أنت متأكد من حذف هذه الهيئة؟\nسيتم حذف جميع الطلايع التابعة لها والأعضاء المرتبطين بها!')) return;
    
    // جلب جميع الطلايع التابعة لهذه الهيئة
    const squadsToDelete = appData.squads.filter(s => s.subBranchId === subBranchId);
    
    // حذف الأعضاء المرتبطين بهذه الطلايع
    squadsToDelete.forEach(squad => {
        appData.members = appData.members.filter(m => m.squadId !== squad.id);
    });
    
    // حذف الطلايع
    appData.squads = appData.squads.filter(s => s.subBranchId !== subBranchId);
    
    // حذف الهيئة
    appData.subBranches = appData.subBranches.filter(sb => sb.id !== subBranchId);
    
    await saveAllDataToFirebase();
    renderSquadsList();
    renderAdminDashboard();
    showToast('✅ تم حذف الهيئة وجميع طلايعها وأعضائها');
}

function showAddSubBranchModal() {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-code-branch"></i> إضافة هيئه جديد</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
            <form id="addSubBranchForm">
                <div class="input-group">
                    <label>اختر المجموعة</label>
                    <select id="subBranchParentBranch" required>
                        <option value="">-- اختر المجموعة --</option>
                        ${appData.branches.map(b => `<option value="${b.id}">${b.name}</option>`).join('')}
                    </select>
                </div>
                <div class="input-group">
                    <label>اسم الهيئة</label>
                    <input type="text" id="subBranchName" placeholder="مثال: هيئه القطاميه" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">إضافة الهيئة</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('addSubBranchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const parentBranchId = parseInt(document.getElementById('subBranchParentBranch').value);
        const subBranchName = document.getElementById('subBranchName').value.trim();
        
        if (!parentBranchId || !subBranchName) {
            showToast('الرجاء اختيار المجموعة وإدخال اسم الهيئة', 'error');
            return;
        }
        
        // التحقق من عدم وجود فرع بنفس الاسم في نفس المنطقة
        const existing = appData.subBranches.find(sb => sb.branchId === parentBranchId && sb.name === subBranchName);
        if (existing) {
            showToast('يوجد هيئه بهذا الاسم بالفعل في هذه المجموعة', 'error');
            return;
        }
        
        const newSubBranch = {
            id: Date.now(),
            branchId: parentBranchId,
            name: subBranchName,
            createdAt: new Date().toISOString()
        };
        
        appData.subBranches.push(newSubBranch);
        await saveAllDataToFirebase();
        showToast(`تم إضافة الهيئة "${subBranchName}" بنجاح`);
        modal.remove();
        renderSquadsList();
    });
}

            const branches = appData.subBranches.filter(sb => sb.branchId === branchId);
            subBranchSelect.innerHTML = '<option value="">-- اختر الهيئة --</option>' + 
                branches.map(sb => `<option value="${sb.id}">${sb.name}</option>`).join('');
            autoLeadersInput.value = '';
            autoLeadersInput.placeholder = 'اختر الهيئة أولاً';
        } else {
            subBranchSelect.innerHTML = '<option value="">-- اختر المجموعة أولاً --</option>';
            autoLeadersInput.value = '';
            autoLeadersInput.placeholder = 'اختر المجموعة أولاً';
        }
    });

    // عند اختيار الهيئة، يتم توليد أسماء القادة تلقائياً
    subBranchSelect.addEventListener('change', function() {
        const subBranchId = parseInt(this.value);
        if (subBranchId) {
            // جلب جميع القادة المسؤولين عن هذه الهيئة
            const responsibleLeaders = appData.leaders.filter(leader => 
                leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
            );
            
            if (responsibleLeaders.length > 0) {
                // تجميع أسماء القادة في نص واحد
                const leadersNames = responsibleLeaders.map(leader => leader.name).join('، ');
                autoLeadersInput.value = leadersNames;
                autoLeadersInput.style.color = '#2ecc71';
                autoLeadersInput.style.fontWeight = 'bold';

                autoLeadersInput.value = '⚠️ لا يوجد قادة مسؤولون عن هذه الهيئة';

            }
        } else {
            autoLeadersInput.value = '';
            autoLeadersInput.placeholder = 'اختر الهيئة أولاً';
        }
    });

    document.getElementById('addSquadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const branchId = parseInt(branchSelect.value);
        const subBranchId = parseInt(subBranchSelect.value);
        const squadName = document.getElementById('squadName').value.trim();
        const squadType = document.getElementById('squadType').value;
        
        if (!branchId || !subBranchId || !squadName || !squadType) {
            showToast('الرجاء اختيار جميع البيانات', 'error');
            return;
        }
        
        // جلب أسماء القادة المسؤولين لعرضها في الطليعة (كنص فقط)
        const responsibleLeaders = appData.leaders.filter(leader => 
            leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
        );
        const leadersNames = responsibleLeaders.map(leader => leader.name).join('، ');
        const leadersIds = responsibleLeaders.map(leader => leader.id);
        
        const newSquad = {
            id: Date.now(),
            branchId: branchId,
            subBranchId: subBranchId,
            name: squadName,
            type: squadType,
            leadersNames: leadersNames,        // أسماء القادة كنص (للعرض)
            leadersIds: leadersIds,            // IDs القادة (للاستخدام المستقبلي)
            isOpen: true,
            createdAt: new Date().toISOString()
        };
        
        appData.squads.push(newSquad);
        await saveAllDataToFirebase();
        showToast(`✅ تم إضافة الطليعة "${squadName}" والقادة المسؤولون: ${leadersNames || 'لا يوجد'}`);
        modal.remove();
        renderAdminSquads();
        renderAdminDashboard();
    });
}

            submitBtn.style.opacity = '0.6';

        const newPhone = document.getElementById('profilePhone').value;
        
        if (!newAge || !newPhone || newAge < 6 || newAge > 30) {
            showToast('الرجاء إدخال عمر صحيح بين 6 و 30 سنة', 'error');
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الحفظ...';
        
        try {

            currentUser.phone = newPhone;
            currentUser.isProfileCompleted = true;

            const memberIndex = appData.members.findIndex(m => m.id === currentUser.id);
            if (memberIndex !== -1) {
                appData.members[memberIndex].age = newAge;
                appData.members[memberIndex].phone = newPhone;
                appData.members[memberIndex].isProfileCompleted = true;
                appData.members[memberIndex].isActive = true;   // <-- تفعيل العضو في قاعدة البيانات

            renderMemberApp(document.getElementById('app'));
            
        } catch (error) {

            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-save"></i> حفظ البيانات والمتابعة';

async function checkAndHandleMemberProfile() {
    if (!currentUser || isAdmin || isLeader) return true; // لا شيء للقادة

    // إذا كان العضو قد أكمل بياناته بالفعل

// دالة مساعدة لجلب قائمة القادة في هيئة معينة
function getLeadersBySubBranch(subBranchId) {
    return appData.leaders.filter(leader => 
        leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
    );
}

// دالة تحديث قائمة القادة في أي select
function updateLeadersSelect(selectElementId, subBranchId, defaultOptionText = "-- اختر القائد --") {
    const select = document.getElementById(selectElementId);
    if (!select) return;
    
    if (subBranchId) {
        const availableLeaders = getLeadersBySubBranch(subBranchId);
        
        if (availableLeaders.length > 0) {
            select.disabled = false;
            select.innerHTML = `<option value="">${defaultOptionText}</option>` + 
                availableLeaders.map(leader => `<option value="${leader.id}">${leader.name} (${leader.username})</option>`).join('');
        } else {
            select.disabled = true;
            select.innerHTML = '<option value="">-- لا يوجد قادة في هذه الهيئة --</option>';
        }
    } else {
        select.disabled = true;
        select.innerHTML = '<option value="">-- اختر الهيئة أولاً --</option>';
    }
}

    // تعيين التاريخ والوقت الحالي كقيم افتراضية
    const now = new Date();

                <div class="input-group"><label>تاريخ ووقت الانتهاء</label><input type="datetime-local" id="taskEndDate" value="${defaultEndDate}" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">إضافة التكليف</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('addTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const startDate = new Date(document.getElementById('taskStartDate').value);
        const endDate = new Date(document.getElementById('taskEndDate').value);
        
        if (endDate <= startDate) {
            showToast('تاريخ الانتهاء يجب أن يكون بعد تاريخ البدء', 'error');
            return;
        }
        
        const newTask = {
            id: Date.now(),
            squadId: parseInt(squadId),
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDesc').value,
            pointsValue: parseInt(document.getElementById('taskPoints').value),
            createdAt: new Date().toISOString(),
            startDate: startDate.toISOString(),
            endDate: endDate.toISOString(),
            seenByMembers: []  // مصفوفة لتخزين IDs الأعضاء الذين شاهدوا التكليف
        };
        appData.tasks.push(newTask);
        await saveAllDataToFirebase();
        
        // إعادة تعيين إشعارات الأعضاء في هذه الطليعة
        const squadMembers = appData.members.filter(m => m.squadId == squadId);
        squadMembers.forEach(member => {
            sessionStorage.removeItem('notificationShown_' + member.id);

        showToast('تم إضافة التكليف وسيظهر إشعار للأعضاء');
        modal.remove();
        renderTasksListAdmin();
        renderAdminDashboard();
    });

        function manageTaskSubmissions(taskId) {
            const task = appData.tasks.find(t => t.id === taskId);
            const squadMembers = appData.members.filter(m => m.squadId === task.squadId);
            const submissions = appData.taskSubmissions.filter(ts => ts.taskId === taskId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:600px;">
                    <div class="modal-header"><h3><i class="fas fa-clipboard-list"></i> تسليمات تكليف: ${task.title}</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
                    <div style="max-height:400px; overflow-y:auto;">
                        ${squadMembers.map(member => {
                            const submission = submissions.find(s => s.memberId === member.id);
                            return `
                                <div style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:10px;">
                                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                                        <div><strong>${member.name}</strong> (${member.code}) - <span class="badge" style="background:${submission ? '#2ecc71' : '#e74c3c'};">${submission ? (submission.pointsAwarded ? 'تم التقييم' : 'تم التسليم') : 'لم يسلم بعد'}</span></div>
                                        ${submission && submission.status === 'submitted' && !submission.pointsAwarded ? 
                                            `<div><input type="number" id="points_${member.id}" placeholder="النقاط" value="${task.pointsValue}" style="width:80px; padding:5px;"> <button class="btn btn-sm btn-success" onclick="awardPoints(${taskId}, ${member.id})"><i class="fas fa-star"></i> منح النقاط</button></div>` : 
                                            submission && submission.pointsAwarded ? `<span class="badge" style="background:#2ecc71;">حصل على ${submission.pointsAwarded} نقطة</span>` : ''
                                        }
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

async function awardPoints(taskId, memberId) {
    const pointsInput = document.getElementById(`points_${memberId}`);
    const points = parseInt(pointsInput?.value) || 0;
    const submission = appData.taskSubmissions.find(ts => ts.taskId === taskId && ts.memberId === memberId);
    if (submission) {
        // تم إزالة الشرط الذي كان يمنع منح أقل من 5 نقاط
        submission.pointsAwarded = points;
        submission.status = 'completed';
        submission.reviewedAt = new Date().toISOString();
        submission.reviewedBy = 'admin';
        const member = appData.members.find(m => m.id === memberId);
        member.points += points;
        if (member.points >= 200) member.rank = "قائد متميز";
        else if (member.points >= 100) member.rank = "قائد";
        else if (member.points >= 50) member.rank = "نائب قائد";
        await saveAllDataToFirebase();
        showToast(`تم منح ${points} نقطة للعضو ${member.name}`);
        manageTaskSubmissions(taskId);
        renderTasksListAdmin();
        renderAdminDashboard();
    }
}

       function renderMemberTasks() {
    const container = document.getElementById('memberPageContent');
    if (!container) return;
    
    // تصفية المهام حسب الصلاحية (لم تنتهِ بعد)
    const pendingTasks = appData.tasks.filter(t => 
        t.squadId === currentUser.squadId && 
        !appData.taskSubmissions.some(ts => ts.taskId === t.id && ts.memberId === currentUser.id) &&
        canSubmitTask(t.id)
    );
    
    const completedTasks = appData.taskSubmissions.filter(ts => ts.memberId === currentUser.id && ts.status === 'completed');
    
    const expiredTasks = appData.tasks.filter(t => 
        t.squadId === currentUser.squadId && 
        !appData.taskSubmissions.some(ts => ts.taskId === t.id && ts.memberId === currentUser.id) &&
        !canSubmitTask(t.id)
    );
    
    container.innerHTML = `
        <div class="card"><h3><i class="fas fa-clock"></i> المهام الجديدة</h3>
            ${pendingTasks.map(t => {
                const endDate = new Date(t.endDate);
                const isNew = !t.seenByMembers || !t.seenByMembers.includes(currentUser.id);
                return `
                    <div class="task-item task-pending" style="${isNew ? 'border-right-color: #e74c3c; border-right-width: 6px;' : ''}">
                        <div class="task-header">
                            <span class="task-title">${escapeHtml(t.title)} ${isNew ? '<span class="badge" style="background:#e74c3c;">جديد</span>' : ''}</span>
                            <span class="task-points">${t.pointsValue} نقطة</span>
                        </div>
                        <div class="task-description">${escapeHtml(t.description)}</div>
                        <div class="task-meta"><i class="fas fa-calendar-alt"></i> بدأ: ${new Date(t.startDate).toLocaleString('ar-EG')}<br>
                        <i class="fas fa-calendar-times"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}</div>
                        <button class="complete-task-btn" onclick="submitTaskRequest(${t.id})"><i class="fas fa-paper-plane"></i> تقديم تسليم</button>
                    </div>
                `;
            }).join('')}
            ${pendingTasks.length === 0 ? '<p style="text-align:center;">🎉 لا توجد مهام جديدة متاحة</p>' : ''}
        </div>
        
        ${expiredTasks.length > 0 ? `
        <div class="card"><h3><i class="fas fa-hourglass-end"></i> مهام انتهى وقتها (غير قابلة للتسليم)</h3>
            ${expiredTasks.map(t => `
                <div class="task-item" style="background: #f0f0f0; opacity: 0.7;">
                    <div class="task-header"><span class="task-title">${escapeHtml(t.title)}</span><span class="task-points">${t.pointsValue} نقطة</span></div>
                    <div class="task-description">${escapeHtml(t.description)}</div>
                    <div class="task-meta"><i class="fas fa-calendar-times"></i> انتهى في: ${new Date(t.endDate).toLocaleString('ar-EG')}</div>
                    <button class="btn btn-sm" disabled style="background: #ccc; cursor: not-allowed;"><i class="fas fa-ban"></i> انتهى الوقت</button>
                </div>
            `).join('')}
        </div>
        ` : ''}
        
        <div class="card"><h3><i class="fas fa-check-circle"></i> المهام المكتملة</h3>
            ${completedTasks.map(ct => {
                const task = appData.tasks.find(t => t.id === ct.taskId);
                return `<div class="task-item task-completed"><div class="task-header"><span class="task-title">${task?.title || 'تم حذف المهمة'}</span><span class="task-points">${ct.pointsAwarded || 'بانتظار التقييم'} نقطة</span></div><div class="task-description">${task?.description || ''}</div><div class="task-meta"><i class="fas fa-check-circle"></i> تم التسليم: ${new Date(ct.submittedAt).toLocaleString('ar-EG')}</div></div>`;

        </div>

    // تحديث حالة المشاهدة بشكل غير متزامن بدون إعادة تحميل الصفحة
    updateTaskSeenStatus();
}
        // دالة منفصلة لتحديث حالة المشاهدة دون التسبب في حلقة لا نهائية
async function updateTaskSeenStatus() {
    let needsUpdate = false;
    
    appData.tasks.forEach(task => {
        if (task.squadId === currentUser.squadId) {
            if (!task.seenByMembers) task.seenByMembers = [];
            if (!task.seenByMembers.includes(currentUser.id)) {
                task.seenByMembers.push(currentUser.id);
                needsUpdate = true;
            }
        }
    });
    
    if (needsUpdate) {
        await saveAllDataToFirebase();
    }
}
// دالة عرض من شاهد التكليف
function showTaskViewers(taskId) {
    const task = appData.tasks.find(t => t.id === taskId);
    if (!task) return;
    
    const squadMembers = appData.members.filter(m => m.squadId === task.squadId);
    const viewers = task.seenByMembers || [];
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header"><h3><i class="fas fa-eye"></i> من شاهد التكليف: ${task.title}</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
            <div style="max-height:400px; overflow-y:auto;">
                ${squadMembers.map(member => {
                    const hasSeen = viewers.includes(member.id);
                    const hasSubmitted = appData.taskSubmissions.some(ts => ts.taskId === taskId && ts.memberId === member.id);
                    return `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee; background: ${hasSubmitted ? '#e8f5e9' : 'transparent'};">
                            <div>
                                <strong>${escapeHtml(member.name)}</strong><br>
                                <small>${member.rank}</small>
                            </div>
                            <div>
                                ${hasSubmitted ? '<span class="badge" style="background:#2ecc71;">✅ سلم</span>' : ''}
                                ${hasSeen ? '<span class="badge" style="background:#3498db;">👁️ شاهد</span>' : '<span class="badge" style="background:#e74c3c;">❌ لم يشاهد</span>'}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
            <div style="text-align:center; margin-top:15px;">
                <button class="btn btn-primary" onclick="this.closest('.modal').remove()">إغلاق</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}
       async function submitTaskRequest(taskId) {
    // التحقق من صلاحية التسليم
    if (!canSubmitTask(taskId)) {
        showToast('عذراً، انتهى الموعد النهائي لتسليم هذا التكليف', 'error');
        return;
    }
    
    const existing = appData.taskSubmissions.find(ts => ts.taskId === taskId && ts.memberId === currentUser.id);
    if (existing) { 
        showToast('لقد قمت بالفعل بتسليم هذا التكليف', 'error'); 
        return; 
    }
    
    const submission = {
        id: Date.now(),
        taskId: taskId,
        memberId: currentUser.id,
        status: 'submitted',
        submittedAt: new Date().toISOString(),
        pointsAwarded: null,
        reviewedBy: null,
        reviewedAt: null
    };
    appData.taskSubmissions.push(submission);
    await saveAllDataToFirebase();
    showToast('تم تقديم طلب تسليم التكليف، بانتظار موافقة القائد');
    renderMemberTasks();
}

// دالة إرسال فورم من القائد إلى أعضائه
async function sendFormToMyMembers(formId) {
    const leaderForm = appData.leaderForms?.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ الفورم غير موجود', 'error');
        return;
    }
    
    // جلب أعضاء القائد (حسب الفروع المسؤول عنها)
    const mySubBranchIds = currentUser.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.branchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    
    if (myMembers.length === 0) {
        showToast('⚠️ لا يوجد أعضاء في فروعك لإرسال الفورم إليهم', 'error');
        return;
    }
    
    const form = appData.forms.find(f => f.id === formId);
    if (!form) return;
    
    // تحديث leaderForm بأنه تم الإرسال للأعضاء
    leaderForm.sentToMembers = true;
    leaderForm.sentToMembersAt = new Date().toISOString();
    
    // إنشاء نسخة من الفورم لكل عضو
    if (!appData.memberForms) appData.memberForms = [];
    
    myMembers.forEach(member => {
        const alreadySent = appData.memberForms?.some(mf => mf.formId === formId && mf.memberId === member.id);
        if (!alreadySent) {
            appData.memberForms.push({
                id: Date.now() + Math.random(),
                formId: formId,
                memberId: member.id,
                leaderId: currentUser.id,
                sentAt: new Date().toISOString(),
                isAnswered: false,
                answers: [],
                formData: { ...form }
            });
        }
    });
    
    await saveAllDataToFirebase();
    showToast(`✅ تم إرسال الفورم "${form.title}" إلى ${myMembers.length} عضو`);
    
    // تحديث واجهة القائد إذا كانت مفتوحة
    if (typeof renderLeaderFormsPage === 'function') {
        renderLeaderFormsPage();
    }
}

    });
    
    document.getElementById('joinRequestFormLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('reqUsernameLogin').value;
        if (appData.members.some(m => m.username === username)) {
            showToast('اسم المستخدم موجود مسبقاً لدى عضو', 'error');
            return;
        }
        if (appData.joinRequests.some(r => r.username === username && r.status === 'pending')) {
            showToast('هذا الاسم موجود في طلب سابق لا يزال قيد المراجعة', 'error');
            return;
        }
        
        const subBranchId = parseInt(document.getElementById('reqSubBranchLogin').value);
        const subBranch = appData.subBranches.find(sb => sb.id === subBranchId);
        const squadType = document.getElementById('reqSquadTypeLogin').value;
        
        if (!subBranchId || !squadType) {
            showToast('الرجاء اختيار الهيئة والمرحلة', 'error');
            return;
        }
        
        const newRequest = {
            id: Date.now(),
            name: document.getElementById('reqNameLogin').value,
            age: parseInt(document.getElementById('reqAgeLogin').value),
            phone: document.getElementById('reqPhoneLogin').value,
            rank: "عضو",
            branchId: subBranch.branchId,
            subBranchId: subBranchId,
            squadType: squadType,
            username: username,
            password: document.getElementById('reqPasswordLogin').value,
            status: 'pending',
            requestedAt: new Date().toISOString(),
            code: `KS${String(appData.members.length + 1).padStart(3, '0')}`
        };
        
        appData.joinRequests.push(newRequest);
        await saveAllDataToFirebase();
        
        // إرسال إشعار للقادة المسؤولين عن هذه الهيئة
        const responsibleLeaders = appData.leaders.filter(leader => 
            leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
        );
        
        const leaderNames = responsibleLeaders.map(l => l.name).join('، ');
        
        modal.remove();
        showCustomRequestMessage(leaderNames, subBranch ? subBranch.name : 'الهيئة');
    });
}

function renderLeaderboard() {
    const container = document.getElementById('leaderboardTableContainer');
    if (!container) return;
    
    // جلب البيانات بناءً على الفلاتر
    let filteredMembers = [...appData.members];
    
    // فلتر الفرع (إذا لم يكن 'all')
    if (currentBranchFilter !== 'all') {
        const branchId = parseInt(currentBranchFilter);
        filteredMembers = filteredMembers.filter(m => m.branchId === branchId);
    }
    
    // فلتر النوع (يعمل حتى مع اختيار جميع الفروع)
    if (currentTypeFilter !== 'all') {
        // جلب IDs الطلايع التي تطابق النوع المختار
        let squadIdsOfType = [];
        
        if (currentBranchFilter !== 'all') {
            // إذا كان فرع محدد، نجلب الطلايع من نفس الفرع
            squadIdsOfType = appData.squads
                .filter(s => s.type === currentTypeFilter && s.branchId == currentBranchFilter)
                .map(s => s.id);
        } else {
            // إذا كان جميع الفروع، نجلب الطلايع من كل الفروع
            squadIdsOfType = appData.squads
                .filter(s => s.type === currentTypeFilter)
                .map(s => s.id);
        }
        
        filteredMembers = filteredMembers.filter(m => squadIdsOfType.includes(m.squadId));
    }
    
    // ترتيب حسب النقاط (تنازلي)
    filteredMembers.sort((a, b) => b.points - a.points);
    
    // بناء HTML الجدول
    if (filteredMembers.length === 0) {
        container.innerHTML = '<div class="no-data"><i class="fas fa-info-circle"></i> لا توجد بيانات لعرضها</div>';
        return;
    }
    
    let tableHtml = `
        <div class="leaderboard-table-wrapper">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>المجموعه / الهيئه</th>
                        <th>الرتبة</th>
                        <th><i class="fas fa-star"></i> النقاط</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    filteredMembers.forEach((member, index) => {
        const rank = index + 1;
        let rankClass = '';
        let rankDisplay = '';
        
        if (rank === 1) {
            rankClass = 'rank-1';
            rankDisplay = '🥇';
        } else if (rank === 2) {
            rankClass = 'rank-2';
            rankDisplay = '🥈';
        } else if (rank === 3) {
            rankClass = 'rank-3';
            rankDisplay = '🥉';
        } else {
            rankClass = 'rank-other';
            rankDisplay = rank;
        }
        
        // جلب معلومات المجموعة والهيئة
        const branch = appData.branches.find(b => b.id === member.branchId);
        const subBranch = appData.subBranches.find(sb => sb.id === member.subBranchId);
        
        // عرض المجموعة والهيئة فقط
        let locationText = '';
        if (branch && subBranch) {
            locationText = `${branch.name} - ${subBranch.name}`;
        } else if (branch) {
            locationText = branch.name;
        } else if (subBranch) {
            locationText = subBranch.name;
        } else {
            locationText = '-';
        }
        
        tableHtml += `
            <tr>
                <td class="rank-cell">
                    <span class="rank-medal ${rankClass}">${rankDisplay}</span>
                </td>
                <td><strong>${escapeHtml(member.name)}</strong></td>
                <td>${escapeHtml(locationText)}</td>
                <td><span class="badge" style="background: #d4a01720; color: #1a472a; padding: 4px 10px;">${member.rank || 'عضو'}</span></td>
                <td><strong style="color: #d4a017; font-size: 18px;">${member.points}</strong></td>
            </tr>
        `;
    });
    
    tableHtml += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = tableHtml;
}

function downloadAsPDF(element, filename) {
    if (typeof html2pdf !== 'undefined') {
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: filename,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    } else {
        // إذا لم تتحمل المكتبة، استخدم الطباعة كبديل
        alert('جاري فتح نافذة الطباعة... يمكنك حفظ الملف كـ PDF من هناك');
        window.print();
    }
}

// تعديل دالة startApp لتشمل تهيئة بيانات المطور
window.startApp = async function() {
    // تحميل جميع البيانات من Firebase
    await loadAllDataFromFirebase();
    
    // تهيئة الحسابات الإضافية للقادة العامين
    await initializeAdditionalAdminAccounts();
    
    // تحميل بيانات المطور من Firebase
    try {
        const devSnapshot = await database.ref('developerData').once('value');
        const devData = devSnapshot.val();
        if (devData) {
            developerData.backups = devData.backups || [];
            developerData.activityLog = devData.activityLog || [];
            developerData.consoleErrors = devData.consoleErrors || [];
            developerData.liveConsole = devData.liveConsole || [];
            developerData.crashReports = devData.crashReports || [];
            developerData.notifications = devData.notifications || [];
            developerData.systemSettings = devData.systemSettings || developerData.systemSettings;
        }
        console.log('✅ تم تحميل بيانات المطور');
    } catch (error) {
        console.error('❌ خطأ في تحميل بيانات المطور:', error);
    }
    
    // محاولة تحميل بيانات القائد العام المحفوظة
    const adminCreds = await loadAdminCredentialsFromFirebase();
    window.adminCredentials = adminCreds;
    
    // بدء الاستماع للتحديثات المباشرة من Firebase
    listenForRealTimeUpdates();
    
    // عرض صفحة الهبوط
    renderLandingPage();
    
    // إضافة الزر الثابت
    addFixedLogoButton();
    
    // تهيئة الوضع
    initTheme();
    
    console.log('✅ تم تشغيل التطبيق بنجاح');
    console.log('🔐 بيانات القائد العام الحالية:', adminCreds);
};

// التقاط الأخطاء العالمية
window.addEventListener('error', function(e) {
    const errorData = {
        type: 'error',
        message: e.message || 'Unknown error',
        file: e.filename || 'unknown',
        line: e.lineno || 0,
        column: e.colno || 0,
        stack: e.error?.stack || ''
    };
    
    // تسجيل في Console Errors
    logConsoleError(errorData);
    
    // تسجيل في Crash Reports
    logCrashReport(errorData);
    
    // إرسال إلى Live Console
    sendToLiveConsole('error', e.message || 'Unknown error', { file: e.filename, line: e.lineno });
});

// التقاط الأخطاء في الـ Promise
window.addEventListener('unhandledrejection', function(e) {
    const errorData = {
        type: 'error',
        message: e.reason?.message || 'Unhandled Promise Rejection',
        file: 'promise',
        line: 0,
        column: 0,
        stack: e.reason?.stack || ''
    };
    
    logConsoleError(errorData);
    logCrashReport(errorData);
    sendToLiveConsole('error', 'Unhandled Promise Rejection', { reason: e.reason });
});

// تجاوز console.log الأصلي لتسجيل في Live Console
const originalConsoleLog = console.log;
const originalConsoleWarn = console.warn;
const originalConsoleError = console.error;
const originalConsoleInfo = console.info;

console.log = function(...args) {
    originalConsoleLog.apply(console, args);
    sendToLiveConsole('log', args.join(' '));
};

console.warn = function(...args) {
    originalConsoleWarn.apply(console, args);
    sendToLiveConsole('warn', args.join(' '));
};

console.error = function(...args) {
    originalConsoleError.apply(console, args);
    sendToLiveConsole('error', args.join(' '));
};

console.info = function(...args) {
    originalConsoleInfo.apply(console, args);
    sendToLiveConsole('info', args.join(' '));
};

window.viewLeaderEvaluationFormDetails = function(formId) {
    if (!appData.leaderEvaluationForms) appData.leaderEvaluationForms = [];
    if (!appData.evaluationForms) appData.evaluationForms = [];
    
    const leaderForm = appData.leaderEvaluationForms.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ فورم التقييم غير موجود', 'error');
        return;
    }
    
    let form = appData.evaluationForms.find(f => f.id === formId);
    if (!form && leaderForm.formData) form = leaderForm.formData;
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';

        form.questions.forEach((q, idx) => {
            questionsHtml += `

            <div class="modal-header">
                <h3><i class="fas fa-star"></i> ${escapeHtml(form.title)}</h3>

};

// دالة عرض نتائج فورم التقييم للقائد
window.showEvaluationResultsForLeader = function(formId) {
    if (!appData.evaluationForms) appData.evaluationForms = [];
    
    let form = appData.evaluationForms.find(f => f.id === formId);
    if (!form) {
        const leaderForm = (appData.leaderEvaluationForms || []).find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
        if (leaderForm && leaderForm.formData) form = leaderForm.formData;
    }
    if (!form) {
        showToast('❌ فورم التقييم غير موجود', 'error');
        return;
    }
    
    const mySubBranchIds = currentUser.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.branchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    const myMemberIds = myMembers.map(m => m.id);
    
    const answers = (appData.memberEvaluationAnswers || []).filter(a => a.formId === formId && myMemberIds.includes(a.memberId));
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    
    let resultsHtml = '';
    if (answers.length === 0) {
        resultsHtml = '<p style="text-align:center;">لا توجد إجابات حتى الآن</p>';
    } else {
        const avgStars = (answers.reduce((a,b) => a + b.starRating, 0) / answers.length).toFixed(1);
        resultsHtml = `
            <div style="background:#e8f5e9; padding:15px; border-radius:12px; margin-bottom:20px; text-align:center;">
                <p>عدد المشاركين: <strong>${answers.length}</strong> من أصل ${myMembers.length} عضو</p>
                <p>متوسط التقييم: <strong style="font-size:24px; color:#d4a017;">${avgStars}</strong> / 5</p>
            </div>
            ${answers.map(ans => {
                const member = appData.members.find(m => m.id === ans.memberId);
                return `
                    <div style="background:#f8f9fa; border-radius:12px; padding:15px; margin-bottom:12px;">
                        <div><strong>${member?.name || 'عضو غير معروف'}</strong></div>
                        <div>التقييم: ${'⭐'.repeat(ans.starRating)} (${ans.starRating}/5)</div>
                        ${ans.answers && ans.answers.length > 0 ? `<div>الإجابات: ${ans.answers.map(a => a.answer).join(', ')}</div>` : ''}
                    </div>
                `;
            }).join('')}
        `;
    }
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:700px; max-height:85vh; overflow-y:auto;">
            <div class="modal-header">
                <h3><i class="fas fa-chart-bar"></i> نتائج فورم التقييم: ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            ${resultsHtml}
            <div style="text-align:center; margin-top:20px;">
                <button class="btn btn-primary" onclick="this.closest('.modal').remove()">إغلاق</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
};

// دالة إرسال فورم التقييم للأعضاء
window.showSendEvaluationFormDestinationModal = function(formId) {
    if (!appData.leaderEvaluationForms) appData.leaderEvaluationForms = [];
    
    const leaderForm = appData.leaderEvaluationForms.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ فورم التقييم غير موجود', 'error');
        return;
    }
    
    let form = leaderForm.formData;
    if (!form) {
        if (!appData.evaluationForms) appData.evaluationForms = [];
        form = appData.evaluationForms.find(f => f.id === formId);
    }
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    const mySubBranchIds = currentUser.subBranchIds || [];
    const myBranchIds = [...new Set(appData.subBranches
        .filter(sb => mySubBranchIds.includes(sb.id))
        .map(sb => sb.branchId)
    )];
    const mySubBranches = appData.subBranches.filter(sb => mySubBranchIds.includes(sb.id));
    const mySquads = appData.squads.filter(s => myBranchIds.includes(s.branchId));
    
    let branchesOptions = '<option value="">-- اختر المجموعة --</option>';
    myBranchIds.forEach(branchId => {
        const branch = appData.branches.find(b => b.id === branchId);
        if (branch) branchesOptions += `<option value="${branch.id}">🏢 ${branch.name}</option>`;
    });
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> إرسال فورم التقييم: ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <form id="sendEvalForm">
                <div class="input-group"><label>اختر المجموعة</label><select id="evalBranch" required style="width:100%; padding:10px;">${branchesOptions}</select></div>
                <div class="input-group"><label>اختر الهيئة</label><select id="evalSubBranch" required style="width:100%; padding:10px;"><option value="">-- اختر المجموعة أولاً --</option></select></div>
                <div class="input-group"><label>اختر الطليعة</label><select id="evalSquad" style="width:100%; padding:10px;"><option value="all">-- جميع الطلايع --</option></select></div>
                <div id="evalCount" style="background:#e8f5e9; padding:10px; border-radius:10px; text-align:center;">سيتم الإرسال إلى <span id="evalCountNum">0</span> عضو</div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">إرسال</button>
                </div>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    const branchSel = document.getElementById('evalBranch');
    const subBranchSel = document.getElementById('evalSubBranch');
    const squadSel = document.getElementById('evalSquad');
    const countSpan = document.getElementById('evalCountNum');
    
    function updateCount() {
        const subBranchId = parseInt(subBranchSel.value);
        const squadId = squadSel.value;
        let count = 0;
        if (subBranchId) {
            if (squadId === 'all') count = appData.members.filter(m => m.subBranchId === subBranchId).length;
            else count = appData.members.filter(m => m.squadId == squadId).length;
        }
        countSpan.textContent = count;
    }
    
    function updateSubBranches() {
        const branchId = parseInt(branchSel.value);
        if (branchId) {
            const filtered = mySubBranches.filter(sb => sb.branchId === branchId);
            subBranchSel.innerHTML = '<option value="">-- اختر الهيئة --</option>' + filtered.map(sb => `<option value="${sb.id}">${sb.name}</option>`).join('');
            squadSel.innerHTML = '<option value="all">-- جميع الطلايع --</option>';
        } else {
            subBranchSel.innerHTML = '<option value="">-- اختر المجموعة أولاً --</option>';
        }
        updateCount();
    }
    
    function updateSquads() {
        const subBranchId = parseInt(subBranchSel.value);
        if (subBranchId) {
            const selected = mySubBranches.find(sb => sb.id === subBranchId);
            if (selected) {
                const squads = mySquads.filter(s => s.branchId === selected.branchId);
                squadSel.innerHTML = '<option value="all">-- جميع الطلايع --</option>' + squads.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            }
        }
        updateCount();
    }
    
    branchSel.onchange = () => { updateSubBranches(); updateCount(); };
    subBranchSel.onchange = () => { updateSquads(); updateCount(); };
    squadSel.onchange = updateCount;
    updateSubBranches();
    
    document.getElementById('sendEvalForm').onsubmit = async (e) => {
        e.preventDefault();
        const subBranchId = parseInt(subBranchSel.value);
        const squadId = squadSel.value;
        if (!subBranchId) { showToast('الرجاء اختيار الهيئة', 'error'); return; }
        
        let targetMembers = squadId === 'all' ? appData.members.filter(m => m.subBranchId === subBranchId) : appData.members.filter(m => m.squadId == squadId);
        if (targetMembers.length === 0) { showToast('⚠️ لا يوجد أعضاء', 'error'); return; }
        
        const leaderFormData = appData.leaderEvaluationForms.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
        if (leaderFormData) leaderFormData.sentToMembers = true;
        
        if (!appData.memberEvaluationForms) appData.memberEvaluationForms = [];
        targetMembers.forEach(member => {
            appData.memberEvaluationForms.push({
                id: Date.now() + Math.random(),
                formId: formId,
                memberId: member.id,
                leaderId: currentUser.id,
                sentAt: new Date().toISOString(),
                isAnswered: false,
                starRating: null,
                answers: [],
                formData: form
            });
        });
        
        await saveAllDataToFirebase();
        showToast(`✅ تم إرسال الفورم إلى ${targetMembers.length} عضو`);
        modal.remove();
        if (typeof window.renderLeaderEvaluationFormsPage === 'function') window.renderLeaderEvaluationFormsPage();
    };
};

console.log('✅ تم تحديث جميع دوال فورمات التقييم بنجاح');
// استدعاء التطبيق
startApp();
    </script>
