<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام الكشاف المتكامل </title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
      /* ==================== RESET & GLOBAL ==================== */
/* ==================== RESET & GLOBAL ==================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #1a472a, #0d2818, #0a1f12);
    min-height: 100vh;
    direction: rtl;
    overflow-x: hidden;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #2d5a3f; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #d4a017; border-radius: 10px; }

/* ==================== SIDEBAR ==================== */
.sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 999;
    visibility: hidden;
    opacity: 0;
    transition: 0.3s ease;
}

.sidebar-overlay.active {
    visibility: visible;
    opacity: 1;
}

.sidebar {
    position: fixed;
    top: 0;
    right: -280px;
    width: 260px;
    height: 100%;
    background: linear-gradient(180deg, #1a472a, #0d2818);
    z-index: 1000;
    transition: 0.3s ease;
    padding: 15px 0;
    box-shadow: -5px 0 30px rgba(0,0,0,0.3);
    overflow-y: auto;
    border-left: 1px solid rgba(212,160,23,0.3);
}

.sidebar.open { right: 0; }

.sidebar-header {
    padding: 15px 20px;
    border-bottom: 1px solid rgba(212,160,23,0.3);
    margin-bottom: 10px;
    text-align: center;
}

.sidebar-header h3 { 
    color: #d4a017; 
    font-size: 18px; 
    margin: 0;
}

.sidebar-header p { 
    color: rgba(255,255,255,0.7); 
    font-size: 11px; 
    margin: 5px 0 0;
}

.sidebar-menu {
    list-style: none;
    padding: 0;
}

.sidebar-menu li { margin-bottom: 5px; }

.sidebar-menu li a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    transition: 0.3s;
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
}

.sidebar-menu li a i {
    width: 24px;
    font-size: 18px;
    color: #d4a017;
}

.sidebar-menu li a:hover {
    background: rgba(212,160,23,0.15);
    padding-right: 30px;
    color: white;
}

.sidebar-menu li.active a {
    background: linear-gradient(90deg, #d4a017, #b8860b);
    color: #0d2818;
}

.sidebar-menu li.active a i { color: #0d2818; }

/* ==================== HAMBURGER BUTTON ==================== */
.hamburger {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    background: white;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    z-index: 1001;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    transition: 0.3s;
    border: 1px solid #d4a017;
}

.hamburger:hover { transform: scale(1.05); border-color: #d4a017; background: #fff; }

.hamburger span {
    width: 28px;
    height: 3px;
    background: #d4a017;
    border-radius: 3px;
    transition: 0.3s;
}

.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

/* ==================== HEADER ==================== */
.header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 12px 20px;
    margin-right: 80px;
    margin-left: 20px;
    margin-top: 20px;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    border: 1px solid rgba(212,160,23,0.3);
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.logo i { font-size: 24px; color: #d4a017; }
.logo h1 { font-size: 18px; color: #1a472a; }
.logo p { font-size: 9px; color: #666; }

.user-info {
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.05);
    padding: 5px 12px;
    border-radius: 40px;
    flex-shrink: 0;
}

.user-info i { font-size: 14px; color: #d4a017; }
.user-info span { font-size: 13px; font-weight: 600; color: #1a472a; }

.logout-btn {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
    border: none;
    padding: 5px 12px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
}

.logout-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(192,57,43,0.3); }

/* ==================== MAIN CONTENT ==================== */
.main-content {
    margin-right: 80px;
    margin-left: 20px;
    margin-top: 20px;
    padding: 15px;
    min-height: calc(100vh - 140px);
}

/* ==================== STATS CARDS ==================== */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    transition: 0.3s;
    border-right: 4px solid #d4a017;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.stat-card:hover { transform: translateY(-5px); background: white; }
.stat-card i { font-size: 40px; color: #d4a017; margin-bottom: 10px; }
.stat-card .number { font-size: 32px; font-weight: bold; color: #1a472a; }
.stat-card .label { font-size: 14px; color: #666; }

/* ==================== CARDS ==================== */
.card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.card h3 {
    color: #1a472a;
    margin-bottom: 18px;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid #d4a017;
    padding-bottom: 10px;
}

/* ==================== BUTTONS ==================== */
.btn {
    padding: 10px 22px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
    transition: 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary { background: #d4a017; color: white; }
.btn-success { background: #2ecc71; color: white; }
.btn-danger { background: #e74c3c; color: white; }
.btn-warning { background: #f39c12; color: white; }
.btn-info { background: #3498db; color: white; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn:hover { transform: translateY(-2px); }

/* ==================== SQUAD FILTER ==================== */
.squad-filter {
    padding: 15px;
    background: rgba(255,255,255,0.9);
    border-radius: 15px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    align-items: center;
    flex-wrap: wrap;
}

.squad-filter select, .squad-filter input {
    flex: 1;
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 30px;
    font-family: 'Cairo', sans-serif;
}

.broadcast-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
}

.broadcast-btn:hover { transform: translateY(-2px); }

/* ==================== TABLES ==================== */
.data-table {
    width: 100%;
    border-collapse: collapse;
    overflow-x: auto;
    display: block;
}

.data-table th, .data-table td {
    padding: 12px;
    text-align: right;
    border-bottom: 1px solid #eee;
}

.data-table th {
    background: #1a472a;
    color: white;
    font-weight: 600;
}

.data-table tr:hover { background: #f5f5f5; }

/* ==================== CHAT ==================== */
.chat-container {
    height: 500px;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    overflow: hidden;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f8f9fa;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 18px;
    position: relative;
}

.message.sent {
    background: linear-gradient(135deg, #d4a017, #b8860b);
    color: white;
    align-self: flex-start;
    border-bottom-right-radius: 5px;
}

.message.received {
    background: white;
    color: #333;
    align-self: flex-end;
    border-bottom-left-radius: 5px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.message .sender { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
.message .time { font-size: 9px; margin-top: 4px; text-align: left; opacity: 0.6; }

.chat-input-area {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: white;
    border-top: 1px solid #eee;
}

.chat-input-area input {
    flex: 1;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 30px;
    font-family: 'Cairo', sans-serif;
}

.chat-input-area input:focus { outline: none; border-color: #d4a017; }

.chat-input-area button {
    padding: 10px 20px;
    background: #d4a017;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

/* ==================== TASKS ==================== */
.task-item {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    border-right: 4px solid #d4a017;
}

.task-pending { background: #fff3cd; border-right-color: #f39c12; }
.task-completed { background: #e8f5e9; border-right-color: #2ecc71; }

.task-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 8px;
}

.task-title { font-weight: bold; font-size: 16px; }
.task-points { background: #d4a017; color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
.task-description { font-size: 13px; color: #666; margin-bottom: 8px; }
.task-meta { font-size: 11px; color: #999; }

.complete-task-btn {
    background: #2ecc71;
    color: white;
    border: none;
    padding: 6px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.3s;
}

.complete-task-btn:hover { transform: translateY(-2px); }

/* ==================== MODAL ==================== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    z-index: 2000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    border-radius: 25px;
    padding: 25px;
    max-width: 550px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
}

@keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #d4a017;
    padding-bottom: 12px;
}

.modal-header h3 { color: #1a472a; }

.close-modal {
    cursor: pointer;
    font-size: 24px;
    transition: 0.3s;
}

.close-modal:hover { color: #e74c3c; transform: rotate(90deg); }

/* ==================== FORM INPUTS ==================== */
.input-group { margin-bottom: 18px; }
.input-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
.input-group input, .input-group textarea, .input-group select {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
}
.input-group input:focus, .input-group select:focus { outline: none; border-color: #d4a017; }

.code-generator {
    display: flex;
    gap: 10px;
    align-items: center;
}
.code-generator input { flex: 1; }

/* ==================== BADGES ==================== */
.badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
}
.badge-active { background: #2ecc71; color: white; }
.badge-inactive { background: #e74c3c; color: white; }

/* ==================== DETAILS GRID ==================== */
.details-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.detail-item {
    background: #f8f9fa;
    padding: 12px;
    border-radius: 12px;
}

.detail-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.detail-value { font-size: 16px; font-weight: 600; color: #1a472a; }

/* ==================== FOOTER ==================== */
.footer {
    background: rgba(255,255,255,0.9);
    color: #666;
    padding: 15px;
    text-align: center;
    margin-top: 30px;
    border-top: 1px solid rgba(212,160,23,0.2);
}

/* ==================== LOGIN PAGE ==================== */
.login-container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a472a, #0d2818);
}

.login-box {
    background: white;
    border-radius: 30px;
    padding: 40px;
    width: 400px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.login-box i { font-size: 60px; color: #d4a017; margin-bottom: 15px; }
.login-box h2 { color: #1a472a; margin-bottom: 25px; }



/* ==================== GLOBAL LOGO (Fixed) ==================== */
.global-logo {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 10000;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 40px;
    border: 1px solid rgba(212,160,23,0.4);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.global-logo:hover {
    transform: translateX(-3px);
    border-color: #d4a017;
}

.global-logo-img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
}

.global-logo-text {
    font-weight: bold;
    color: #1a472a;
    font-size: 11px;
    white-space: nowrap;
}

/* ==================== SCOUT LOGO HEADER (Login Page) ==================== */
.scout-logo-header {
    position: fixed;
    top: 20px;
    right: 20px;
    left: auto;
    z-index: 1002;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(8px);
    padding: 6px 18px 6px 20px;
    border-radius: 50px;
    border: 1px solid rgba(212, 160, 23, 0.5);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.scout-logo-header .logo-circle {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    overflow: hidden;
    background: #d4a017;
    display: flex;
    align-items: center;
    justify-content: center;
}

.scout-logo-header .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.scout-logo-header .logo-text .logo-title {
    font-size: 16px;
    font-weight: bold;
    color: #1a472a;
    line-height: 1.2;
}

.scout-logo-header .logo-text .logo-subtitle {
    font-size: 11px;
    color: #666;
}

/* ==================== RESPONSIVE (MOBILE) ==================== */
@media (max-width: 768px) {
    /* General */
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .main-content { margin-right: 15px; margin-left: 15px; padding: 10px; }
    .header { margin-right: 65px; margin-left: 10px; padding: 8px 12px; flex-wrap: wrap; }
    .hamburger { width: 38px; height: 38px; top: 15px; right: 15px; }
    .hamburger span { width: 22px; height: 2.5px; }
    .details-grid { grid-template-columns: 1fr; }
    .message { max-width: 85%; }
    
    /* Header Elements */
    .logo i { font-size: 20px; }
    .logo h1 { font-size: 14px; }
    .logo p { font-size: 8px; display: none; }
    .user-info { padding: 3px 10px; gap: 6px; }
    .user-info span { font-size: 11px; }
    .logout-btn { padding: 4px 10px; font-size: 10px; }
    
    /* Stats Cards */
    .stat-card { padding: 12px; }
    .stat-card i { font-size: 28px; }
    .stat-card .number { font-size: 22px; }
    .stat-card .label { font-size: 11px; }
    
    /* Tables */
    .data-table { font-size: 11px; }
    .data-table th, .data-table td { padding: 6px; }
    
    /* Buttons */
    .btn { padding: 6px 12px; font-size: 12px; }
    .btn-sm { padding: 4px 8px; font-size: 10px; }
    
    /* Tasks */
    .task-item { padding: 10px; }
    .task-title { font-size: 14px; }
    .task-points { font-size: 10px; }
    
    /* Global Logo */
    .global-logo { padding: 4px 10px; top: 12px; left: 12px; }
    .global-logo-img { width: 28px; height: 28px; }
    .global-logo-text { font-size: 9px; }
    
    /* Landing Page */
    .hero-content { padding: 30px 25px; margin: 0 15px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); }
    .organization-name h2 { font-size: 22px; }
    .main-headline { font-size: 20px; }
    .features-grid-landing { grid-template-columns: 1fr; gap: 10px; }
    .login-main-btn { padding: 12px 30px; font-size: 16px; }
    
    .landing-header { padding: 10px 15px; }
    .landing-header-logo img { width: 35px; height: 35px; }
    .logo-text-header .logo-title { font-size: 12px; }
    .logo-text-header .logo-subtitle { font-size: 9px; }
    .landing-header-login-btn { padding: 6px 15px; font-size: 12px; }
    
    /* Tent & Flame */
    .floating-tent { width: 80px; height: 80px; }
    .floating-tent i { font-size: 45px; }
    .scout-image-right.show { width: 200px; height: 180px; }
    .flame-icon { font-size: 45px; }
    .flame-image.show { width: 200px; height: 180px; }
    
    /* Hide side animations on mobile */
    .tent-animation-area,
    .flame-animation-area {
        display: none;
    }
    
    /* Login Box */
    .login-box { width: 90%; padding: 25px 20px; }
    .login-box i { font-size: 45px; }
    .login-box h2 { font-size: 22px; }
    
    /* Sidebar */
    .sidebar { width: 260px; }
}

/* Very Small Screens */
@media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: stretch; text-align: center; }
    .user-info { justify-content: center; }
    .main-content { margin-right: 10px; margin-left: 10px; }
    .sidebar { width: 220px; right: -220px; }
    
    .scout-image-right.show { width: 240px; height: 170px; }
    .flame-image.show { width: 240px; height: 170px; }
    .floating-tent { width: 60px; height: 60px; }
    .floating-tent i { font-size: 35px; }
    .hero-content { padding: 20px; }
    .organization-name h2 { font-size: 20px; }
}
/* زر تسجيل الخروج في المينيو الجانبي */
.sidebar-menu li:last-child a {
    color: #e74c3c !important;
}
.sidebar-menu li:last-child a i {
    color: #e74c3c !important;
}
.sidebar-menu li:last-child a:hover {
    background: rgba(231, 76, 60, 0.2);
}
/* ==================== PAGE LOAD ANIMATIONS ==================== */

/* Animation keyframes */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInLeft {
    from {
        opacity: 0;
        transform: translateX(-30px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes fadeInRight {
    from {
        opacity: 0;
        transform: translateX(30px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes scaleIn {
    from {
        opacity: 0;
        transform: scale(0.8);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes slideInDown {
    from {
        opacity: 0;
        transform: translateY(-50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes zoomIn {
    from {
        opacity: 0;
        transform: scale(0.5);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes bounceIn {
    0% {
        opacity: 0;
        transform: scale(0.3);
    }
    50% {
        opacity: 1;
        transform: scale(1.05);
    }
    70% {
        transform: scale(0.9);
    }
    100% {
        transform: scale(1);
    }
}

@keyframes flipIn {
    from {
        opacity: 0;
        transform: perspective(400px) rotateX(90deg);
    }
    to {
        opacity: 1;
        transform: perspective(400px) rotateX(0);
    }
}

/* تطبيق الأنيميشن على العناصر */

/* الهيدر */
.header {
    animation: slideInDown 0.6s ease forwards;
}

/* بطاقات الإحصائيات (تظهر واحدة تلو الأخرى) */
.stat-card {
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
}

.stat-card:nth-child(1) { animation-delay: 0.1s; }
.stat-card:nth-child(2) { animation-delay: 0.2s; }
.stat-card:nth-child(3) { animation-delay: 0.3s; }
.stat-card:nth-child(4) { animation-delay: 0.4s; }
.stat-card:nth-child(5) { animation-delay: 0.5s; }
.stat-card:nth-child(6) { animation-delay: 0.6s; }

/* الكروت (Cards) */
.card {
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
}

.card:nth-child(1) { animation-delay: 0.15s; }
.card:nth-child(2) { animation-delay: 0.3s; }
.card:nth-child(3) { animation-delay: 0.45s; }
.card:nth-child(4) { animation-delay: 0.6s; }
.card:nth-child(5) { animation-delay: 0.75s; }

/* الأزرار */
.btn, .broadcast-btn, .logout-btn {
    opacity: 0;
    animation: scaleIn 0.4s ease forwards;
}

.btn:nth-child(1) { animation-delay: 0.1s; }
.btn:nth-child(2) { animation-delay: 0.2s; }
.btn:nth-child(3) { animation-delay: 0.3s; }

/* عناصر الجدول (الصفوف تظهر واحدة تلو الأخرى) */
.data-table tr {
    opacity: 0;
    animation: fadeInRight 0.3s ease forwards;
}

.data-table tr:nth-child(1) { animation-delay: 0.05s; }
.data-table tr:nth-child(2) { animation-delay: 0.1s; }
.data-table tr:nth-child(3) { animation-delay: 0.15s; }
.data-table tr:nth-child(4) { animation-delay: 0.2s; }
.data-table tr:nth-child(5) { animation-delay: 0.25s; }
.data-table tr:nth-child(6) { animation-delay: 0.3s; }
.data-table tr:nth-child(7) { animation-delay: 0.35s; }
.data-table tr:nth-child(8) { animation-delay: 0.4s; }
.data-table tr:nth-child(9) { animation-delay: 0.45s; }
.data-table tr:nth-child(10) { animation-delay: 0.5s; }

/* عناصر المهام (Task items) */
.task-item {
    opacity: 0;
    animation: fadeInLeft 0.4s ease forwards;
}

.task-item:nth-child(1) { animation-delay: 0.1s; }
.task-item:nth-child(2) { animation-delay: 0.2s; }
.task-item:nth-child(3) { animation-delay: 0.3s; }
.task-item:nth-child(4) { animation-delay: 0.4s; }
.task-item:nth-child(5) { animation-delay: 0.5s; }

/* رسائل الدردشة */
.message {
    opacity: 0;
    animation: fadeInUp 0.3s ease forwards;
}

.message:nth-child(1) { animation-delay: 0.05s; }
.message:nth-child(2) { animation-delay: 0.1s; }
.message:nth-child(3) { animation-delay: 0.15s; }
.message:nth-child(4) { animation-delay: 0.2s; }
.message:nth-child(5) { animation-delay: 0.25s; }

/* عناصر الفلتر */
.squad-filter {
    opacity: 0;
    animation: slideInDown 0.5s ease forwards;
    animation-delay: 0.1s;
}

/* عناصر السايدبار */
.sidebar {
    animation: fadeInRight 0.4s ease;
}

.sidebar-menu li {
    opacity: 0;
    animation: fadeInLeft 0.3s ease forwards;
}

.sidebar-menu li:nth-child(1) { animation-delay: 0.05s; }
.sidebar-menu li:nth-child(2) { animation-delay: 0.1s; }
.sidebar-menu li:nth-child(3) { animation-delay: 0.15s; }
.sidebar-menu li:nth-child(4) { animation-delay: 0.2s; }
.sidebar-menu li:nth-child(5) { animation-delay: 0.25s; }
.sidebar-menu li:nth-child(6) { animation-delay: 0.3s; }

/* الفوتر */
.footer {
    opacity: 0;
    animation: fadeInUp 0.5s ease forwards;
    animation-delay: 0.3s;
}

/* عناصر المودال */
.modal-content {
    animation: zoomIn 0.3s ease forwards;
}

/* عناصر الإحصائيات الداخلية */
.details-grid .detail-item {
    opacity: 0;
    animation: fadeInRight 0.3s ease forwards;
}

.detail-item:nth-child(1) { animation-delay: 0.05s; }
.detail-item:nth-child(2) { animation-delay: 0.1s; }
.detail-item:nth-child(3) { animation-delay: 0.15s; }
.detail-item:nth-child(4) { animation-delay: 0.2s; }
.detail-item:nth-child(5) { animation-delay: 0.25s; }
.detail-item:nth-child(6) { animation-delay: 0.3s; }
.detail-item:nth-child(7) { animation-delay: 0.35s; }
.detail-item:nth-child(8) { animation-delay: 0.4s; }

/* القادة في صفحة إدارة القادة */
#leadersList > div {
    opacity: 0;
    animation: bounceIn 0.5s ease forwards;
}

#leadersList > div:nth-child(1) { animation-delay: 0.1s; }
#leadersList > div:nth-child(2) { animation-delay: 0.2s; }
#leadersList > div:nth-child(3) { animation-delay: 0.3s; }
#leadersList > div:nth-child(4) { animation-delay: 0.4s; }
#leadersList > div:nth-child(5) { animation-delay: 0.5s; }

/* المناطق والطلايع في صفحة الإدارة */
#squadsList > div {
    opacity: 0;
    animation: flipIn 0.5s ease forwards;
}

#squadsList > div:nth-child(1) { animation-delay: 0.1s; }
#squadsList > div:nth-child(2) { animation-delay: 0.2s; }
#squadsList > div:nth-child(3) { animation-delay: 0.3s; }

/* hover effect للعناصر */
.stat-card, .card, .btn, .task-item, .message {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.stat-card:hover, .card:hover {

}

/* تنسيق عام للعناصر المخفية قبل الأنيميشن */
.stat-card, .card, .btn, .data-table tr, 
.task-item, .message, .squad-filter, 
.sidebar-menu li, .footer, .detail-item,
#leadersList > div, #squadsList > div {

body.loaded .stat-card,
body.loaded .card,
body.loaded .btn,
body.loaded .data-table tr,
body.loaded .task-item,
body.loaded .message,
body.loaded .squad-filter,
body.loaded .sidebar-menu li,
body.loaded .footer,
body.loaded .detail-item,
body.loaded #leadersList > div,

/* ==================== DARK/LIGHT MODE VARIABLES ==================== */

    --text-secondary: #666666;

    --gold-dark: #b8860b;
    --header-bg: rgba(255,255,255,0.95);
    --sidebar-bg: linear-gradient(180deg, #1a472a, #0d2818);
    --sidebar-text: rgba(255,255,255,0.85);

    --message-sent: linear-gradient(135deg, #c9a03d, #a07c2a);
    --message-received: #f5f5f5;
    --input-border: #cccccc;

    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
}

    position: absolute;
    font-size: 30px;
    opacity: 0.15;
    animation: swim 15s linear infinite;
}

.fish1 { bottom: 10%; left: -50px; animation-duration: 12s; }
.fish2 { bottom: 20%; left: -80px; animation-duration: 18s; animation-delay: 2s; }
.fish3 { bottom: 5%; left: -30px; animation-duration: 14s; animation-delay: 5s; }

    0% { transform: translateX(0) scaleX(1); }
    49% { transform: translateX(calc(100vw + 100px)) scaleX(1); }
    50% { transform: translateX(calc(100vw + 100px)) scaleX(-1); }

    100% { background-position-x: 800px; }
}

/* Floating elements - Anchors & Ropes */
.floating-anchor-new {
    position: absolute;
    font-size: 60px;

    opacity: 0.2;
    animation: floatAnchorNew 6s ease-in-out infinite;
    z-index: 0;
}

.floating-anchor-new:nth-child(3) { top: 20%; right: 5%; animation-delay: 4s; font-size: 35px; }

    50% { transform: translateY(-15px) rotate(5deg); }
}

/* Rope decoration */
.rope-decoration {
    position: absolute;
    height: 3px;
    background: linear-gradient(90deg, transparent, #8d6e63, #a1887f, #8d6e63, transparent);
    border-radius: 2px;
    z-index: 0;
    opacity: 0.3;
}

.rope-decoration:nth-child(4) { top: 10%; left: 0; width: 100%; animation: ropeWave 8s ease-in-out infinite; }
.rope-decoration:nth-child(5) { top: 15%; left: 10%; width: 80%; animation: ropeWave 10s ease-in-out infinite reverse; }

.fish-new:nth-child(8) { bottom: 15%; left: -30px; animation-duration: 14s; animation-delay: 5s; }

    0% { transform: translateX(0) scaleX(1); }
    49% { transform: translateX(calc(100vw + 100px)) scaleX(1); }
    50% { transform: translateX(calc(100vw + 100px)) scaleX(-1); }

// دالة تعديل بيانات القائد
function editLeader(leaderId) {
    const leader = appData.leaders.find(l => l.id === leaderId);
    if (!leader) return;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:600px;">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> تعديل بيانات القائد: ${leader.name}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <form id="editLeaderForm">
                <div class="input-group"><label>الاسم الكامل</label><input type="text" id="editLeaderName" value="${escapeHtml(leader.name)}" required></div>
                <div class="input-group"><label>السن</label><input type="number" id="editLeaderAge" value="${leader.age}" min="18" max="70" required></div>
                <div class="input-group"><label>رقم الهاتف</label><input type="tel" id="editLeaderPhone" value="${leader.phone}" required></div>
                <div class="input-group"><label>المنطقة</label>
                    <select id="editLeaderBranch" required>
                        <option value="">-- اختر المنطقة --</option>
                        ${appData.branches.map(b => `<option value="${b.id}" ${b.id === leader.branchId ? 'selected' : ''}>${b.name}</option>`).join('')}
                    </select>
                </div>
                <div class="input-group"><label>الفروع المسؤول عنها (يمكن اختيار أكثر من فرع)</label>
                    <div id="editLeaderSubBranchesContainer" style="background: #f8f9fa; padding: 12px; border-radius: 12px; max-height: 200px; overflow-y: auto; border: 2px solid #e0e0e0;">
                        ${getSubBranchesCheckboxes(leader.branchId, leader.subBranchIds)}
                    </div>
                </div>
                <div class="input-group"><label>اسم المستخدم</label><input type="text" id="editLeaderUsername" value="${leader.username}" required></div>
                <div class="input-group"><label>كلمة المرور (اتركه فارغاً للحفاظ على نفس كلمة المرور)</label><input type="password" id="editLeaderPassword" placeholder="كلمة مرور جديدة"></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">حفظ التعديلات</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    // عند تغيير المنطقة، نحدث قائمة الفروع
    document.getElementById('editLeaderBranch').addEventListener('change', function() {
        const branchId = parseInt(this.value);
        const container = document.getElementById('editLeaderSubBranchesContainer');
        if (branchId) {
            container.innerHTML = getSubBranchesCheckboxes(branchId, leader.subBranchIds);
        } else {
            container.innerHTML = '<div style="text-align:center; color:#999;">-- اختر المنطقة أولاً --</div>';
        }
    });
    
    document.getElementById('editLeaderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('editLeaderUsername').value;
        if (username !== leader.username) {
            if (appData.leaders.some(l => l.username === username)) {
                showToast('اسم المستخدم موجود مسبقاً', 'error');
                return;
            }
            if (appData.members.some(m => m.username === username)) {
                showToast('اسم المستخدم مستخدم من قبل عضو', 'error');
                return;
            }
        }
        
        // جمع الفروع المختارة
        const selectedSubBranches = [];
        document.querySelectorAll('#editLeaderSubBranchesContainer input[type="checkbox"]:checked').forEach(cb => {
            selectedSubBranches.push({
                id: parseInt(cb.value),
                name: cb.getAttribute('data-name')
            });
        });
        
        if (selectedSubBranches.length === 0) {
            showToast('الرجاء اختيار فرع واحد على الأقل', 'error');
            return;
        }
        
        // تحديث بيانات القائد
        leader.name = document.getElementById('editLeaderName').value;
        leader.age = parseInt(document.getElementById('editLeaderAge').value);
        leader.phone = document.getElementById('editLeaderPhone').value;
        leader.branchId = parseInt(document.getElementById('editLeaderBranch').value);
        leader.subBranchIds = selectedSubBranches.map(sb => sb.id);
        leader.subBranches = selectedSubBranches;
        leader.username = username;
        const newPassword = document.getElementById('editLeaderPassword').value;
        if (newPassword) leader.password = newPassword;
        
        await saveAllDataToFirebase();
        showToast('تم تحديث بيانات القائد بنجاح');
        modal.remove();
        renderLeadersList();
    });
}

// دالة مساعدة للحصول على checked boxes للفروع
function getSubBranchesCheckboxes(branchId, selectedSubBranchIds) {
    if (!branchId) return '<div style="text-align:center; color:#999;">-- اختر المنطقة أولاً --</div>';
    
    const branches = appData.subBranches.filter(sb => sb.branchId === branchId);
    if (branches.length === 0) {
        return '<div style="text-align:center; color:#999;">لا توجد فروع في هذه المنطقة</div>';
    }
    
    return branches.map(sb => `
        <label style="display: flex; align-items: center; gap: 10px; padding: 8px; margin: 4px 0; background: white; border-radius: 8px; cursor: pointer;">
            <input type="checkbox" class="subBranchCheckbox" value="${sb.id}" data-name="${sb.name}" ${selectedSubBranchIds?.includes(sb.id) ? 'checked' : ''}>
            <span><i class="fas fa-code-branch"></i> ${sb.name}</span>
        </label>
    `).join('');
}

            appData.branches = data.branches || [];
            appData.subBranches = data.subBranches || [];  // <-- أضف هذا
            appData.squads = data.squads || [];
            appData.members = data.members || [];
            appData.leaders = data.leaders || [];          // <-- أضف هذا
            appData.tasks = data.tasks || [];
            appData.taskSubmissions = data.taskSubmissions || [];
            appData.messages = data.messages || [];
            appData.joinRequests = data.joinRequests || [];
            
            if (oldRequestsLength !== appData.joinRequests.length && isAdmin) {
                updatePendingRequestsBadge();
                showToast(`📋 يوجد ${appData.joinRequests.filter(r => r.status === 'pending').length} طلب انضمام جديد`, 'info');
            }
            
            if (oldMembersLength !== appData.members.length && document.getElementById('membersTable')) {
                renderMembersTable();
            }
            if (document.getElementById('adminPageContent')) {
                refreshCurrentAdminPage();
            }
            if (document.getElementById('memberPageContent')) {
                refreshCurrentMemberPage();
            }
            if (document.getElementById('leaderPageContent')) {
                refreshCurrentLeaderPage();
            }
            showToast('تم تحديث البيانات', 'info');
        }
    });
}

// ==================== DARK/LIGHT MODE FUNCTIONS ====================
function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
    } else {
        document.body.classList.remove('light-mode');
    }
    addThemeToggleButton();
}

function addThemeToggleButton() {
    // إزالة الزر القديم إذا وجد
    const oldBtn = document.getElementById('themeToggleBtn');
    if (oldBtn) oldBtn.remove();
    
    // نبحث عن الهيدر العلوي
    const header = document.querySelector('.header');
    if (!header) return;
    
    // نبحث عن user-info (القسم الذي يحتوي على اسم المستخدم والأزرار)
    let userInfoDiv = header.querySelector('.user-info');
    
    if (!userInfoDiv) {
        // إذا لم نجد user-info، ننشئه
        userInfoDiv = document.createElement('div');
        userInfoDiv.className = 'user-info';
        userInfoDiv.style.display = 'flex';
        userInfoDiv.style.alignItems = 'center';
        userInfoDiv.style.gap = '10px';
        userInfoDiv.style.backgroundColor = 'rgba(0,0,0,0.05)';
        userInfoDiv.style.padding = '5px 15px';
        userInfoDiv.style.borderRadius = '40px';
        header.appendChild(userInfoDiv);
    }
    
    // ننشئ زر تغيير الوضع
    const themeBtn = document.createElement('div');
    themeBtn.id = 'themeToggleBtn';
    themeBtn.style.display = 'inline-flex';
    themeBtn.style.alignItems = 'center';
    themeBtn.style.justifyContent = 'center';
    themeBtn.style.width = '38px';
    themeBtn.style.height = '38px';
    themeBtn.style.borderRadius = '50%';
    themeBtn.style.backgroundColor = 'white';
    themeBtn.style.cursor = 'pointer';
    themeBtn.style.border = '1px solid #d4a017';
    themeBtn.style.transition = 'all 0.3s ease';
    
    const isLight = document.body.classList.contains('light-mode');
    themeBtn.innerHTML = `<i class="fas ${isLight ? 'fa-sun' : 'fa-moon'}" style="font-size: 18px; color: #d4a017;"></i>`;
    
    // وظيفة الضغط على الزر
    themeBtn.onclick = (e) => {
        e.stopPropagation();
        if (document.body.classList.contains('light-mode')) {
            document.body.classList.remove('light-mode');
            localStorage.setItem('theme', 'dark');
            themeBtn.innerHTML = '<i class="fas fa-moon" style="font-size: 18px; color: #d4a017;"></i>';
        } else {
            document.body.classList.add('light-mode');
            localStorage.setItem('theme', 'light');
            themeBtn.innerHTML = '<i class="fas fa-sun" style="font-size: 18px; color: #d4a017;"></i>';
        }
    };
    
    // البحث عن زر المنزل
    const homeBtn = document.getElementById('homeBtnWrapper');
    
    if (homeBtn) {
        // نضيف زر الوضع قبل زر المنزل مباشرة (بجانبه)
        userInfoDiv.insertBefore(themeBtn, homeBtn);
    } else {
        // إذا لم نجد زر المنزل، نضيفه في نهاية user-info
        userInfoDiv.appendChild(themeBtn);
    }
}

function updateLandingStats() {
    const membersCount = document.getElementById('statMembers');

    const tasksCount = document.getElementById('statTasks');
    const pointsCount = document.getElementById('statPoints');
    
    if (membersCount) animateNumber(membersCount, 0, appData.members.length, 2000);
    if (squadsCount) animateNumber(squadsCount, 0, appData.squads.length, 2000);
    if (tasksCount) animateNumber(tasksCount, 0, appData.taskSubmissions.filter(ts => ts.status === 'completed').length, 2000);
    if (pointsCount) animateNumber(pointsCount, 0, appData.members.reduce((sum, m) => sum + m.points, 0), 2000);
}

function animateNumber(element, start, end, duration) {
    let startTime = null;
    const step = (timestamp) => {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        element.textContent = Math.floor(progress * (end - start) + start);
        if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
}

async function approveJoinRequest(requestId) {
    const request = appData.joinRequests.find(r => r.id === requestId);
    if (!request) return;
    
    const newMember = {
        id: Date.now(),
        code: request.code,
        name: request.name,
        age: request.age,
        rank: request.rank,
        username: request.username,
        password: request.password,
        phone: request.phone,
        branchId: request.branchId,
        squadId: request.squadId,
        squadType: request.squadType || 'الكشافة',  // حفظ نوع الطليعة مع العضو
        points: 0,
        joinedAt: new Date().toISOString()
    };
    
    appData.members.push(newMember);
    appData.joinRequests = appData.joinRequests.filter(r => r.id !== requestId);
    
    await saveAllDataToFirebase();
    document.querySelectorAll('.modal').forEach(m => m.remove());
    showToast(`✅ تم قبول ${request.name} وأضيف إلى الطليعة بنجاح`);
    
    if (isAdmin && document.getElementById('adminPageContent')) {
        renderMembersTable();
        renderAdminDashboard();
    }
}

async function rejectJoinRequest(requestId) {

    if (!request) return;
    
    appData.joinRequests = appData.joinRequests.filter(r => r.id !== requestId);
    await saveAllDataToFirebase();
    document.querySelectorAll('.modal').forEach(m => m.remove());
    showToast(`❌ تم رفض طلب ${request.name}`);
    
    if (isAdmin && document.getElementById('adminPageContent')) {

}

        return;
    }
    
    const tasksHtml = activeTasks.map(task => {
        const squad = appData.squads.find(s => s.id === task.squadId);
        const endDate = new Date(task.endDate);
        const timeRemaining = endDate - now;
        
        let countdownText = '';
        let isExpired = false;
        
        if (timeRemaining > 0) {
            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeRemaining % (86400000)) / (3600000));
            const minutes = Math.floor((timeRemaining % 3600000) / 60000);
            const seconds = Math.floor((timeRemaining % 60000) / 1000);
            countdownText = `${days} يوم ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية`;
        } else {
            countdownText = 'انتهى الوقت';
            isExpired = true;
        }
        
        return `
            <div class="task-item" style="${isExpired ? 'opacity: 0.6; background: #f0f0f0;' : ''}">
                <div class="task-header">
                    <span class="task-title">${escapeHtml(task.title)}</span>
                    <span class="task-points">${task.pointsValue} نقطة</span>
                </div>
                <div class="task-description">${escapeHtml(task.description)}</div>
                <div class="task-meta">
                    <i class="fas fa-flag"></i> ${squad?.name || '-'} | 
                    <i class="fas fa-calendar-alt"></i> بدأ: ${new Date(task.startDate).toLocaleString('ar-EG')} | 
                    <i class="fas fa-calendar-times"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}
                </div>
                <div class="task-countdown" style="margin-top: 10px; padding: 8px; background: ${isExpired ? '#e74c3c20' : '#d4a01720'}; border-radius: 10px;">
                    <i class="fas ${isExpired ? 'fa-hourglass-end' : 'fa-hourglass-half'}"></i>
                    <strong>${isExpired ? '⏰ انتهى الموعد النهائي' : '⏳ الوقت المتبقي: ' + countdownText}</strong>
                </div>
            </div>
        `;
    }).join('');
    
    container.innerHTML = `
        <div style="margin-bottom: 15px;">
            <span class="badge badge-active"><i class="fas fa-play-circle"></i> التكاليف النشطة: ${activeTasks.length}</span>
        </div>
        ${tasksHtml}
    `;
}

        function renderMembersTable() {
    const searchTerm = document.getElementById('memberSearch')?.value?.toLowerCase() || '';
    const branchFilter = document.getElementById('branchFilter')?.value || '';
    const squadFilter = document.getElementById('squadFilter')?.value || '';
    
    // ترتيب الرتب حسب الأهمية
    const rankOrder = {
        'عريف اول': 1,
        'عريف': 2,
        'سكرتير': 3,
        'امين صندوق': 4,
        'مساعد عريف اول': 5,
        'مساعد عريف': 6
    };
    
    let filtered = appData.members.filter(m => 
        (m.name.toLowerCase().includes(searchTerm) || m.code.toLowerCase().includes(searchTerm) || m.username.toLowerCase().includes(searchTerm)) &&
        (branchFilter === '' || m.branchId == branchFilter) &&
        (squadFilter === '' || m.squadId == squadFilter)
    );
    
    // ترتيب الأعضاء حسب الرتبة (الأعلى أولاً)
    filtered.sort((a, b) => {
        const orderA = rankOrder[a.rank] || 999;
        const orderB = rankOrder[b.rank] || 999;
        return orderA - orderB;
    });
    
    const container = document.getElementById('membersTable');
    container.innerHTML = `
        <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>الكود</th><th>الاسم</th><th>الرتبة</th><th>اسم المستخدم</th><th>الهاتف</th><th>الطليعة</th><th>النقاط</th><th>الإجراءات</th></tr></thead><tbody>
        ${filtered.map(m => `<tr>
            <td>${m.code}</td>
            <td>${m.name}${m.id === currentUser?.id ? ' <span class="badge" style="background:#d4a017;">أنت</span>' : ''}</td>
            <td><span class="badge" style="background:${m.rank === 'عريف اول' ? '#d4a017' : '#666'};">${m.rank || 'عضو'}</span></td>
            <td>${m.username}</td>
            <td>${m.phone}</td>
            <td>${appData.squads.find(s => s.id === m.squadId)?.name || '-'}</td>
            <td>${m.points}</td>
            <td>
                <button class="btn btn-sm btn-info" onclick="showMemberDetails(${m.id})"><i class="fas fa-eye"></i></button>
                <button class="btn btn-sm btn-warning" onclick="showEditMemberModal(${m.id})"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-success" onclick="showAdjustPointsModal(${m.id})"><i class="fas fa-plus-circle"></i></button>
                <button class="btn btn-sm btn-danger" onclick="deleteMember(${m.id})"><i class="fas fa-trash"></i></button>
                            </td>
        `).join('')}
        ${filtered.length === 0 ? '<tr><td colspan="8" style="text-align:center;">لا توجد بيانات</td></tr>' : ''}
        </tbody></table></div>
    `;
}

// تغيير صفحات القائد
function changeLeaderPage(page) {
    document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
    document.querySelector(`.sidebar-menu li[data-page="${page}"]`)?.classList.add('active');

// لوحة تحكم القائد
function renderLeaderDashboard() {
    const leader = currentUser;
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    const now = new Date();
    const activeTasks = appData.tasks.filter(t => mySquadIds.includes(t.squadId) && new Date(t.endDate) > now);
    const pendingJoinRequests = appData.joinRequests.filter(r => mySquadIds.includes(r.squadId) && r.status === 'pending');
    
    const container = document.getElementById('leaderPageContent');
    container.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><div class="number">${myMembers.length}</div><div class="label">الأعضاء</div></div>
            <div class="stat-card"><i class="fas fa-flag-checkered"></i><div class="number">${mySquads.length}</div><div class="label">الطلايع</div></div>
            <div class="stat-card"><i class="fas fa-tasks"></i><div class="number">${activeTasks.length}</div><div class="label">تكاليف نشطة</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="changeLeaderPage('joinRequests')"><i class="fas fa-user-plus"></i><div class="number" style="color:${pendingJoinRequests.length > 0 ? '#e74c3c' : '#2ecc71'};">${pendingJoinRequests.length}</div><div class="label">طلبات انضمام</div></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-trophy"></i> ترتيب الأعضاء</h3>
            <div class="squad-filter" style="margin-bottom: 15px;">
                <select id="leaderRankingFilter" onchange="updateLeaderRankingList()" style="width:100%; padding:10px; border-radius:30px;">
                    <option value="all">🏆 جميع الطلائع (أفضل 5 أعضاء)</option>
                    ${mySquads.map(s => `<option value="${s.id}">🏴 ${s.name} (جميع الأعضاء)</option>`).join('')}
                </select>
            </div>
            <div id="leaderRankingList"></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-hourglass-half"></i> التكاليف النشطة</h3>
            <div id="leaderActiveTasksList"></div>
        </div>
    `;
    
    updateLeaderRankingList();
    
    if (activeTasks.length === 0) {
        document.getElementById('leaderActiveTasksList').innerHTML = '<p style="text-align:center;">🎉 لا توجد تكاليف نشطة حالياً</p>';
    } else {
        const tasksHtml = activeTasks.map(task => {
            const squad = appData.squads.find(s => s.id === task.squadId);
            const endDate = new Date(task.endDate);
            const timeRemaining = endDate - now;
            let countdownText = timeRemaining > 0 ? `${Math.floor(timeRemaining / (1000*60*60*24))} يوم ${Math.floor((timeRemaining % 86400000) / 3600000)} ساعة` : 'انتهى الوقت';
            return `<div class="task-item"><div class="task-header"><span class="task-title">${escapeHtml(task.title)}</span><span class="task-points">${task.pointsValue} نقطة</span></div><div class="task-description">${escapeHtml(task.description)}</div><div class="task-meta"><i class="fas fa-flag"></i> ${squad?.name || '-'} | <i class="fas fa-calendar"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}</div><div class="task-countdown" style="margin-top:8px; padding:6px; background:#d4a01720; border-radius:8px;"><i class="fas fa-hourglass-half"></i> الوقت المتبقي: ${countdownText}</div></div>`;
        }).join('');
        document.getElementById('leaderActiveTasksList').innerHTML = tasksHtml;
    }
}
function updateLeaderRankingList() {
    const leader = currentUser;
    const filterValue = document.getElementById('leaderRankingFilter')?.value || 'all';
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    let myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    myMembers.sort((a, b) => b.points - a.points);
    
    const listContainer = document.getElementById('leaderRankingList');
    if (!listContainer) return;
    
    if (filterValue === 'all') {
        const topMembers = myMembers.slice(0, 5);
        if (topMembers.length === 0) { listContainer.innerHTML = '<p style="text-align:center;">لا يوجد أعضاء</p>'; return; }
        const rankingHtml = topMembers.map((member, idx) => {
            const squad = appData.squads.find(s => s.id === member.squadId);
            const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '📌';
            return `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;"><div style="display:flex; align-items:center; gap:10px;"><span style="font-size:22px;">${medal}</span><div><strong>${escapeHtml(member.name)}</strong><br><small style="color:#666;">${squad?.name || '-'} | ${member.rank}</small></div></div><div><strong style="color:#1a472a;">${member.points}</strong> نقطة</div></div>`;
        }).join('');
        listContainer.innerHTML = `<div style="margin-bottom:15px; text-align:center;"><span class="badge badge-active">🏆 أفضل 5 أعضاء</span></div>${rankingHtml}`;
    } else {
        const squadMembers = myMembers.filter(m => m.squadId == filterValue);
        if (squadMembers.length === 0) { listContainer.innerHTML = '<p style="text-align:center;">لا يوجد أعضاء في هذه الطليعة</p>'; return; }
        const squad = appData.squads.find(s => s.id == filterValue);
        const rankingHtml = squadMembers.map((member, idx) => `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;"><div style="display:flex; align-items:center; gap:10px;"><span style="background:${idx === 0 ? '#d4a017' : idx === 1 ? '#c0c0c0' : idx === 2 ? '#cd7f32' : '#666'}; color:white; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${idx+1}</span><div><strong>${escapeHtml(member.name)}</strong><br><small>${member.rank} | ${member.points} نقطة</small></div></div><div><strong style="color:#1a472a;">${member.points}</strong> نقطة</div></div>`).join('');
        listContainer.innerHTML = `<div style="margin-bottom:15px; text-align:center;"><h4 style="color:#1a472a;">🏴 ${squad?.name || ''}</h4><span class="badge badge-active">إجمالي الأعضاء: ${squadMembers.length}</span></div>${rankingHtml}`;
    }
}

function startLeaderCountdownUpdater() {
    if (leaderCountdownInterval) clearInterval(leaderCountdownInterval);
    leaderCountdownInterval = setInterval(() => {
        if (document.getElementById('leaderPageContent') && currentUser && isLeader) {
            renderLeaderDashboard();
        }
    }, 60000); // تحديث كل دقيقة
}

function stopLeaderCountdownUpdater() {
    if (leaderCountdownInterval) {
        clearInterval(leaderCountdownInterval);
        leaderCountdownInterval = null;
    }
}

function filterLeaderMembers() {
    const leader = currentUser;
    const searchTerm = document.getElementById('leaderMemberSearch')?.value?.toLowerCase() || '';
    const squadFilter = document.getElementById('leaderSquadFilter')?.value || 'all';
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    let myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    
    if (squadFilter !== 'all') {
        myMembers = myMembers.filter(m => m.squadId == squadFilter);
    }
    if (searchTerm) {
        myMembers = myMembers.filter(m => m.name.toLowerCase().includes(searchTerm) || m.code.toLowerCase().includes(searchTerm));
    }
    
    const rankOrder = { 'عريف اول': 1, 'عريف': 2, 'سكرتير': 3, 'امين صندوق': 4, 'مساعد عريف اول': 5, 'مساعد عريف': 6 };
    myMembers.sort((a, b) => (rankOrder[a.rank] || 999) - (rankOrder[b.rank] || 999));
    
    const tableHtml = `
        <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>الكود</th><th>الاسم</th><th>الرتبة</th><th>اسم المستخدم</th><th>الهاتف</th><th>الطليعة</th><th>النقاط</th><th>الإجراءات</th></tr></thead><tbody>
        ${myMembers.map(m => {
            const squad = appData.squads.find(s => s.id === m.squadId);
            return `<tr>
                <td>${m.code}</td>
                <td>${m.name}${m.id === leader?.id ? ' <span class="badge" style="background:#d4a017;">أنت</span>' : ''}</td>
                <td><span class="badge" style="background:${m.rank === 'عريف اول' ? '#d4a017' : '#666'};">${m.rank || 'عضو'}</span></td>
                <td>${m.username}</td>
                <td>${m.phone}</td>
                <td>${squad?.name || '-'}</td>
                <td>${m.points}</td>
                <td>
                    <button class="btn btn-sm btn-info" onclick="showMemberDetails(${m.id})"><i class="fas fa-eye"></i></button>
                    <button class="btn btn-sm btn-warning" onclick="showEditMemberModal(${m.id})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-success" onclick="showAdjustPointsModal(${m.id})"><i class="fas fa-plus-circle"></i></button>
                 </td>
            </tr>`;
        }).join('')}
        ${myMembers.length === 0 ? '<tr><td colspan="8" style="text-align:center;">⚠️ لا يوجد أعضاء في الفروع المسؤول عنها</td>' : ''}
        </tbody>}~table</div>
    `;
    const tableContainer = document.getElementById('leaderMembersTable');
    if (tableContainer) tableContainer.innerHTML = tableHtml;
}

function loadLeaderMessages() {
    const filter = document.getElementById('leaderChatFilter')?.value || 'all';
    const leader = currentUser;
    
    const mySquads = appData.squads.filter(s => s.branchId === leader.branchId);
    const mySquadIds = mySquads.map(s => s.id);
    
    let messages = appData.messages.filter(m => {
        if (filter === 'all') {
            return (m.squadId && mySquadIds.includes(m.squadId)) || m.isBroadcast === true;
        } else {
            return m.squadId == filter && !m.isBroadcast;
        }
    });
    messages.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    
    const container = document.getElementById('leaderChatMessages');
    if (!container) return;
    container.innerHTML = messages.map(m => `
        <div class="message ${m.senderId === leader.id || m.senderId === 'admin' ? 'sent' : 'received'}">
            <div class="sender"><i class="fas fa-user"></i> ${m.senderName}</div>
            <div class="text">${escapeHtml(m.text)}</div>
            <div class="time">${new Date(m.timestamp).toLocaleString('ar-EG')}</div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

async function sendLeaderMessage() {
    const input = document.getElementById('leaderMessageInput');
    const text = input.value.trim();
    if (!text) return;
    const filter = document.getElementById('leaderChatFilter')?.value || 'all';
    const leader = currentUser;
    
    const newMessage = {
        id: Date.now(),
        squadId: filter === 'all' ? null : parseInt(filter),
        senderId: leader.id,
        senderName: leader.name,
        text: text,
        timestamp: new Date().toISOString(),
        isBroadcast: filter === 'all'
    };
    appData.messages.push(newMessage);
    await saveAllDataToFirebase();
    input.value = '';
    loadLeaderMessages();
    showToast('تم إرسال الرسالة');
}

async function confirmDeleteBranch(branchId) {
    // حذف الفروع التابعة
    appData.subBranches = appData.subBranches.filter(sb => sb.branchId !== branchId);
    // حذف الطلايع التابعة
    const squadsToDelete = appData.squads.filter(s => s.branchId === branchId);
    squadsToDelete.forEach(squad => {
        appData.members.forEach(m => { if (m.squadId === squad.id) m.squadId = null; });
    });
    appData.squads = appData.squads.filter(s => s.branchId !== branchId);
    // حذف المنطقة
    appData.branches = appData.branches.filter(b => b.id !== branchId);
    
    await saveAllDataToFirebase();
    renderSquadsList();
    renderAdminDashboard();
    showToast('تم حذف المنطقة وجميع فروعها وطلايعها');
}

            showToast('يوجد فرع بهذا الاسم بالفعل في هذه المنطقة', 'error');
            return;
        }
        
        const newSubBranch = {
            id: Date.now(),
            branchId: parentBranchId,
            name: subBranchName,
            createdAt: new Date().toISOString()
        };
        
        appData.subBranches.push(newSubBranch);
        await saveAllDataToFirebase();

       function renderSquadsList() {

        'البراعم': '🌱'

    let html = '';
    
    appData.branches.forEach(branch => {

        html += `

        if (branchSubBranches.length > 0) {

        branchSquads.forEach(squad => {

            const typeName = squad.type ? ` (${typeIcon} ${squad.type})` : '';
            
            let squadMembers = appData.members.filter(m => m.squadId === squad.id);
            squadMembers.sort((a, b) => {
                const orderA = rankOrder[a.rank] || 999;
                const orderB = rankOrder[b.rank] || 999;
                return orderA - orderB;
            });
            
            const membersHtml = squadMembers.map(member => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-bottom: 1px solid #eee; background: ${member.rank === 'عريف اول' ? '#fff8e1' : 'transparent'}">
                    <div><strong>${escapeHtml(member.name)}</strong> <span class="badge" style="background: #d4a017;">${member.rank}</span></div>
                    <div><strong>${member.points}</strong> نقطة</div>
                </div>
            `).join('');
            
            html += `
                <div style="background: #f8f9fa; color: #333; padding: 12px; border-radius: 12px; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                        <div><i class="fas fa-flag"></i> <strong>${squad.name}${typeName}</strong><br><small>القائد: ${squad.leader} | الأعضاء: ${squadMembers.length}</small></div>

                            <span class="badge ${squad.isOpen ? 'badge-active' : 'badge-inactive'}">${squad.isOpen ? 'مفتوحة' : 'مغلقة'}</span>
                            <button class="btn btn-sm btn-warning" onclick="toggleSquadStatus(${squad.id})"><i class="fas fa-lock"></i></button>

                    </div>
                </div>
            `;
        });
        html += `</div></div>`;
    });
    
    container.innerHTML = html || '<p style="text-align:center;">لا توجد مناطق مضافة بعد</p>';

    return types[type] || type;

        function manageTaskSubmissions(taskId) {
            const task = appData.tasks.find(t => t.id === taskId);
            const squadMembers = appData.members.filter(m => m.squadId === task.squadId);
            const submissions = appData.taskSubmissions.filter(ts => ts.taskId === taskId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:600px;">
                    <div class="modal-header"><h3><i class="fas fa-clipboard-list"></i> تسليمات تكليف: ${task.title}</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
                    <div style="max-height:400px; overflow-y:auto;">
                        ${squadMembers.map(member => {
                            const submission = submissions.find(s => s.memberId === member.id);
                            return `
                                <div style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:10px;">
                                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                                        <div><strong>${member.name}</strong> (${member.code}) - <span class="badge" style="background:${submission ? '#2ecc71' : '#e74c3c'};">${submission ? (submission.pointsAwarded ? 'تم التقييم' : 'تم التسليم') : 'لم يسلم بعد'}</span></div>
                                        ${submission && submission.status === 'submitted' && !submission.pointsAwarded ? 
                                            `<div><input type="number" id="points_${member.id}" placeholder="النقاط" value="${task.pointsValue}" style="width:80px; padding:5px;"> <button class="btn btn-sm btn-success" onclick="awardPoints(${taskId}, ${member.id})"><i class="fas fa-star"></i> منح النقاط</button></div>` : 
                                            submission && submission.pointsAwarded ? `<span class="badge" style="background:#2ecc71;">حصل على ${submission.pointsAwarded} نقطة</span>` : ''
                                        }
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function awardPoints(taskId, memberId) {
            const pointsInput = document.getElementById(`points_${memberId}`);
            const points = parseInt(pointsInput?.value) || 0;
            const submission = appData.taskSubmissions.find(ts => ts.taskId === taskId && ts.memberId === memberId);
            if (submission) {
                submission.pointsAwarded = points;
                submission.status = 'completed';
                submission.reviewedAt = new Date().toISOString();
                submission.reviewedBy = 'admin';
                const member = appData.members.find(m => m.id === memberId);
                member.points += points;
                if (member.points >= 200) member.rank = "قائد متميز";
                else if (member.points >= 100) member.rank = "قائد";
                else if (member.points >= 50) member.rank = "نائب قائد";
                await saveAllDataToFirebase();
                showToast(`تم منح ${points} نقطة للعضو ${member.name}`);
                manageTaskSubmissions(taskId);
                renderTasksListAdmin();
                renderAdminDashboard();
            }
        }

        // دالة منفصلة لتحديث حالة المشاهدة دون التسبب في حلقة لا نهائية
async function updateTaskSeenStatus() {
    let needsUpdate = false;
    
    appData.tasks.forEach(task => {
        if (task.squadId === currentUser.squadId) {
            if (!task.seenByMembers) task.seenByMembers = [];
            if (!task.seenByMembers.includes(currentUser.id)) {
                task.seenByMembers.push(currentUser.id);
                needsUpdate = true;
            }
        }
    });
    
    if (needsUpdate) {
        await saveAllDataToFirebase();
    }
}

       async function submitTaskRequest(taskId) {
    // التحقق من صلاحية التسليم
    if (!canSubmitTask(taskId)) {
        showToast('عذراً، انتهى الموعد النهائي لتسليم هذا التكليف', 'error');
        return;
    }
    
    const existing = appData.taskSubmissions.find(ts => ts.taskId === taskId && ts.memberId === currentUser.id);
    if (existing) { 
        showToast('لقد قمت بالفعل بتسليم هذا التكليف', 'error'); 
        return; 
    }
    
    const submission = {
        id: Date.now(),
        taskId: taskId,
        memberId: currentUser.id,
        status: 'submitted',
        submittedAt: new Date().toISOString(),
        pointsAwarded: null,
        reviewedBy: null,
        reviewedAt: null
    };
    appData.taskSubmissions.push(submission);
    await saveAllDataToFirebase();
    showToast('تم تقديم طلب تسليم التكليف، بانتظار موافقة القائد');
    renderMemberTasks();

// تحديث إحصائيات صفحة الهبوط
function updateLandingStats() {
    const membersCount = document.getElementById('statMembers');
    const squadsCount = document.getElementById('statSquads');
    const tasksCount = document.getElementById('statTasks');
    
    if (membersCount) {
        let count = 0;
        const interval = setInterval(() => {
            if (count <= appData.members.length) {
                membersCount.textContent = count;
                count++;
            } else {
                clearInterval(interval);
            }
        }, 30);
    }
    
    if (squadsCount) {
        let count = 0;
        const interval = setInterval(() => {
            if (count <= appData.squads.length) {
                squadsCount.textContent = count;
                count++;
            } else {
                clearInterval(interval);
            }
        }, 30);
    }
    
    if (tasksCount) {
        let count = 0;
        const interval = setInterval(() => {
            if (count <= appData.taskSubmissions.filter(ts => ts.status === 'completed').length) {
                tasksCount.textContent = count;
                count++;
            } else {
                clearInterval(interval);
            }
        }, 30);
    }
}

function addThemeToggleButton() {

    themeBtn.style.height = '38px';

    themeBtn.style.border = '1px solid #d4a017';

    themeBtn.onclick = () => {
        if (document.body.classList.contains('light-mode')) {
            document.body.classList.remove('light-mode');
            localStorage.setItem('theme', 'dark');
            themeBtn.innerHTML = '<i class="fas fa-moon" style="font-size: 18px; color: #d4a017;"></i>';

                squadSelect.innerHTML = '<option value="">-- اختر الطليعة --</option>' +

    // عند اختيار الطليعة، تظهر خانة نوع الطليعة تلقائياً
    document.getElementById('reqSquadLogin').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex];
        const squadType = selectedOption.getAttribute('data-type') || 'الكشافة';
        const squadTypeContainer = document.getElementById('squadTypeContainerLogin');
        const squadTypeInput = document.getElementById('reqSquadTypeLogin');
        const squadTypeIconsMap = {
            'الكشافة': '⚜️ فريق الكشافة',
            'المرشدات': '🌸 فريق المرشدات',
            'الأشبال': '🦁 فريق الأشبال',
            'الزهرات': '🌺 فريق الزهرات',
            'البراعم': '🌱 فريق البراعم'
        };
        
        if (this.value && squadType) {
            squadTypeInput.value = squadTypeIconsMap[squadType] || squadType;
            squadTypeContainer.style.display = 'block';
        } else {
            squadTypeContainer.style.display = 'none';
            squadTypeInput.value = '';
        }
    });
    
    document.getElementById('joinRequestFormLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('reqUsernameLogin').value;

            showToast('اسم المستخدم موجود مسبقاً لدى عضو', 'error');
            return;
        }
        if (appData.joinRequests.some(r => r.username === username && r.status === 'pending')) {
            showToast('هذا الاسم موجود في طلب سابق لا يزال قيد المراجعة', 'error');
            return;
        }
        
        const subBranchId = parseInt(document.getElementById('reqSubBranchLogin').value);
        const subBranch = appData.subBranches.find(sb => sb.id === subBranchId);
        const squadId = parseInt(document.getElementById('reqSquadLogin').value);
        const squad = appData.squads.find(s => s.id === squadId);
        const squadType = document.getElementById('reqSquadTypeLogin').value || (squad ? squad.type : 'الكشافة');
        
        if (!subBranchId || !squadId) {
            showToast('الرجاء اختيار الفرع والطليعة', 'error');
            return;
        }
        
        const newRequest = {
            id: Date.now(),
            name: document.getElementById('reqNameLogin').value,
            age: parseInt(document.getElementById('reqAgeLogin').value),
            phone: document.getElementById('reqPhoneLogin').value,
            rank: document.getElementById('reqRankLogin').value,

            squadType: squadType,  // حفظ نوع الطليعة مع الطلب
            username: username,
            password: document.getElementById('reqPasswordLogin').value,
            status: 'pending',
            requestedAt: new Date().toISOString(),
            code: `KS${String(appData.members.length + 1).padStart(3, '0')}`
        };

        const responsibleLeader = appData.leaders.find(leader => 
            leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
        );
        const leaderName = responsibleLeader ? responsibleLeader.name : (squad ? squad.leader : 'القائد المسؤول');
        
        modal.remove();
        showCustomRequestMessage(leaderName, squad ? squad.name : 'الطليعة', subBranch ? subBranch.name : 'الفرع');

const fullAboutText = `# من نحن – مجموعة كيان الكشفية البحرية

تُعد الكشافة واحدة من أكبر الحركات التربوية والتطوعية في العالم، حيث تهدف إلى تنمية الشباب وبناء شخصيات قوية قادرة على القيادة وخدمة المجتمع. وقد بدأت الحركة الكشفية عالميًا على يد القائد "روبرت بادن باول"، ثم انتشرت سريعًا في مختلف دول العالم، ووصلت إلى مصر منذ أكثر من مائة عام لتصبح واحدة من أهم الأنشطة التربوية التي تهتم ببناء الأجيال وتنمية مهاراتهم.

## بداية الكشافة في مصر

بدأت الحركة الكشفية في مصر في أوائل القرن العشرين، وسرعان ما أصبحت جزءًا مهمًا من الأنشطة الشبابية والتربوية داخل المدارس والأندية والمؤسسات المختلفة. وحرصت الكشافة المصرية منذ بدايتها على غرس قيم الانضباط، والاعتماد على النفس، والعمل الجماعي، والقيادة، وخدمة المجتمع.

ومع تطور الحركة الكشفية ظهرت العديد من الفروع والتخصصات، وكان من أبرزها **الكشافة البحرية** التي تهتم بالأنشطة البحرية والمغامرات والتدريبات الميدانية، وتساعد الشباب على اكتساب مهارات مميزة في الحياة البحرية والإنقاذ والتخييم والعمل الجماعي.

## من نحن؟

نحن **مجموعة كيان الكشفية البحرية**، مجموعة كشفية بحرية تهدف إلى صناعة جيل قوي وواعٍ يمتلك روح القيادة والانتماء والتعاون. تأسست المجموعة عام **2017**، ومنذ ذلك الوقت ونحن نسعى إلى تقديم تجربة كشفية مختلفة تجمع بين التعليم والترفيه والمغامرة وتنمية الشخصية.

بدأت رحلتنا بحلم صغير لتكوين مجموعة كشفية تقدم أنشطة مميزة للشباب والأطفال، ومع مرور الوقت تطورت المجموعة وأصبحت تضم العديد من الفروع والأنشطة والفعاليات المختلفة، واستطعنا تكوين مجتمع كشفي مليء بالطاقة والحماس وروح الأخوة.

## رؤيتنا

نسعى إلى بناء جيل قادر على القيادة وتحمل المسؤولية، يمتلك الثقة بالنفس وروح الفريق والانضباط، ويستطيع مواجهة التحديات وخدمة المجتمع بإيجابية.

## رسالتنا

تقديم تجربة كشفية بحرية متكاملة تساعد الأعضاء على تنمية مهاراتهم الجسدية والعقلية والاجتماعية، من خلال برامج وأنشطة عملية ممتعة وآمنة تناسب مختلف الأعمار.

# ماذا نقدم في الكشافة البحرية؟

في مجموعة كيان الكشفية البحرية لا تقتصر الأنشطة على اللعب والترفيه فقط، بل نحرص على تقديم تجربة تعليمية وتربوية متكاملة تساعد الأعضاء على اكتساب خبرات حقيقية ومهارات حياتية مهمة.

## الأنشطة البحرية

نهتم بشكل كبير بالأنشطة البحرية التي تُعد من أهم ما يميز الكشافة البحرية، حيث يتعلم الأعضاء:

كما تساعد الأنشطة البحرية على تنمية الثقة بالنفس وروح المغامرة والانضباط.

## الكامبات والمعسكرات

تُعتبر المعسكرات أو "الكامبات" من أهم الأنشطة داخل الكشافة، حيث يعيش الأعضاء تجربة مليئة بالمغامرة والتحديات والتعاون.

## الرحلات والأنشطة الخارجية

وذلك من خلال الأنشطة العملية والتحديات الجماعية المختلفة.

// دالة عرض جدول الترتيب في صفحة الهبوط
function renderLeaderboard() {
    const container = document.getElementById('leaderboardTableContainer');
    if (!container) return;
    
    // جلب البيانات بناءً على الفلاتر
    let filteredMembers = [...appData.members];
    
    // فلتر الفرع (إذا لم يكن 'all')
    if (currentBranchFilter !== 'all') {
        const branchId = parseInt(currentBranchFilter);
        filteredMembers = filteredMembers.filter(m => m.branchId === branchId);
    }
    
    // فلتر النوع (يظهر فقط عند اختيار فرع معين)
    if (currentBranchFilter !== 'all' && currentTypeFilter !== 'all') {
        const squadIdsOfType = appData.squads
            .filter(s => s.type === currentTypeFilter && s.branchId == currentBranchFilter)
            .map(s => s.id);
        filteredMembers = filteredMembers.filter(m => squadIdsOfType.includes(m.squadId));
    }
    
    // ترتيب حسب النقاط (تنازلي)
    filteredMembers.sort((a, b) => b.points - a.points);
    
    // بناء HTML الجدول
    if (filteredMembers.length === 0) {
        container.innerHTML = '<div class="no-data"><i class="fas fa-info-circle"></i> لا توجد بيانات لعرضها</div>';
        return;
    }
    
    let tableHtml = `
        <div class="leaderboard-table-wrapper">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>الفرع / الطليعة</th>
                        <th>الرتبة</th>
                        <th><i class="fas fa-star"></i> النقاط</th>
                    </tr>
                </thead>
                <tbody>
    `;
    
    filteredMembers.forEach((member, index) => {
        const rank = index + 1;
        let rankClass = '';
        let rankDisplay = '';
        
        if (rank === 1) {
            rankClass = 'rank-1';
            rankDisplay = '🥇';
        } else if (rank === 2) {
            rankClass = 'rank-2';
            rankDisplay = '🥈';
        } else if (rank === 3) {
            rankClass = 'rank-3';
            rankDisplay = '🥉';
        } else {
            rankClass = 'rank-other';
            rankDisplay = rank;
        }
        
        // جلب معلومات الفرع والطليعة
        const squad = appData.squads.find(s => s.id === member.squadId);
        const branch = appData.branches.find(b => b.id === member.branchId);
        
        let locationText = '';
        if (currentBranchFilter !== 'all') {
            // إذا كان مختار فرع معين، نعرض اسم الطليعة
            locationText = squad ? `${squad.name} ${squad.type ? `(${squad.type})` : ''}` : branch?.name || '-';
        } else {
            // إذا كان الكل، نعرض المنطقة ثم الطليعة
            locationText = branch ? `${branch.name} - ${squad?.name || ''}` : squad?.name || '-';
        }
        
        tableHtml += `
            <tr>
                <td class="rank-cell">
                    <span class="rank-medal ${rankClass}">${rankDisplay}</span>
                </td>
                <td><strong>${escapeHtml(member.name)}</strong></td>
                <td>${escapeHtml(locationText)}</td>
                <td><span class="badge" style="background: #d4a01720; color: #1a472a; padding: 4px 10px;">${member.rank || 'عضو'}</span></td>
                <td><strong style="color: #d4a017; font-size: 18px;">${member.points}</strong></td>
            </tr>
        `;
    });
    
    tableHtml += `
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = tableHtml;
}

// دالة تحديث الفلاتر
function updateLeaderboardFilters() {
    const branchSelect = document.getElementById('branchFilterLeaderboard');
    const typeSelect = document.getElementById('typeFilterLeaderboard');
    
    if (!branchSelect) return;
    
    currentBranchFilter = branchSelect.value;
    
    // تفعيل/تعطيل فلتر النوع
    if (currentBranchFilter !== 'all') {
        typeSelect.disabled = false;
        // تعبئة خيارات النوع بناءً على الفروع الموجودة في المنطقة المختارة
        const branchId = parseInt(currentBranchFilter);
        const availableTypes = [...new Set(
            appData.squads
                .filter(s => s.branchId === branchId)
                .map(s => s.type || 'الكشافة')
        )];
        
        // حفظ القيمة الحالية مؤقتاً
        const oldTypeValue = typeSelect.value;
        
        typeSelect.innerHTML = '<option value="all">🎯 جميع الأنواع</option>';
        availableTypes.forEach(type => {
            const typeNames = {
                'الكشافة': '⚜️ الكشافة',
                'المرشدات': '🌸 المرشدات',
                'الأشبال': '🦁 الأشبال',
                'الزهرات': '🌺 الزهرات',
                'البراعم': '🌱 البراعم'
            };
            typeSelect.innerHTML += `<option value="${type}">${typeNames[type] || type}</option>`;
        });
        
        // استعادة القيمة إذا كانت لا تزال موجودة
        if (availableTypes.includes(oldTypeValue)) {
            typeSelect.value = oldTypeValue;
            currentTypeFilter = oldTypeValue;
        } else {
            typeSelect.value = 'all';
            currentTypeFilter = 'all';
        }
    } else {
        typeSelect.disabled = true;
        typeSelect.value = 'all';
        currentTypeFilter = 'all';
    }
    
    // تحديث الجدول
    renderLeaderboard();
}

// دالة تغيير فلتر النوع
function onTypeFilterChange() {
    const typeSelect = document.getElementById('typeFilterLeaderboard');
    if (typeSelect) {
        currentTypeFilter = typeSelect.value;
        renderLeaderboard();
    }
}
