<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام الكشاف المتكامل - Firebase Cloud</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a472a, #0d2818, #0a1f12);
            min-height: 100vh;
            direction: rtl;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #2d5a3f; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #d4a017; border-radius: 10px; }

        /* Sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s ease;
        }
        .sidebar-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #0d2818, #0a1f12);
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding: 20px 0;
            box-shadow: -5px 0 30px rgba(0,0,0,0.3);
            overflow-y: auto;
            border-left: 1px solid rgba(212,160,23,0.3);
        }
        .sidebar.open { right: 0; }

        .sidebar-header {
            padding: 20px 25px;
            border-bottom: 1px solid rgba(212,160,23,0.3);
            margin-bottom: 20px;
        }
        .sidebar-header h3 { color: #d4a017; font-size: 20px; }
        .sidebar-header p { color: rgba(255,255,255,0.7); font-size: 12px; }

        .sidebar-menu {
            list-style: none;
            padding: 0;
        }
        .sidebar-menu li { margin-bottom: 5px; }
        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 25px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
            font-weight: 500;
        }
        .sidebar-menu li a i {
            width: 24px;
            font-size: 18px;
            color: #d4a017;
        }
        .sidebar-menu li a:hover {
            background: rgba(212,160,23,0.15);
            padding-right: 35px;
            color: white;
        }
        .sidebar-menu li.active a {
            background: linear-gradient(90deg, #d4a017, #b8860b);
            color: #0d2818;
        }
        .sidebar-menu li.active a i { color: #0d2818; }

        /* Hamburger Button */
        .hamburger {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #1a472a, #0d2818);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            border: 1px solid rgba(212,160,23,0.3);
        }
        .hamburger:hover { transform: scale(1.05); border-color: #d4a017; }
        .hamburger span {
            width: 28px;
            height: 3px;
            background: #d4a017;
            border-radius: 3px;
            transition: 0.3s;
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        /* Header */
        .header {
            background: rgba(13, 40, 24, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            margin-right: 80px;
            margin-left: 20px;
            margin-top: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(212,160,23,0.2);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { font-size: 32px; color: #d4a017; }
        .logo h1 { font-size: 22px; color: #d4a017; }
        .logo p { font-size: 10px; color: rgba(255,255,255,0.6); }

        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 40px;
        }
        .user-info i { font-size: 18px; color: #d4a017; }
        .user-info span { font-weight: 600; color: white; }

        .logout-btn {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(192,57,43,0.3); }

        /* Main Content */
        .main-content {
            margin-right: 80px;
            margin-left: 20px;
            margin-top: 20px;
            padding: 20px;
            min-height: calc(100vh - 140px);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
            border-right: 4px solid #d4a017;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-card:hover { transform: translateY(-5px); background: white; }
        .stat-card i { font-size: 40px; color: #d4a017; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #1a472a; }
        .stat-card .label { font-size: 14px; color: #666; }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card h3 {
            color: #1a472a;
            margin-bottom: 18px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #d4a017;
            padding-bottom: 10px;
        }

        /* Squad Filter */
        .squad-filter {
            padding: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .squad-filter select, .squad-filter input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-family: 'Cairo', sans-serif;
        }
        .broadcast-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .broadcast-btn:hover { transform: translateY(-2px); }

        /* Buttons */
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #d4a017; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-info { background: #3498db; color: white; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn:hover { transform: translateY(-2px); }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }
        .data-table th {
            background: #1a472a;
            color: white;
            font-weight: 600;
        }
        .data-table tr:hover { background: #f5f5f5; }

        /* Chat Container */
        .chat-container {
            height: 500px;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fa;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
        }
        .message.sent {
            background: linear-gradient(135deg, #d4a017, #b8860b);
            color: white;
            align-self: flex-start;
            border-bottom-right-radius: 5px;
        }
        .message.received {
            background: white;
            color: #333;
            align-self: flex-end;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message .sender { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.8; }
        .message .time { font-size: 9px; margin-top: 4px; text-align: left; opacity: 0.6; }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-family: 'Cairo', sans-serif;
        }
        .chat-input-area input:focus { outline: none; border-color: #d4a017; }
        .chat-input-area button {
            padding: 10px 20px;
            background: #d4a017;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Tasks */
        .task-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-right: 4px solid #d4a017;
        }
        .task-pending { background: #fff3cd; border-right-color: #f39c12; }
        .task-completed { background: #e8f5e9; border-right-color: #2ecc71; }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
        }
        .task-title { font-weight: bold; font-size: 16px; }
        .task-points { background: #d4a017; color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .task-description { font-size: 13px; color: #666; margin-bottom: 8px; }
        .task-meta { font-size: 11px; color: #999; }
        .complete-task-btn { background: #2ecc71; color: white; border: none; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .complete-task-btn:hover { transform: translateY(-2px); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 25px;
            max-width: 550px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #d4a017;
            padding-bottom: 12px;
        }
        .modal-header h3 { color: #1a472a; }
        .close-modal {
            cursor: pointer;
            font-size: 24px;
            transition: 0.3s;
        }
        .close-modal:hover { color: #e74c3c; transform: rotate(90deg); }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #d4a017; }

        .code-generator {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .code-generator input { flex: 1; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-active { background: #2ecc71; color: white; }
        .badge-inactive { background: #e74c3c; color: white; }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .detail-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
        }
        .detail-label { font-size: 11px; color: #999; margin-bottom: 4px; }
        .detail-value { font-size: 16px; font-weight: 600; color: #1a472a; }

        .footer {
            background: rgba(13, 40, 24, 0.95);
            color: rgba(255,255,255,0.7);
            padding: 15px;
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid rgba(212,160,23,0.2);
        }
        .footer a { color: #d4a017; text-decoration: none; }

        /* Login */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a472a, #0d2818);
        }
        .login-box {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .login-box i { font-size: 60px; color: #d4a017; margin-bottom: 15px; }
        .login-box h2 { color: #1a472a; margin-bottom: 25px; }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #d4a017;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .main-content { margin-right: 15px; margin-left: 15px; padding: 10px; }
            .header { margin-right: 70px; margin-left: 10px; }
            .hamburger { width: 42px; height: 42px; top: 15px; right: 15px; }
            .details-grid { grid-template-columns: 1fr; }
            .message { max-width: 85%; }
        }

.landing-container {

}

        async function loadAllDataFromFirebase() {
    try {
        const snapshot = await database.ref('appData').once('value');
        const data = snapshot.val();
        if (data) {
            appData.branches = data.branches || [];
            appData.squads = data.squads || [];
            appData.members = data.members || [];
            appData.tasks = data.tasks || [];
            appData.taskSubmissions = data.taskSubmissions || [];
            appData.messages = data.messages || [];
            appData.joinRequests = data.joinRequests || [];  // <-- أضف هذا السطر
            console.log('✅ All data loaded from Firebase');
            return true;
        } else {
            await initializeDefaultData();
            return true;
        }
    } catch (error) {
        console.error('❌ Error loading from Firebase:', error);
        showToast('خطأ في تحميل البيانات', 'error');
        return false;
    }
}

// 4. دالة قبول طلب الانضمام وإضافة العضو إلى قاعدة البيانات
async function approveJoinRequest(requestId) {
    const request = appData.joinRequests.find(r => r.id === requestId);
    if (!request) return;
    
    const newMember = {
        id: Date.now(),
        code: request.code,
        name: request.name,
        age: request.age,
        rank: request.rank,
        username: request.username,
        password: request.password,
        phone: request.phone,
        branchId: request.branchId,
        squadId: request.squadId,
        points: 0,
        joinedAt: new Date().toISOString()
    };
    
    appData.members.push(newMember);
    appData.joinRequests = appData.joinRequests.filter(r => r.id !== requestId);
    
    await saveAllDataToFirebase();
    document.querySelectorAll('.modal').forEach(m => m.remove());
    showToast(`✅ تم قبول ${request.name} وأضيف إلى الطليعة بنجاح`);
    
    if (isAdmin && document.getElementById('adminPageContent')) {
        renderMembersTable();
        renderAdminDashboard();
    }
}

// 5. دالة رفض طلب الانضمام (حذف الطلب)
async function rejectJoinRequest(requestId) {
    const request = appData.joinRequests.find(r => r.id === requestId);
    if (!request) return;
    
    appData.joinRequests = appData.joinRequests.filter(r => r.id !== requestId);
    await saveAllDataToFirebase();
    document.querySelectorAll('.modal').forEach(m => m.remove());
    showToast(`❌ تم رفض طلب ${request.name}`);
    
    if (isAdmin && document.getElementById('adminPageContent')) {
        renderMembersTable();
        renderAdminDashboard();
    }
}

// دالة عرض التكاليف النشطة مع عداد تنازلي (بالأيام والساعات والدقائق والثواني)
function renderActiveTasksCard() {
    const container = document.getElementById('activeTasksContainer');
    if (!container) return;
    
    const now = new Date();
    const activeTasks = appData.tasks.filter(task => {
        if (!task.endDate) return false;
        return new Date(task.endDate) > now;
    });
    
    if (activeTasks.length === 0) {
        container.innerHTML = '<p style="text-align:center;">🎉 لا توجد تكاليف نشطة حالياً</p>';
        return;
    }
    
    const tasksHtml = activeTasks.map(task => {
        const squad = appData.squads.find(s => s.id === task.squadId);
        const endDate = new Date(task.endDate);
        const timeRemaining = endDate - now;
        
        let countdownText = '';
        let isExpired = false;
        
        if (timeRemaining > 0) {
            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeRemaining % (86400000)) / (3600000));
            const minutes = Math.floor((timeRemaining % 3600000) / 60000);
            const seconds = Math.floor((timeRemaining % 60000) / 1000);
            countdownText = `${days} يوم ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية`;
        } else {
            countdownText = 'انتهى الوقت';
            isExpired = true;
        }
        
        return `
            <div class="task-item" style="${isExpired ? 'opacity: 0.6; background: #f0f0f0;' : ''}">
                <div class="task-header">
                    <span class="task-title">${escapeHtml(task.title)}</span>
                    <span class="task-points">${task.pointsValue} نقطة</span>
                </div>
                <div class="task-description">${escapeHtml(task.description)}</div>
                <div class="task-meta">
                    <i class="fas fa-flag"></i> ${squad?.name || '-'} | 
                    <i class="fas fa-calendar-alt"></i> بدأ: ${new Date(task.startDate).toLocaleString('ar-EG')} | 
                    <i class="fas fa-calendar-times"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}
                </div>
                <div class="task-countdown" style="margin-top: 10px; padding: 8px; background: ${isExpired ? '#e74c3c20' : '#d4a01720'}; border-radius: 10px;">
                    <i class="fas ${isExpired ? 'fa-hourglass-end' : 'fa-hourglass-half'}"></i>
                    <strong>${isExpired ? '⏰ انتهى الموعد النهائي' : '⏳ الوقت المتبقي: ' + countdownText}</strong>
                </div>
            </div>
        `;
    }).join('');
    
    container.innerHTML = `
        <div style="margin-bottom: 15px;">
            <span class="badge badge-active"><i class="fas fa-play-circle"></i> التكاليف النشطة: ${activeTasks.length}</span>
        </div>
        ${tasksHtml}
    `;
}

function startCountdownUpdater() {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        if (document.getElementById('activeTasksContainer')) {
            renderActiveTasksCard();
        }
        // فقط نحدث الأرقام دون إعادة رسم الأزرار
        const selectedSquad = localStorage.getItem('selectedSquad') || 'all';
        displayRankingList(selectedSquad);
    }, 1000);
}

// إيقاف تحديث العدادات
function stopCountdownUpdater() {
    if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
    }
}

        function renderSquadsList() {
    const container = document.getElementById('squadsList');
    if (!container) return;
    
    // ترتيب الرتب حسب الأهمية
    const rankOrder = {
        'عريف اول': 1,
        'عريف': 2,
        'سكرتير': 3,
        'امين صندوق': 4,
        'مساعد عريف اول': 5,
        'مساعد عريف': 6
    };
    
    container.innerHTML = appData.squads.map(squad => {
        const branchName = appData.branches.find(b => b.id === squad.branchId)?.name;
        let squadMembers = appData.members.filter(m => m.squadId === squad.id);
        
        // ترتيب الأعضاء حسب الرتبة
        squadMembers.sort((a, b) => {
            const orderA = rankOrder[a.rank] || 999;
            const orderB = rankOrder[b.rank] || 999;
            return orderA - orderB;
        });
        
        const memberCount = squadMembers.length;
        
        const membersHtml = squadMembers.map(member => `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #eee; background: ${member.rank === 'عريف اول' ? '#fff8e1' : 'transparent'}">

                    <span class="badge" style="background: #d4a017; margin-right: 8px;">${member.rank}</span>
                </div>
                <div><strong>${member.points}</strong> نقطة</div>
            </div>
        `).join('');
        
        return `
            <div style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:12px;">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:10px;">

                    <div><span class="badge ${squad.isOpen ? 'badge-active' : 'badge-inactive'}">${squad.isOpen ? 'مفتوحة' : 'مغلقة'}</span>
                    <button class="btn btn-sm btn-warning" onclick="toggleSquadStatus(${squad.id})"><i class="fas fa-lock"></i></button>

                </div>
                <div style="margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px;">
                    <strong>أعضاء الطليعة (مرتبين حسب الرتبة):</strong>
                    <div style="margin-top: 8px;">
                        ${membersHtml || '<p style="color:#999; text-align:center;">لا يوجد أعضاء في هذه الطليعة</p>'}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

            const filter = document.getElementById('adminChatFilter')?.value || 'all';
            const newMessage = {
                id: Date.now(),
                squadId: filter === 'all' ? null : parseInt(filter),
                senderId: 'admin',

       function showAddTaskModal() {
    const squadId = document.getElementById('taskSquadSelect')?.value;
    if (!squadId) { showToast('الرجاء اختيار الطليعة أولاً', 'error'); return; }
    
    // تعيين التاريخ والوقت الحالي كقيم افتراضية
    const now = new Date();
    const defaultStartDate = now.toISOString().slice(0, 16);
    const defaultEndDate = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 16);
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header"><h3><i class="fas fa-tasks"></i> إضافة تكليف جديد</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
            <form id="addTaskForm">
                <div class="input-group"><label>عنوان التكليف</label><input type="text" id="taskTitle" required></div>
                <div class="input-group"><label>وصف التكليف</label><textarea id="taskDesc" rows="3" required></textarea></div>
                <div class="input-group"><label>قيمة النقاط</label><input type="number" id="taskPoints" value="10" required></div>
                <div class="input-group"><label>تاريخ ووقت البدء</label><input type="datetime-local" id="taskStartDate" value="${defaultStartDate}" required></div>
                <div class="input-group"><label>تاريخ ووقت الانتهاء</label><input type="datetime-local" id="taskEndDate" value="${defaultEndDate}" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">إضافة التكليف</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('addTaskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const startDate = new Date(document.getElementById('taskStartDate').value);
        const endDate = new Date(document.getElementById('taskEndDate').value);
        
        if (endDate <= startDate) {
            showToast('تاريخ الانتهاء يجب أن يكون بعد تاريخ البدء', 'error');
            return;
        }
        
        const newTask = {
            id: Date.now(),
            squadId: parseInt(squadId),
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDesc').value,
            pointsValue: parseInt(document.getElementById('taskPoints').value),
            createdAt: new Date().toISOString(),
            startDate: startDate.toISOString(),
            endDate: endDate.toISOString(),
            seenByMembers: []  // مصفوفة لتخزين IDs الأعضاء الذين شاهدوا التكليف
        };
        appData.tasks.push(newTask);
        await saveAllDataToFirebase();
        
        // إعادة تعيين إشعارات الأعضاء في هذه الطليعة
        const squadMembers = appData.members.filter(m => m.squadId == squadId);
        squadMembers.forEach(member => {
            sessionStorage.removeItem('notificationShown_' + member.id);
        });
        
        showToast('تم إضافة التكليف وسيظهر إشعار للأعضاء');
        modal.remove();
        renderTasksListAdmin();
        renderAdminDashboard();
    });
}

        function manageTaskSubmissions(taskId) {
            const task = appData.tasks.find(t => t.id === taskId);
            const squadMembers = appData.members.filter(m => m.squadId === task.squadId);
            const submissions = appData.taskSubmissions.filter(ts => ts.taskId === taskId);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content" style="max-width:600px;">
                    <div class="modal-header"><h3><i class="fas fa-clipboard-list"></i> تسليمات تكليف: ${task.title}</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
                    <div style="max-height:400px; overflow-y:auto;">
                        ${squadMembers.map(member => {
                            const submission = submissions.find(s => s.memberId === member.id);
                            return `
                                <div style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:10px;">
                                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                                        <div><strong>${member.name}</strong> (${member.code}) - <span class="badge" style="background:${submission ? '#2ecc71' : '#e74c3c'};">${submission ? (submission.pointsAwarded ? 'تم التقييم' : 'تم التسليم') : 'لم يسلم بعد'}</span></div>
                                        ${submission && submission.status === 'submitted' && !submission.pointsAwarded ? 
                                            `<div><input type="number" id="points_${member.id}" placeholder="النقاط" value="${task.pointsValue}" style="width:80px; padding:5px;"> <button class="btn btn-sm btn-success" onclick="awardPoints(${taskId}, ${member.id})"><i class="fas fa-star"></i> منح النقاط</button></div>` : 
                                            submission && submission.pointsAwarded ? `<span class="badge" style="background:#2ecc71;">حصل على ${submission.pointsAwarded} نقطة</span>` : ''
                                        }
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function awardPoints(taskId, memberId) {
            const pointsInput = document.getElementById(`points_${memberId}`);
            const points = parseInt(pointsInput?.value) || 0;
            const submission = appData.taskSubmissions.find(ts => ts.taskId === taskId && ts.memberId === memberId);
            if (submission) {
                submission.pointsAwarded = points;
                submission.status = 'completed';
                submission.reviewedAt = new Date().toISOString();
                submission.reviewedBy = 'admin';
                const member = appData.members.find(m => m.id === memberId);
                member.points += points;
                if (member.points >= 200) member.rank = "قائد متميز";
                else if (member.points >= 100) member.rank = "قائد";
                else if (member.points >= 50) member.rank = "نائب قائد";
                await saveAllDataToFirebase();
                showToast(`تم منح ${points} نقطة للعضو ${member.name}`);
                manageTaskSubmissions(taskId);
                renderTasksListAdmin();
                renderAdminDashboard();
            }
        }

        function deleteTask(id) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `

            appData.tasks = appData.tasks.filter(t => t.id !== id);

// دالة الانتقال إلى صفحة تسجيل الدخول
function goToLoginPage() {
    // حفظ الجلسة
    sessionStorage.setItem('scoutSession', 'active');
    sessionStorage.setItem('scoutSessionTime', Date.now().toString());
    
    // إعادة تحميل الصفحة لبدء التطبيق

        function renderMemberTasks() {
    const container = document.getElementById('memberPageContent');
    
    // تسجيل أن العضو قد شاهد التكاليف الحالية
    appData.tasks.forEach(task => {
        if (task.squadId === currentUser.squadId) {
            if (!task.seenByMembers) task.seenByMembers = [];
            if (!task.seenByMembers.includes(currentUser.id)) {
                task.seenByMembers.push(currentUser.id);
            }
        }
    });
    saveAllDataToFirebase();
    
    // تصفية المهام حسب الصلاحية (لم تنتهِ بعد)
    const pendingTasks = appData.tasks.filter(t => 
        t.squadId === currentUser.squadId && 
        !appData.taskSubmissions.some(ts => ts.taskId === t.id && ts.memberId === currentUser.id) &&
        canSubmitTask(t.id)
    );
    
    const completedTasks = appData.taskSubmissions.filter(ts => ts.memberId === currentUser.id && ts.status === 'completed');
    
    const expiredTasks = appData.tasks.filter(t => 
        t.squadId === currentUser.squadId && 
        !appData.taskSubmissions.some(ts => ts.taskId === t.id && ts.memberId === currentUser.id) &&
        !canSubmitTask(t.id)
    );
    
    container.innerHTML = `
        <div class="card"><h3><i class="fas fa-clock"></i> المهام الجديدة</h3>
            ${pendingTasks.map(t => {
                const endDate = new Date(t.endDate);
                const isNew = !t.seenByMembers || !t.seenByMembers.includes(currentUser.id);
                return `
                    <div class="task-item task-pending" style="${isNew ? 'border-right-color: #e74c3c; border-right-width: 6px;' : ''}">
                        <div class="task-header">
                            <span class="task-title">${escapeHtml(t.title)} ${isNew ? '<span class="badge" style="background:#e74c3c;">جديد</span>' : ''}</span>
                            <span class="task-points">${t.pointsValue} نقطة</span>
                        </div>
                        <div class="task-description">${escapeHtml(t.description)}</div>
                        <div class="task-meta"><i class="fas fa-calendar-alt"></i> بدأ: ${new Date(t.startDate).toLocaleString('ar-EG')}<br>
                        <i class="fas fa-calendar-times"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}</div>
                        <button class="complete-task-btn" onclick="submitTaskRequest(${t.id})"><i class="fas fa-paper-plane"></i> تقديم تسليم</button>
                    </div>
                `;
            }).join('')}
            ${pendingTasks.length === 0 ? '<p style="text-align:center;">🎉 لا توجد مهام جديدة متاحة</p>' : ''}
        </div>
        
        ${expiredTasks.length > 0 ? `
        <div class="card"><h3><i class="fas fa-hourglass-end"></i> مهام انتهى وقتها (غير قابلة للتسليم)</h3>
            ${expiredTasks.map(t => `
                <div class="task-item" style="background: #f0f0f0; opacity: 0.7;">
                    <div class="task-header"><span class="task-title">${escapeHtml(t.title)}</span><span class="task-points">${t.pointsValue} نقطة</span></div>
                    <div class="task-description">${escapeHtml(t.description)}</div>
                    <div class="task-meta"><i class="fas fa-calendar-times"></i> انتهى في: ${new Date(t.endDate).toLocaleString('ar-EG')}</div>
                    <button class="btn btn-sm" disabled style="background: #ccc; cursor: not-allowed;"><i class="fas fa-ban"></i> انتهى الوقت</button>
                </div>
            `).join('')}
        </div>
        ` : ''}
        
        <div class="card"><h3><i class="fas fa-check-circle"></i> المهام المكتملة</h3>
            ${completedTasks.map(ct => {
                const task = appData.tasks.find(t => t.id === ct.taskId);
                return `<div class="task-item task-completed"><div class="task-header"><span class="task-title">${task?.title || 'تم حذف المهمة'}</span><span class="task-points">${ct.pointsAwarded || 'بانتظار التقييم'} نقطة</span></div><div class="task-description">${task?.description || ''}</div><div class="task-meta"><i class="fas fa-check-circle"></i> تم التسليم: ${new Date(ct.submittedAt).toLocaleString('ar-EG')}</div></div>`;
            }).join('')}
            ${completedTasks.length === 0 ? '<p>لا توجد مهام مكتملة بعد</p>' : ''}
        </div>
    `;
}
        
// دالة عرض من شاهد التكليف
function showTaskViewers(taskId) {
    const task = appData.tasks.find(t => t.id === taskId);
    if (!task) return;
    
    const squadMembers = appData.members.filter(m => m.squadId === task.squadId);
    const viewers = task.seenByMembers || [];
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header"><h3><i class="fas fa-eye"></i> من شاهد التكليف: ${task.title}</h3><span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span></div>
            <div style="max-height:400px; overflow-y:auto;">
                ${squadMembers.map(member => {
                    const hasSeen = viewers.includes(member.id);
                    const hasSubmitted = appData.taskSubmissions.some(ts => ts.taskId === taskId && ts.memberId === member.id);
                    return `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee; background: ${hasSubmitted ? '#e8f5e9' : 'transparent'};">
                            <div>
                                <strong>${escapeHtml(member.name)}</strong><br>
                                <small>${member.rank}</small>
                            </div>
                            <div>
                                ${hasSubmitted ? '<span class="badge" style="background:#2ecc71;">✅ سلم</span>' : ''}
                                ${hasSeen ? '<span class="badge" style="background:#3498db;">👁️ شاهد</span>' : '<span class="badge" style="background:#e74c3c;">❌ لم يشاهد</span>'}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
            <div style="text-align:center; margin-top:15px;">
                <button class="btn btn-primary" onclick="this.closest('.modal').remove()">إغلاق</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}
       async function submitTaskRequest(taskId) {
    // التحقق من صلاحية التسليم
    if (!canSubmitTask(taskId)) {
        showToast('عذراً، انتهى الموعد النهائي لتسليم هذا التكليف', 'error');
        return;
    }
    
    const existing = appData.taskSubmissions.find(ts => ts.taskId === taskId && ts.memberId === currentUser.id);
    if (existing) { 
        showToast('لقد قمت بالفعل بتسليم هذا التكليف', 'error'); 
        return; 
    }
    
    const submission = {
        id: Date.now(),
        taskId: taskId,
        memberId: currentUser.id,
        status: 'submitted',
        submittedAt: new Date().toISOString(),
        pointsAwarded: null,
        reviewedBy: null,
        reviewedAt: null
    };
    appData.taskSubmissions.push(submission);
    await saveAllDataToFirebase();
    showToast('تم تقديم طلب تسليم التكليف، بانتظار موافقة القائد');
    renderMemberTasks();
}

        // Start the app
(async function start() {
    // التحقق من وجود جلسة نشطة
    const savedSession = sessionStorage.getItem('scoutSession');
    const sessionTime = sessionStorage.getItem('scoutSessionTime');
    
    if (savedSession === 'active' && sessionTime && (Date.now() - parseInt(sessionTime) < 3600000)) {
        // جلسة نشطة خلال آخر ساعة - انتقل مباشرة للتطبيق
        await loadAllDataFromFirebase();
        listenForRealTimeUpdates();
        render();
    } else {
        // لا توجد جلسة نشطة - عرض صفحة الهبوط
        renderLandingPage();
    }
})();
