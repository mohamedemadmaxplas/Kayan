                    <input type="text" id="formTitle" placeholder="مثال: استبيان حول الأنشطة البحرية" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-tag"></i> نوع الفريق المستهدف</label>
                    <select id="formSquadType" required>
                        <option value="all">🎯 جميع المراحل</option>
                        <option value="الكشافة">⚜️ فريق الكشافة</option>
                        <option value="المرشدات">🌸 فريق المرشدات</option>
                        <option value="أشبال وزهرات">🦁🌸 أشبال وزهرات</option>
                        <option value="البراعم">🌱 فريق البراعم</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-align-left"></i> وصف الفورم (اختياري)</label>
                    <textarea id="formDescription" rows="2" placeholder="وصف قصير للفورم..."></textarea>
                </div>
                
                <!-- زر تشغيل/إيقاف إضافة النقاط -->
                <div class="input-group">
                    <label class="toggle-switch">
                        <input type="checkbox" id="enablePointsToggle">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label"><i class="fas fa-star"></i> إضافة نقاط للفورم</span>
                    </label>
                </div>
                
                <div id="pointsSettings" style="display: none;">
                    <div class="points-input-group">
                        <label><i class="fas fa-coins"></i> عدد نقاط السؤال الاول</label>
                        <input type="number" id="formBasePoints" value="10" min="0">
                        <small style="color: #666; display: block; margin-top: 5px;">سيتم تقسيم هذه النقاط على الأسئلة تلقائياً</small>
                    </div>
                </div>
                
                <hr style="margin: 20px 0;">
                
                <h4 style="color:#1a472a;"><i class="fas fa-question-circle"></i> الأسئلة</h4>
                <div id="questionsContainer" style="margin-top:15px;"></div>
                
                <div style="margin: 15px 0;">
                    <button type="button" class="btn btn-success" onclick="addNewQuestion()">
                        <i class="fas fa-plus-circle"></i> إضافة سؤال جديد
                    </button>
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ الفورم</button>
                </div>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    // إظهار/إخفاء إعدادات النقاط عند تغيير حالة الزر
    const toggleCheckbox = document.getElementById('enablePointsToggle');
    const pointsSettings = document.getElementById('pointsSettings');
    
    toggleCheckbox.addEventListener('change', () => {
        pointsSettings.style.display = toggleCheckbox.checked ? 'block' : 'none';
    });
    
    // إضافة سؤال افتراضي
    addNewQuestion();
    
    document.getElementById('createFormMainForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const title = document.getElementById('formTitle').value.trim();
        if (!title) {
            showToast('الرجاء إدخال عنوان للفورم', 'error');
            return;
        }
        
        const enablePoints = toggleCheckbox.checked;
        let basePoints = enablePoints ? parseInt(document.getElementById('formBasePoints').value) || 0 : 0;
        
        const questions = [];
        const questionDivs = document.querySelectorAll('.question-item');
        let totalAssignedPoints = 0;
        
        for (let i = 0; i < questionDivs.length; i++) {
            const div = questionDivs[i];
            const questionText = div.querySelector('.question-text')?.value.trim();
            if (!questionText) continue;
            
            let questionPoints = 0;
            const pointsInput = div.querySelector('.question-points-input');
            
            if (enablePoints) {
                if (pointsInput && pointsInput.value) {
                    questionPoints = parseInt(pointsInput.value) || 0;
                } else {
                    // توزيع النقاط بالتساوي على الأسئلة
                    questionPoints = Math.floor(basePoints / questionDivs.length);
                }
                totalAssignedPoints += questionPoints;
            }
            
            const question = {
                id: Date.now() + i,
                text: questionText,
                points: questionPoints,
                options: [],
                correctAnswer: null
            };
            
            const optionInputs = div.querySelectorAll('.option-input');
            optionInputs.forEach((opt, optIdx) => {
                const optText = opt.value.trim();
                if (optText) {
                    const isCorrect = div.querySelector(`.correct-option-${optIdx}`)?.checked || false;
                    question.options.push({
                        text: optText,
                        isCorrect: isCorrect
                    });
                    if (isCorrect) {
                        question.correctAnswer = optText;
                    }
                }
            });
            
            if (question.options.length > 0) {
                questions.push(question);
            }
        }
        
        if (questions.length === 0) {
            showToast('الرجاء إضافة سؤال واحد على الأقل', 'error');
            return;
        }
        
        const newForm = {
            title: title,
            squadType: document.getElementById('formSquadType').value,
            description: document.getElementById('formDescription').value,
            questions: questions,
            enablePoints: enablePoints,
            totalPoints: enablePoints ? basePoints : 0,
            createdAt: new Date().toISOString(),
            status: 'active'
        };
        
        await saveFormToFirebase(newForm);
        modal.remove();
        renderFormsPage();
    });
}

let questionCounter = 0;

function addNewQuestion() {
    const container = document.getElementById('questionsContainer');
    questionCounter++;
    const questionId = Date.now();
    
    const questionDiv = document.createElement('div');
    questionDiv.className = 'question-item';
    questionDiv.style.cssText = 'background:#f0f5f0; border-radius:15px; padding:15px; margin-bottom:15px; border-right:3px solid #d4a017;';
    questionDiv.setAttribute('data-id', questionId);
    
    // التحقق من تشغيل خيار النقاط
    const enablePoints = document.getElementById('enablePointsToggle')?.checked || false;
    const pointsHtml = enablePoints ? `
        <div class="input-group" style="margin-top:10px;">
            <label><i class="fas fa-coins"></i> نقاط هذا السؤال</label>
            <input type="number" class="question-points-input" placeholder="نقاط السؤال" min="0" value="0" style="width:100%; padding:8px; border-radius:8px;">
        </div>
    ` : '';
    
    questionDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <strong style="color:#1a472a;">السؤال ${questionCounter}</strong>
            <button type="button" class="btn btn-sm btn-danger" onclick="this.closest('.question-item').remove(); updateQuestionNumbers();">
                <i class="fas fa-trash"></i> حذف
            </button>
        </div>
        
        <div class="input-group">
            <label>نص السؤال</label>
            <input type="text" class="question-text" placeholder="أدخل نص السؤال..." style="width:100%;">
        </div>
        
        ${pointsHtml}
        
        <div style="margin-top:10px;">
            <label><i class="fas fa-list"></i> الخيارات</label>
            <div class="options-list" style="margin-top:8px;"></div>
            <button type="button" class="btn btn-sm btn-info" onclick="addOptionToQuestion(this)" style="margin-top:10px;">
                <i class="fas fa-plus"></i> إضافة اختيار إضافي
            </button>
        </div>
    `;
    
    container.appendChild(questionDiv);
    
    const optionsList = questionDiv.querySelector('.options-list');
    addOptionRow(optionsList, 0, questionId);
    addOptionRow(optionsList, 1, questionId);
    
    // إذا تم تفعيل النقاط، أضف مستمع لتحديث القيمة الافتراضية
    if (enablePoints) {
        const basePoints = parseInt(document.getElementById('formBasePoints')?.value) || 0;
        const currentQuestions = document.querySelectorAll('.question-item').length;
        const pointsInput = questionDiv.querySelector('.question-points-input');
        if (pointsInput && basePoints > 0) {
            pointsInput.value = Math.floor(basePoints / currentQuestions);
        }
    }
}
function addOptionRow(container, index, questionId) {
    const optionRow = document.createElement('div');
    optionRow.className = 'option-row';
    optionRow.style.cssText = 'display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap;';
    
    optionRow.innerHTML = `

        <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">

            <span style="font-size:12px;">اختر كإجابة صحيحة</span>

        <button type="button" class="btn btn-sm btn-danger" onclick="this.closest('.option-row').remove()" style="padding:4px 8px;">

        </div>
    `;
    document.body.appendChild(modal);
}

// ========== دالة نافذة اختيار الوجهة - النسخة الصحيحة ==========
function showSendFormDestinationModal(formId) {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    
    // البحث عن الفورم في leaderForms (لأنه مرسل للقائد)
    const leaderForm = appData.leaderForms?.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
    if (!leaderForm) {
        showToast('❌ الفورم غير موجود في قائمة الفورمات المرسلة لك', 'error');
        return;
    }
    
    // جلب بيانات الفورم من leaderForm أو من forms
    const form = leaderForm.formData || appData.forms?.find(f => f.id === formId);
    if (!form) {
        showToast('❌ بيانات الفورم غير موجودة', 'error');
        return;
    }
    
    // جلب الفروع والطلايع المتاحة للقائد (فقط التي يتبعها)
    const mySubBranchIds = currentUser.subBranchIds || [];
    
    // جلب المناطق التي يتبعها القائد
    const myBranchIds = [...new Set(appData.subBranches
        .filter(sb => mySubBranchIds.includes(sb.id))
        .map(sb => sb.branchId)
    )];
    
    // جلب الفروع التي يتبعها القائد فقط
    const mySubBranches = appData.subBranches.filter(sb => mySubBranchIds.includes(sb.id));
    
    // جلب الطلايع التي يتبعها القائد
    const mySquads = appData.squads.filter(s => myBranchIds.includes(s.branchId));
    
    // أنواع الفرق للفلتر
const squadTypes = ['الكشافة', 'المرشدات', 'أشبال وزهرات', 'البراعم'];
    
    // بناء خيارات المناطق
    let branchesOptions = '<option value="">-- اختر المجموعة --</option>';
    myBranchIds.forEach(branchId => {
        const branch = appData.branches.find(b => b.id === branchId);
        if (branch) {
            branchesOptions += `<option value="${branch.id}">🏢 ${branch.name}</option>`;
        }
    });
    
    if (myBranchIds.length === 0) {
        branchesOptions = '<option value="" disabled>⚠️ لا توجد مناطق مسموح لك بها</option>';
    }
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:500px;">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> إرسال الفورم: ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <form id="sendFormDestinationForm">
                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> اختر المجموعة</label>
                    <select id="destinationBranch" required style="width:100%; padding:10px; border-radius:10px;">
                        ${branchesOptions}
                    </select>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-code-branch"></i> اختر الهيئة</label>
                    <select id="destinationSubBranch" required style="width:100%; padding:10px; border-radius:10px;">
                        <option value="">-- اختر المجموعة أولاً --</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-flag"></i> اختر الطليعة</label>
                    <select id="destinationSquad" required style="width:100%; padding:10px; border-radius:10px;">
                        <option value="all">-- جميع الطلايع في هذا الهيئة --</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-users"></i> اختر نوع الفريق (اختياري)</label>
                    <select id="destinationType" style="width:100%; padding:10px; border-radius:10px;">
                        <option value="all">🎯 جميع المراحل</option>
                        ${squadTypes.map(type => `<option value="${type}">${type === 'الكشافة' ? '⚜️' : type === 'المرشدات' ? '🌸' : type === 'الأشبال' ? '🦁' : type === 'الزهرات' ? '🌺' : '🌱'} ${type}</option>`).join('')}
                    </select>
                </div>
                
                <div class="input-group" id="selectedMembersCount" style="background:#e8f5e9; padding:10px; border-radius:10px; text-align:center;">
                    <i class="fas fa-info-circle"></i> سيتم الإرسال إلى <span id="membersCount">0</span> عضو
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> إرسال
                    </button>
                </div>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    // العناصر
    const branchSelect = document.getElementById('destinationBranch');
    const subBranchSelect = document.getElementById('destinationSubBranch');
    const squadSelect = document.getElementById('destinationSquad');
    const typeSelect = document.getElementById('destinationType');
    const membersCountSpan = document.getElementById('membersCount');
    
    // تحديث قائمة الفروع عند تغيير المنطقة
    function updateSubBranches() {
        const branchId = parseInt(branchSelect.value);
        if (branchId) {
            const mySubBranchesFiltered = mySubBranches.filter(sb => sb.branchId === branchId);
            subBranchSelect.innerHTML = '<option value="">-- اختر الهيئة --</option>' +
                mySubBranchesFiltered.map(sb => `<option value="${sb.id}">📍 ${sb.name}</option>`).join('');
            squadSelect.innerHTML = '<option value="all">-- جميع الطلايع في هذا الهيئة --</option>';
        } else {
            subBranchSelect.innerHTML = '<option value="">-- اختر المجموعة أولاً --</option>';
            squadSelect.innerHTML = '<option value="all">-- اختر الهيئة أولاً --</option>';
        }
        updateMembersCount();
    }
    
    // تحديث قائمة الطلايع عند تغيير الفرع
    function updateSquads() {
        const subBranchId = parseInt(subBranchSelect.value);
        if (subBranchId) {
            const selectedSubBranch = mySubBranches.find(sb => sb.id === subBranchId);
            if (selectedSubBranch) {
                const squads = mySquads.filter(s => s.branchId === selectedSubBranch.branchId);
                squadSelect.innerHTML = '<option value="all">-- جميع الطلايع في هذا الهيئة --</option>' +
                    squads.map(s => `<option value="${s.id}">🏴 ${s.name} (${s.type || 'كشافة'})</option>`).join('');
            }
        }
        updateMembersCount();
    }
    
    // تحديث عدد الأعضاء المستهدفين
    function updateMembersCount() {
        const branchId = parseInt(branchSelect.value);
        const subBranchId = parseInt(subBranchSelect.value);
        const squadId = squadSelect.value;
        const typeFilter = typeSelect.value;
        
        let targetMembers = [];
        
        if (branchId && subBranchId && squadId === 'all') {
            targetMembers = appData.members.filter(m => m.subBranchId === subBranchId);
        } else if (branchId && subBranchId && squadId !== 'all') {
            targetMembers = appData.members.filter(m => m.squadId == squadId);
        }
        
        // فلتر حسب النوع
        if (typeFilter !== 'all') {
            const squadIdsOfType = appData.squads
                .filter(s => s.type === typeFilter)
                .map(s => s.id);
            targetMembers = targetMembers.filter(m => squadIdsOfType.includes(m.squadId));
        }
        
        // فلتر: عدم إرسال لمن أجاب بالفعل
        const alreadySent = (appData.memberForms || []).filter(mf => mf.formId === formId).map(mf => mf.memberId);
        targetMembers = targetMembers.filter(m => !alreadySent.includes(m.id));
        
        membersCountSpan.textContent = targetMembers.length;
        membersCountSpan.style.fontWeight = 'bold';
        membersCountSpan.style.color = targetMembers.length > 0 ? '#2ecc71' : '#e74c3c';
    }
    
    // ربط الأحداث
    branchSelect.addEventListener('change', () => {
        updateSubBranches();
    });
    
    subBranchSelect.addEventListener('change', () => {
        updateSquads();
    });
    
    squadSelect.addEventListener('change', () => {
        updateMembersCount();
    });
    
    typeSelect.addEventListener('change', () => {
        updateMembersCount();
    });
    
    // تحديث أولي
    updateSubBranches();
    
    // معالجة الإرسال
    document.getElementById('sendFormDestinationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const branchId = parseInt(branchSelect.value);
        const subBranchId = parseInt(subBranchSelect.value);
        const squadId = squadSelect.value;
        const typeFilter = typeSelect.value;
        
        if (!branchId || !subBranchId) {
            showToast('الرجاء اختيار المجموعة الهيئة', 'error');
            return;
        }
        
        // تحديد الأعضاء المستهدفين
        let targetMembers = [];
        
        if (squadId === 'all') {
            targetMembers = appData.members.filter(m => m.subBranchId === subBranchId);
        } else {
            targetMembers = appData.members.filter(m => m.squadId == squadId);
        }
        
        // فلتر حسب النوع
        if (typeFilter !== 'all') {
            const squadIdsOfType = appData.squads
                .filter(s => s.type === typeFilter)
                .map(s => s.id);
            targetMembers = targetMembers.filter(m => squadIdsOfType.includes(m.squadId));
        }
        
        // فلتر: عدم إرسال لمن أجاب بالفعل
        const alreadySent = (appData.memberForms || []).filter(mf => mf.formId === formId).map(mf => mf.memberId);
        targetMembers = targetMembers.filter(m => !alreadySent.includes(m.id));
        
        if (targetMembers.length === 0) {
            showToast('⚠️ لا يوجد أعضاء مستهدفين للإرسال', 'error');
            return;
        }
        
        // تحديث leaderForm بأنه تم الإرسال
        const leaderFormData = appData.leaderForms?.find(lf => lf.formId === formId && lf.leaderId === currentUser.id);
        if (leaderFormData) {
            leaderFormData.sentToMembers = true;
            leaderFormData.sentToMembersAt = new Date().toISOString();
        }
        
        // إنشاء نسخ من الفورم لكل عضو
        if (!appData.memberForms) appData.memberForms = [];
        
        targetMembers.forEach(member => {
            appData.memberForms.push({
                id: Date.now() + Math.random(),
                formId: formId,
                memberId: member.id,
                leaderId: currentUser.id,
                sentAt: new Date().toISOString(),
                isAnswered: false,
                answers: [],
                formData: form
            });
        });
        
        await saveAllDataToFirebase();
        showToast(`✅ تم إرسال الفورم "${form.title}" إلى ${targetMembers.length} عضو`);
        modal.remove();
        
        // تحديث صفحة الفورمات للقائد
        if (typeof renderLeaderFormsPage === 'function') {
            renderLeaderFormsPage();
        }
    });
}

// ==================== 4. دوال الفورم للأعضاء ====================

function renderMemberFormsPage() {
    const container = document.getElementById('memberPageContent');
    if (!container) return;
    
    const memberForms = (appData.memberForms || []).filter(mf => mf.memberId === currentUser.id);
    const pendingForms = memberForms.filter(mf => !mf.isAnswered);
    const completedForms = memberForms.filter(mf => mf.isAnswered);
    
    container.innerHTML = `
        <div class="card">
            <h3><i class="fas fa-file-alt"></i> الفورمات المستلمة</h3>
            
            ${pendingForms.length > 0 ? `
                <h4 style="color:#d4a017; margin:15px 0 10px;">📋 بانتظار الإجابة</h4>
                ${pendingForms.map(mf => {
                    const form = appData.forms?.find(f => f.id === mf.formId);
                    if (!form) return '';
                    return `
                        <div style="background:#fff3cd; border-radius:15px; padding:15px; margin-bottom:15px; border-right:4px solid #f39c12;">
                            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                                <div>
                                    <strong>${escapeHtml(form.title)}</strong>
                                    <br>
                                    <small>تاريخ الاستلام: ${new Date(mf.sentAt).toLocaleString('ar-EG')}</small>
                                </div>
                                <button class="btn btn-primary" onclick="answerMemberForm(${mf.formId})" style="margin-top:10px;">
                                    <i class="fas fa-edit"></i> الإجابة
                                </button>
                            </div>
                        </div>
                    `;
                }).join('')}
            ` : ''}
            
            ${completedForms.length > 0 ? `
                <h4 style="color:#2ecc71; margin:15px 0 10px;">✅ تم الإجابة عليها</h4>
                ${completedForms.map(mf => {
                    const form = appData.forms?.find(f => f.id === mf.formId);
                    if (!form) return '';
                    return `
                        <div style="background:#e8f5e9; border-radius:15px; padding:15px; margin-bottom:15px; border-right:4px solid #2ecc71;">
                            <div>
                                <strong>${escapeHtml(form.title)}</strong>
                                <br>
                                <small>تمت الإجابة: ${new Date(mf.answeredAt).toLocaleString('ar-EG')}</small>
                                ${mf.score !== undefined ? `<br><small>النتيجة: ${mf.score}%</small>` : ''}
                            </div>
                        </div>
                    `;
                }).join('')}
            ` : ''}
            
            ${pendingForms.length === 0 && completedForms.length === 0 ? 
                '<p style="text-align:center; color:#999;">لا توجد فورمات مستلمة بعد</p>' : ''}
        </div>
    `;
}

function answerMemberForm(formId) {
    const memberForm = appData.memberForms?.find(mf => mf.formId === formId && mf.memberId === currentUser.id);
    if (!memberForm || memberForm.isAnswered) {
        showToast('لا يمكن الإجابة على هذا الفورم', 'error');
        return;
    }
    
    const form = appData.forms?.find(f => f.id === formId);
    if (!form) return;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    
    let questionsHtml = '';
    form.questions?.forEach((q, idx) => {
        questionsHtml += `
            <div class="question-answer-item" data-q-idx="${idx}" style="background:#f8f9fa; border-radius:12px; padding:15px; margin-bottom:15px;">
                <p><strong>${idx + 1}. ${escapeHtml(q.text)}</strong></p>
                ${form.enablePoints ? `<small style="color:#d4a017;">🎯 ${q.points || 0} نقطة</small><br>` : ''}
                <div class="options-answer" style="margin-top:10px; margin-right:20px;">
                    ${q.options.map((opt, optIdx) => `
                        <label style="display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer;">
                            <input type="radio" name="q_${idx}" value="${escapeHtml(opt.text)}" class="answer-radio">
                            <span>${escapeHtml(opt.text)}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `;
    });
    
    modal.innerHTML = `
        <div class="modal-content" style="max-width:650px; max-height:85vh; overflow-y:auto;">
            <div class="modal-header">
                <h3><i class="fas fa-file-alt"></i> ${escapeHtml(form.title)}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <p>يرجى الإجابة على الأسئلة التالية:</p>
            <form id="answerForm">
                ${questionsHtml}
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
                    <button type="button" class="btn btn-secondary" onclick="this.closest('.modal').remove()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">إرسال الإجابات</button>
                </div>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('answerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const answers = [];
        let totalEarnedPoints = 0;
        
        for (let idx = 0; idx < form.questions.length; idx++) {
            const q = form.questions[idx];
            const selectedRadio = document.querySelector(`input[name="q_${idx}"]:checked`);
            
            if (!selectedRadio) {
                showToast(`الرجاء الإجابة على السؤال ${idx + 1}`, 'error');
                return;
            }
            
            const isCorrect = q.correctAnswer === selectedRadio.value;
            const earnedPoints = (form.enablePoints && isCorrect) ? (q.points || 0) : 0;
            
            if (isCorrect && form.enablePoints) {
                totalEarnedPoints += earnedPoints;
            }
            
            answers.push({
                questionId: q.id,
                questionText: q.text,
                answer: selectedRadio.value,
                isCorrect: isCorrect,
                earnedPoints: earnedPoints
            });
        }
        
        // حساب النسبة المئوية
        const totalPossiblePoints = form.enablePoints ? form.totalPoints : 0;
        const score = totalPossiblePoints > 0 ? (totalEarnedPoints / totalPossiblePoints) * 100 : 0;
        
        memberForm.isAnswered = true;
        memberForm.answeredAt = new Date().toISOString();
        memberForm.answers = answers;
        memberForm.score = score;
        memberForm.earnedPoints = totalEarnedPoints;
        
        // إضافة النقاط للعضو
        if (form.enablePoints && totalEarnedPoints > 0) {
            currentUser.points = (currentUser.points || 0) + totalEarnedPoints;
            showToast(`🎉 أحسنت! حصلت على ${totalEarnedPoints} نقطة`, 'success');
        } else if (form.enablePoints && totalEarnedPoints === 0) {
            showToast(`📝 لم تحصل على نقاط هذه المرة، حاول مرة أخرى`, 'info');
        }
        
        await saveAllDataToFirebase();
        showToast('✅ تم إرسال إجاباتك بنجاح');
        modal.remove();
        renderMemberFormsPage();
        if (typeof renderMemberDashboard === 'function') renderMemberDashboard();
    });
}

// دالة تحديث فلتر المجموعة (تظهر الهيئات والمراحل المتاحة)
function updateLeaderboardBranchFilter() {
    const branchSelect = document.getElementById('branchFilterLeaderboard');
    const subBranchSelect = document.getElementById('subBranchFilterLeaderboard');
    const typeSelect = document.getElementById('typeFilterLeaderboard');
    
    currentBranchFilterLeaderboard = branchSelect.value;
    
    if (currentBranchFilterLeaderboard === 'all') {
        // إذا تم اختيار جميع المجموعات
        // تفعيل فلتر الهيئة مع جميع الهيئات
        subBranchSelect.disabled = false;
        let allSubBranchesHtml = '<option value="all">🌍 جميع الهيئات</option>';
        appData.subBranches.forEach(sb => {
            allSubBranchesHtml += `<option value="${sb.id}">📍 ${sb.name}</option>`;
        });
        subBranchSelect.innerHTML = allSubBranchesHtml;
        
        // تفعيل فلتر المرحلة مع جميع المراحل الموجودة
        typeSelect.disabled = false;
        const allStages = [...new Set(appData.squads.map(s => s.type).filter(t => t))];
        const stageNames = {
            'الكشافة': '⚜️ الكشافة',
            'المرشدات': '🌸 المرشدات',
            'أشبال وزهرات': '🦁🌸 أشبال وزهرات',
            'البراعم': '🌱 البراعم'
        };
        let allTypesHtml = '<option value="all">🎯 جميع المراحل</option>';
        allStages.forEach(stage => {
            allTypesHtml += `<option value="${stage}">${stageNames[stage] || stage}</option>`;
        });
        typeSelect.innerHTML = allTypesHtml;
        
    } else {
        // إذا تم اختيار مجموعة محددة
        const branchId = parseInt(currentBranchFilterLeaderboard);
        
        // جلب الهيئات التابعة لهذه المجموعة فقط
        const subBranchesInBranch = appData.subBranches.filter(sb => sb.branchId === branchId);
        
        if (subBranchesInBranch.length > 0) {
            subBranchSelect.disabled = false;
            let subBranchesHtml = '<option value="all">🌍 جميع الهيئات</option>';
            subBranchesInBranch.forEach(sb => {
                subBranchesHtml += `<option value="${sb.id}">📍 ${sb.name}</option>`;
            });
            subBranchSelect.innerHTML = subBranchesHtml;
        } else {
            subBranchSelect.disabled = true;
            subBranchSelect.innerHTML = '<option value="all">🌍 لا توجد هيئات</option>';
        }
        
        // جلب المراحل الموجودة في هذه المجموعة فقط
        const stagesInBranch = [...new Set(
            appData.squads
                .filter(s => s.branchId === branchId && s.type)
                .map(s => s.type)
        )];
        
        if (stagesInBranch.length > 0) {
            typeSelect.disabled = false;
            const stageNames = {
                'الكشافة': '⚜️ الكشافة',
                'المرشدات': '🌸 المرشدات',
                'أشبال وزهرات': '🦁🌸 أشبال وزهرات',
                'البراعم': '🌱 البراعم'
            };
            let typesHtml = '<option value="all">🎯 جميع المراحل</option>';
            stagesInBranch.forEach(stage => {
                typesHtml += `<option value="${stage}">${stageNames[stage] || stage}</option>`;
            });
            typeSelect.innerHTML = typesHtml;
        } else {
            typeSelect.disabled = true;
            typeSelect.innerHTML = '<option value="all">🎯 لا توجد مراحل</option>';
        }
    }
    
    // إعادة تعيين فلتر الهيئة والمرحلة إلى "الكل"
    currentSubBranchFilterLeaderboard = 'all';
    currentTypeFilterLeaderboard = 'all';
    subBranchSelect.value = 'all';
    typeSelect.value = 'all';
    
    // تحديث البيانات
    updateLeaderboardData();
}

// دالة تحديث بيانات الجدول بناءً على الفلاتر
function updateLeaderboardData() {
    const subBranchSelect = document.getElementById('subBranchFilterLeaderboard');
    const typeSelect = document.getElementById('typeFilterLeaderboard');
    
    if (subBranchSelect) {
        currentSubBranchFilterLeaderboard = subBranchSelect.value;
    }
    if (typeSelect) {
        currentTypeFilterLeaderboard = typeSelect.value;
    }
    
    renderLeaderboardWithFilters();
}

// دالة عرض الجدول مع تطبيق الفلاتر
function renderLeaderboardWithFilters() {
    const container = document.getElementById('leaderboardTableContainer');
    if (!container) return;
    
    let filteredMembers = [...appData.members]; // <-- إزالة فلتر isActive
    
    if (currentBranchFilterLeaderboard !== 'all') {
        const branchId = parseInt(currentBranchFilterLeaderboard);
        filteredMembers = filteredMembers.filter(m => m.branchId === branchId);
    }
    
    if (currentSubBranchFilterLeaderboard !== 'all') {
        const subBranchId = parseInt(currentSubBranchFilterLeaderboard);
        filteredMembers = filteredMembers.filter(m => m.subBranchId === subBranchId);
    }
    
    if (currentTypeFilterLeaderboard !== 'all') {
        let squadIdsOfType = [];
        if (currentBranchFilterLeaderboard !== 'all') {
            const branchId = parseInt(currentBranchFilterLeaderboard);
            squadIdsOfType = appData.squads.filter(s => s.type === currentTypeFilterLeaderboard && s.branchId === branchId).map(s => s.id);
        } else {
            squadIdsOfType = appData.squads.filter(s => s.type === currentTypeFilterLeaderboard).map(s => s.id);
        }
        filteredMembers = filteredMembers.filter(m => squadIdsOfType.includes(m.squadId));
    }
    
    filteredMembers.sort((a, b) => b.points - a.points);
    
    if (filteredMembers.length === 0) {
        container.innerHTML = '<div class="no-data"><i class="fas fa-info-circle"></i> لا توجد بيانات لعرضها</div>';
        return;
    }
    
    let tableHtml = `
        <div class="leaderboard-table-wrapper">
            <table class="leaderboard-table">
                <thead><tr><th>#</th><th>الاسم</th><th>المجموعة / الهيئة</th><th>الرتبة</th><th><i class="fas fa-star"></i> النقاط</th></tr></thead>
                <tbody>
    `;
    
    filteredMembers.forEach((member, index) => {
        const rank = index + 1;
        let rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
        let rankDisplay = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
        
        const branch = appData.branches.find(b => b.id === member.branchId);
        const subBranch = appData.subBranches.find(sb => sb.id === member.subBranchId);
        let locationText = (branch && subBranch) ? `${branch.name} - ${subBranch.name}` : (branch?.name || subBranch?.name || '-');
        
        tableHtml += `
            <tr>
                <td class="rank-cell"><span class="rank-medal ${rankClass}">${rankDisplay}</span></td>
                <td><strong>${escapeHtml(member.name)}</strong></td>
                <td>${escapeHtml(locationText)}</td>
                <td><span class="badge" style="background: #d4a01720; color: #1a472a;">${member.rank || 'عضو'}</span></td>
                <td><strong style="color: #d4a017; font-size: 18px;">${member.points}</strong></td>
            </tr>
        `;
    });
    
    tableHtml += `</tbody></table></div>`;
    container.innerHTML = tableHtml;
}

// دالة تعديل بيانات القائد
function editLeader(leaderId) {
    const leader = appData.leaders.find(l => l.id === leaderId);
    if (!leader) return;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.style.display = 'flex';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:600px;">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> تعديل بيانات القائد: ${leader.name}</h3>
                <span class="close-modal" onclick="this.closest('.modal').remove()">&times;</span>
            </div>
            <form id="editLeaderForm">
                <div class="input-group"><label>الاسم الكامل</label><input type="text" id="editLeaderName" value="${escapeHtml(leader.name)}" required></div>
                <div class="input-group"><label>السن</label><input type="number" id="editLeaderAge" value="${leader.age}" min="18" max="70" required></div>
                <div class="input-group"><label>رقم الهاتف</label><input type="tel" id="editLeaderPhone" value="${leader.phone}" required></div>
                <div class="input-group"><label>المجموعة</label>
                    <select id="editLeaderBranch" required>
                        <option value="">-- اختر المجموعة --</option>
                        ${appData.branches.map(b => `<option value="${b.id}" ${b.id === leader.branchId ? 'selected' : ''}>${b.name}</option>`).join('')}
                    </select>
                </div>
                <div class="input-group"><label>الهيئات المسؤول عنها (يمكن اختيار أكثر من هيئه)</label>
                    <div id="editLeaderSubBranchesContainer" style="background: #f8f9fa; padding: 12px; border-radius: 12px; max-height: 200px; overflow-y: auto; border: 2px solid #e0e0e0;">
                        ${getSubBranchesCheckboxes(leader.branchId, leader.subBranchIds)}
                    </div>
                </div>
                <div class="input-group"><label>اسم المستخدم</label><input type="text" id="editLeaderUsername" value="${leader.username}" required></div>
                <div class="input-group"><label>كلمة المرور (اتركه فارغاً للحفاظ على نفس كلمة المرور)</label><input type="password" id="editLeaderPassword" placeholder="كلمة مرور جديدة"></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">حفظ التعديلات</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    // عند تغيير المنطقة، نحدث قائمة الفروع
    document.getElementById('editLeaderBranch').addEventListener('change', function() {
        const branchId = parseInt(this.value);
        const container = document.getElementById('editLeaderSubBranchesContainer');
        if (branchId) {
            container.innerHTML = getSubBranchesCheckboxes(branchId, leader.subBranchIds);
        } else {
            container.innerHTML = '<div style="text-align:center; color:#999;">-- اختر المجموعة أولاً --</div>';
        }
    });
    
    document.getElementById('editLeaderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('editLeaderUsername').value;
        if (username !== leader.username) {
            if (appData.leaders.some(l => l.username === username)) {
                showToast('اسم المستخدم موجود مسبقاً', 'error');
                return;
            }
            if (appData.members.some(m => m.username === username)) {
                showToast('اسم المستخدم مستخدم من قبل عضو', 'error');
                return;
            }
        }
        
        // جمع الفروع المختارة
        const selectedSubBranches = [];
        document.querySelectorAll('#editLeaderSubBranchesContainer input[type="checkbox"]:checked').forEach(cb => {
            selectedSubBranches.push({
                id: parseInt(cb.value),
                name: cb.getAttribute('data-name')
            });
        });
        
        if (selectedSubBranches.length === 0) {
            showToast('الرجاء اختيار هيئه واحد على الأقل', 'error');
            return;
        }
        
        // تحديث بيانات القائد
        leader.name = document.getElementById('editLeaderName').value;
        leader.age = parseInt(document.getElementById('editLeaderAge').value);
        leader.phone = document.getElementById('editLeaderPhone').value;
        leader.branchId = parseInt(document.getElementById('editLeaderBranch').value);
        leader.subBranchIds = selectedSubBranches.map(sb => sb.id);
        leader.subBranches = selectedSubBranches;
        leader.username = username;
        const newPassword = document.getElementById('editLeaderPassword').value;
        if (newPassword) leader.password = newPassword;
        
        await saveAllDataToFirebase();
        showToast('تم تحديث بيانات القائد بنجاح');
        modal.remove();
        renderLeadersList();
    });
}

// دالة مساعدة للحصول على checked boxes للفروع
function getSubBranchesCheckboxes(branchId, selectedSubBranchIds) {
    if (!branchId) return '<div style="text-align:center; color:#999;">-- اختر المجموعة أولاً --</div>';
    
    const branches = appData.subBranches.filter(sb => sb.branchId === branchId);
    if (branches.length === 0) {
        return '<div style="text-align:center; color:#999;">لا توجد فروع في هذه المجموعة</div>';
    }
    
    return branches.map(sb => `
        <label style="display: flex; align-items: center; gap: 10px; padding: 8px; margin: 4px 0; background: white; border-radius: 8px; cursor: pointer;">
            <input type="checkbox" class="subBranchCheckbox" value="${sb.id}" data-name="${sb.name}" ${selectedSubBranchIds?.includes(sb.id) ? 'checked' : ''}>
            <span><i class="fas fa-code-branch"></i> ${sb.name}</span>
        </label>
    `).join('');
}

        container.style.bottom = '0';

        container.style.pointerEvents = 'none';
        container.style.zIndex = '0';
        container.style.overflow = 'hidden';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            bubble.style.width = size + 'px';

                };
                isAdmin = true;
                isLeader = false;
                showToast(`مرحباً أيها القائد العام (${username})!`);
                transitionToPage(() => render());
                return;
            }
            
            // التحقق من القادة العاديين
            const leader = appData.leaders.find(l => l.username === username && l.password === password);
            if (leader) {
                currentUser = leader;
                isAdmin = false;
                isLeader = true;
                showToast(`مرحباً أيها القائد ${leader.name}`);
                transitionToPage(() => renderLeaderApp(document.getElementById('app')));
                return;
            }
            
            // التحقق من الأعضاء العاديين
            const member = appData.members.find(m => m.username === username && m.password === password);
            if (member) {
                currentUser = member;
                isAdmin = false;
                isLeader = false;
                showToast(`مرحباً ${member.name}`);
                transitionToPage(() => render());
                return;
            }
            
            showToast('❌ بيانات الدخول غير صحيحة', 'error');
        } catch (error) {
            console.error(error);
            showToast('❌ حدث خطأ في الاتصال بقاعدة البيانات', 'error');
        } finally {
            submitBtn.innerHTML = originalText;

                <div class="input-group"><label>كلمة المرور</label><input type="password" id="reqPassword" required></div>
                <button type="submit" class="btn btn-primary" style="width:100%;">إرسال الطلب</button>
            </form>
        </div>
    `;
    document.body.appendChild(modal);
    
    const branchSelect = document.getElementById('reqBranch');
    const subBranchSelect = document.getElementById('reqSubBranch');
    const leadersContainer = document.getElementById('leadersDisplayContainer');
    const leadersListDisplay = document.getElementById('leadersListDisplay');
    
    branchSelect.addEventListener('change', function() {
        const branchId = parseInt(this.value);
        if (branchId) {
            const branches = appData.subBranches.filter(sb => sb.branchId === branchId);
            subBranchSelect.innerHTML = '<option value="">-- اختر الهيئة --</option>' + 
                branches.map(sb => `<option value="${sb.id}" data-branch-id="${sb.branchId}">${sb.name}</option>`).join('');
            leadersContainer.style.display = 'none';
            leadersListDisplay.innerHTML = '';
        } else {
            subBranchSelect.innerHTML = '<option value="">-- اختر المجموعة أولاً --</option>';
            leadersContainer.style.display = 'none';
        }
    });
    
    subBranchSelect.addEventListener('change', function() {
        const subBranchId = parseInt(this.value);
        if (subBranchId) {
            const responsibleLeaders = appData.leaders.filter(leader => 
                leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
            );
            if (responsibleLeaders.length > 0) {
                const leadersNames = responsibleLeaders.map(leader => `<div style="padding: 5px 0;"><i class="fas fa-user-tie"></i> ${leader.name} (${leader.username})</div>`).join('');
                leadersListDisplay.innerHTML = leadersNames;
                leadersContainer.style.display = 'block';
            } else {
                leadersListDisplay.innerHTML = '<div style="color: #e74c3c;"><i class="fas fa-exclamation-triangle"></i> لا يوجد قادة مسؤولون عن هذه الهيئة حالياً</div>';

        } else {
            leadersContainer.style.display = 'none';
        }
    });
    
    document.getElementById('joinRequestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('reqUsername').value;
        if (appData.members.some(m => m.username === username)) {
            showToast('اسم المستخدم موجود مسبقاً لدى عضو', 'error');
            return;
        }
        if (appData.joinRequests.some(r => r.username === username && r.status === 'pending')) {
            showToast('هذا الاسم موجود في طلب سابق لا يزال قيد المراجعة', 'error');
            return;
        }
        
        const subBranchId = parseInt(document.getElementById('reqSubBranch').value);
        const subBranch = appData.subBranches.find(sb => sb.id === subBranchId);
        const squadType = document.getElementById('reqSquadType').value;
        
        if (!subBranchId || !squadType) {
            showToast('الرجاء اختيار الهيئة والمرحلة', 'error');
            return;
        }
        
        const availableSquad = appData.squads.find(s => 
            s.branchId === subBranch.branchId && 
            s.type === squadType && 
            s.isOpen === true
        );
        
        if (!availableSquad) {
            showToast('⚠️ لا توجد طليعة متاحة من هذا النوع في هذه الهيئة حالياً', 'error');
            return;
        }
        
        const responsibleLeaders = appData.leaders.filter(leader => 
            leader.subBranchIds && leader.subBranchIds.includes(subBranchId)
        );
        const leadersNames = responsibleLeaders.map(l => l.name).join('، ');
        
        const newRequest = {
            id: Date.now(),
            name: document.getElementById('reqName').value,
            age: null,
            phone: null,
            rank: "عضو",
            branchId: subBranch.branchId,
            subBranchId: subBranchId,
            squadId: availableSquad.id,
            squadType: squadType,
            username: username,
            password: document.getElementById('reqPassword').value,
            status: 'pending',
            requestedAt: new Date().toISOString(),
            code: `KS${String(appData.members.length + 1).padStart(3, '0')}`,
            responsibleLeaders: leadersNames
        };
        
        appData.joinRequests.push(newRequest);
        await saveAllDataToFirebase();
        
        showToast(`✅ تم إرسال طلب الانضمام إلى القادة: ${leadersNames || 'القائد المسؤول'}`);
        modal.remove();
    });
}

function initTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
    } else {
        document.body.classList.remove('light-mode');
    }
    addThemeToggleButton();
}

function addThemeToggleButton() {
    // إزالة الزر القديم إذا وجد
    const oldBtn = document.getElementById('themeToggleBtn');
    if (oldBtn) oldBtn.remove();
    
    // نبحث عن الهيدر العلوي
    const header = document.querySelector('.header');
    if (!header) return;
    
    // نبحث عن user-info (القسم الذي يحتوي على اسم المستخدم والأزرار)
    let userInfoDiv = header.querySelector('.user-info');
    
    if (!userInfoDiv) {
        // إذا لم نجد user-info، ننشئه
        userInfoDiv = document.createElement('div');
        userInfoDiv.className = 'user-info';
        userInfoDiv.style.display = 'flex';
        userInfoDiv.style.alignItems = 'center';
        userInfoDiv.style.gap = '10px';
        userInfoDiv.style.backgroundColor = 'rgba(0,0,0,0.05)';
        userInfoDiv.style.padding = '5px 15px';
        userInfoDiv.style.borderRadius = '40px';
        header.appendChild(userInfoDiv);
    }
    
    // ننشئ زر تغيير الوضع
    const themeBtn = document.createElement('div');
    themeBtn.id = 'themeToggleBtn';
    themeBtn.style.display = 'inline-flex';
    themeBtn.style.alignItems = 'center';
    themeBtn.style.justifyContent = 'center';
    themeBtn.style.width = '38px';
    themeBtn.style.height = '38px';
    themeBtn.style.borderRadius = '50%';
    themeBtn.style.backgroundColor = 'white';
    themeBtn.style.cursor = 'pointer';
    themeBtn.style.border = '1px solid #d4a017';
    themeBtn.style.transition = 'all 0.3s ease';
    
    const isLight = document.body.classList.contains('light-mode');
    themeBtn.innerHTML = `<i class="fas ${isLight ? 'fa-sun' : 'fa-moon'}" style="font-size: 18px; color: #d4a017;"></i>`;
    
    // وظيفة الضغط على الزر
    themeBtn.onclick = (e) => {
        e.stopPropagation();
        if (document.body.classList.contains('light-mode')) {
            document.body.classList.remove('light-mode');
            localStorage.setItem('theme', 'dark');
            themeBtn.innerHTML = '<i class="fas fa-moon" style="font-size: 18px; color: #d4a017;"></i>';
        } else {
            document.body.classList.add('light-mode');
            localStorage.setItem('theme', 'light');
            themeBtn.innerHTML = '<i class="fas fa-sun" style="font-size: 18px; color: #d4a017;"></i>';
        }
    };
    
    // البحث عن زر المنزل
    const homeBtn = document.getElementById('homeBtnWrapper');
    
    if (homeBtn) {
        // نضيف زر الوضع قبل زر المنزل مباشرة (بجانبه)
        userInfoDiv.insertBefore(themeBtn, homeBtn);
    } else {
        // إذا لم نجد زر المنزل، نضيفه في نهاية user-info
        userInfoDiv.appendChild(themeBtn);
    }
}

function updateLandingStats() {
    const membersCount = document.getElementById('statMembers');
    const squadsCount = document.getElementById('statSquads');
    const tasksCount = document.getElementById('statTasks');
    const pointsCount = document.getElementById('statPoints');
    
    if (membersCount) animateNumber(membersCount, 0, appData.members.length, 2000);
    if (squadsCount) animateNumber(squadsCount, 0, appData.squads.length, 2000);
    if (tasksCount) animateNumber(tasksCount, 0, appData.taskSubmissions.filter(ts => ts.status === 'completed').length, 2000);
    if (pointsCount) animateNumber(pointsCount, 0, appData.members.reduce((sum, m) => sum + m.points, 0), 2000);
}

function animateNumber(element, start, end, duration) {
    let startTime = null;
    const step = (timestamp) => {
        if (!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime) / duration, 1);
        element.textContent = Math.floor(progress * (end - start) + start);
        if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
}

async function approveJoinRequest(requestId) {
    const request = appData.joinRequests.find(r => r.id === requestId);
    if (!request) return;
    
    const newMember = {
        id: Date.now(),
        code: request.code,
        name: request.name,
        age: request.age,
        rank: request.rank,
        username: request.username,
        password: request.password,
        phone: request.phone,
        branchId: request.branchId,
        squadId: request.squadId,
        squadType: request.squadType || 'الكشافة',  // حفظ نوع الطليعة مع العضو
        points: 0,
        joinedAt: new Date().toISOString()
    };
    
    appData.members.push(newMember);
    appData.joinRequests = appData.joinRequests.filter(r => r.id !== requestId);
    
    await saveAllDataToFirebase();
    document.querySelectorAll('.modal').forEach(m => m.remove());
    showToast(`✅ تم قبول ${request.name} وأضيف إلى الطليعة بنجاح`);
    
    if (isAdmin && document.getElementById('adminPageContent')) {
        renderMembersTable();
        renderAdminDashboard();
    }
}

async function rejectJoinRequest(requestId) {
    const request = appData.joinRequests.find(r => r.id === requestId);
    if (!request) return;
    
    appData.joinRequests = appData.joinRequests.filter(r => r.id !== requestId);
    await saveAllDataToFirebase();
    document.querySelectorAll('.modal').forEach(m => m.remove());
    showToast(`❌ تم رفض طلب ${request.name}`);
    
    if (isAdmin && document.getElementById('adminPageContent')) {
        renderMembersTable();

    }
}

    // الحصول على القيمة المختارة من localStorage أو استخدام 'all'

    // عرض القائمة بناءً على الاختيار
    displayRankingList(selectedSquad);
}
// دالة عرض قائمة الترتيب
function displayRankingList(selectedSquadId) {
    const listContainer = document.getElementById('squadRankingList');
    if (!listContainer) return;
    
    if (selectedSquadId === 'all') {
        // أفضل 5 أعضاء من كل الطلايع
        const allMembers = [...appData.members];
        allMembers.sort((a, b) => b.points - a.points);
        const topMembers = allMembers.slice(0, 5);
        
        if (topMembers.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center;">لا يوجد أعضاء حالياً</p>';
            return;
        }
        
        let html = '<div style="margin-bottom:15px; text-align:center;"><span class="badge badge-active">🏆 أفضل 5 أعضاء على مستوى الكشافة</span></div>';
        
        topMembers.forEach((member, idx) => {

// دالة عرض التكاليف النشطة مع عداد تنازلي (بالأيام والساعات والدقائق والثواني)
function renderActiveTasksCard() {
    const container = document.getElementById('activeTasksContainer');
    if (!container) return;
    
    const now = new Date();
    const activeTasks = appData.tasks.filter(task => {
        if (!task.endDate) return false;
        return new Date(task.endDate) > now;
    });
    
    if (activeTasks.length === 0) {
        container.innerHTML = '<p style="text-align:center;">🎉 لا توجد تكاليف نشطة حالياً</p>';
        return;
    }
    
    const tasksHtml = activeTasks.map(task => {
        const squad = appData.squads.find(s => s.id === task.squadId);
        const endDate = new Date(task.endDate);
        const timeRemaining = endDate - now;
        
        let countdownText = '';
        let isExpired = false;
        
        if (timeRemaining > 0) {
            const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeRemaining % (86400000)) / (3600000));
            const minutes = Math.floor((timeRemaining % 3600000) / 60000);
            const seconds = Math.floor((timeRemaining % 60000) / 1000);
            countdownText = `${days} يوم ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية`;
        } else {
            countdownText = 'انتهى الوقت';
            isExpired = true;
        }
        
        return `
            <div class="task-item" style="${isExpired ? 'opacity: 0.6; background: #f0f0f0;' : ''}">
                <div class="task-header">
                    <span class="task-title">${escapeHtml(task.title)}</span>
                    <span class="task-points">${task.pointsValue} نقطة</span>
                </div>
                <div class="task-description">${escapeHtml(task.description)}</div>
                <div class="task-meta">
                    <i class="fas fa-flag"></i> ${squad?.name || '-'} | 
                    <i class="fas fa-calendar-alt"></i> بدأ: ${new Date(task.startDate).toLocaleString('ar-EG')} | 
                    <i class="fas fa-calendar-times"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}
                </div>
                <div class="task-countdown" style="margin-top: 10px; padding: 8px; background: ${isExpired ? '#e74c3c20' : '#d4a01720'}; border-radius: 10px;">
                    <i class="fas ${isExpired ? 'fa-hourglass-end' : 'fa-hourglass-half'}"></i>
                    <strong>${isExpired ? '⏰ انتهى الموعد النهائي' : '⏳ الوقت المتبقي: ' + countdownText}</strong>
                </div>
            </div>
        `;
    }).join('');
    
    container.innerHTML = `
        <div style="margin-bottom: 15px;">
            <span class="badge badge-active"><i class="fas fa-play-circle"></i> التكاليف النشطة: ${activeTasks.length}</span>
        </div>
        ${tasksHtml}
    `;
}


// تحديث العدادات كل ثانية

function startCountdownUpdater() {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        if (document.getElementById('activeTasksContainer')) {
            renderActiveTasksCard();
        }
        // فقط نحدث الأرقام دون إعادة رسم الأزرار
        const selectedSquad = localStorage.getItem('selectedSquad') || 'all';
        displayRankingList(selectedSquad);
    }, 1000);
}

// إيقاف تحديث العدادات
function stopCountdownUpdater() {
    if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
    }
}

    subBranchSelect.addEventListener('change', function() {

        const selectedBranchId = parseInt(branchSelect.value);
        const selectedStage = stageSelect.value;

// حذف قائد
async function deleteLeader(leaderId) {
    const leader = appData.leaders.find(l => l.id === leaderId);
    if (!leader) return;
    
    // التحقق من وجود طلايع مرتبطة بهذا القائد
    const relatedSquads = appData.squads.filter(s => s.leadersIds && s.leadersIds.includes(leaderId));
    
    let confirmMessage = `هل أنت متأكد من حذف القائد "${leader.name}"؟`;
    if (relatedSquads.length > 0) {
        confirmMessage += `\n\n⚠️ تحذير: هذا القائد مسؤول عن ${relatedSquads.length} طليعة. سيتم إزالة اسمه من هذه الطلايع.`;
    }
    
    if (confirm(confirmMessage)) {
        // إزالة القائد من الطلايع المرتبطة به
        for (const squad of relatedSquads) {
            if (squad.leadersIds) {
                squad.leadersIds = squad.leadersIds.filter(id => id !== leaderId);
            }
            if (squad.leadersNames) {
                const leadersNamesList = squad.leadersNames.split('، ');
                const updatedNames = leadersNamesList.filter(name => name !== leader.name);
                squad.leadersNames = updatedNames.join('، ');
            }
        }
        
        // حذف القائد
        appData.leaders = appData.leaders.filter(l => l.id !== leaderId);
        await saveAllDataToFirebase();
        
        renderLeadersList();
        renderAdminSquads(); // تحديث قائمة الطلايع
        showToast(`✅ تم حذف القائد ${leader.name}`);
    }
}

    const leader = appData.leaders.find(l => l.username === username && l.password === password);

// تغيير صفحات القائد
function changeLeaderPage(page) {
    document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
    document.querySelector(`.sidebar-menu li[data-page="${page}"]`)?.classList.add('active');
    
    if (page === 'dashboard') renderLeaderDashboard();
    else if (page === 'members') renderLeaderMembers();
    else if (page === 'joinRequests') renderLeaderJoinRequests();
    else if (page === 'tasks') renderLeaderTasks();
    else if (page === 'forms') renderLeaderFormsPage();
    else if (page === 'evaluationForms') renderLeaderEvaluationFormsPage();
    else if (page === 'pointsEvaluation') renderPointsEvaluationPage();  // أضف هذا السطر
    else if (page === 'community') renderLeaderCommunity();
    closeSidebar();
}
// ==================== LEADER FUNCTIONS (تعريف مبكر) ====================

function renderLeaderDashboard() {
    const leader = currentUser;
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    const myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    const now = new Date();
    const activeTasks = appData.tasks.filter(t => mySquadIds.includes(t.squadId) && new Date(t.endDate) > now);
    const pendingJoinRequests = appData.joinRequests.filter(r => mySquadIds.includes(r.squadId) && r.status === 'pending');
    
    const container = document.getElementById('leaderPageContent');
    if (!container) return;
    
    container.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><div class="number">${myMembers.length}</div><div class="label">الأعضاء</div></div>
            <div class="stat-card"><i class="fas fa-flag-checkered"></i><div class="number">${mySquads.length}</div><div class="label">الطلايع</div></div>
            <div class="stat-card"><i class="fas fa-tasks"></i><div class="number">${activeTasks.length}</div><div class="label">تكاليف نشطة</div></div>
            <div class="stat-card" style="cursor:pointer;" onclick="changeLeaderPage('joinRequests')"><i class="fas fa-user-plus"></i><div class="number" style="color:${pendingJoinRequests.length > 0 ? '#e74c3c' : '#2ecc71'};">${pendingJoinRequests.length}</div><div class="label">طلبات انضمام</div></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-trophy"></i> ترتيب الأعضاء</h3>
            <div class="squad-filter" style="margin-bottom: 15px;">
                <select id="leaderRankingFilter" onchange="updateLeaderRankingList()" style="width:100%; padding:10px; border-radius:30px;">
                    <option value="all">🏆 جميع الطلائع (أفضل 5 أعضاء)</option>
                    ${mySquads.map(s => `<option value="${s.id}">🏴 ${s.name} (جميع الأعضاء)</option>`).join('')}
                </select>
            </div>
            <div id="leaderRankingList"></div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-hourglass-half"></i> التكاليف النشطة</h3>
            <div id="leaderActiveTasksList"></div>
        </div>
    `;
    
    updateLeaderRankingList();
    
    if (activeTasks.length === 0) {
        const tasksContainer = document.getElementById('leaderActiveTasksList');
        if (tasksContainer) tasksContainer.innerHTML = '<p style="text-align:center;">🎉 لا توجد تكاليف نشطة حالياً</p>';
    } else {
        const tasksHtml = activeTasks.map(task => {
            const squad = appData.squads.find(s => s.id === task.squadId);
            const endDate = new Date(task.endDate);
            const timeRemaining = endDate - now;
            let countdownText = timeRemaining > 0 ? `${Math.floor(timeRemaining / (1000*60*60*24))} يوم ${Math.floor((timeRemaining % 86400000) / 3600000)} ساعة` : 'انتهى الوقت';
            return `<div class="task-item"><div class="task-header"><span class="task-title">${escapeHtml(task.title)}</span><span class="task-points">${task.pointsValue} نقطة</span></div><div class="task-description">${escapeHtml(task.description)}</div><div class="task-meta"><i class="fas fa-flag"></i> ${squad?.name || '-'} | <i class="fas fa-calendar"></i> ينتهي: ${endDate.toLocaleString('ar-EG')}</div><div class="task-countdown" style="margin-top:8px; padding:6px; background:#d4a01720; border-radius:8px;"><i class="fas fa-hourglass-half"></i> الوقت المتبقي: ${countdownText}</div></div>`;
        }).join('');
        const tasksContainer = document.getElementById('leaderActiveTasksList');
        if (tasksContainer) tasksContainer.innerHTML = tasksHtml;
    }
}

function updateLeaderRankingList() {
    const leader = currentUser;
    const filterValue = document.getElementById('leaderRankingFilter')?.value || 'all';
    const mySubBranchIds = leader.subBranchIds || [];
    const mySquads = appData.squads.filter(s => mySubBranchIds.includes(s.subBranchId));
    const mySquadIds = mySquads.map(s => s.id);
    let myMembers = appData.members.filter(m => mySquadIds.includes(m.squadId));
    myMembers.sort((a, b) => b.points - a.points);
    
    const listContainer = document.getElementById('leaderRankingList');
    if (!listContainer) return;
    
    if (filterValue === 'all') {
        const topMembers = myMembers.slice(0, 5);
        if (topMembers.length === 0) { listContainer.innerHTML = '<p style="text-align:center;">لا يوجد أعضاء</p>'; return; }
        const rankingHtml = topMembers.map((member, idx) => {
            const squad = appData.squads.find(s => s.id === member.squadId);
            const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '📌';
            return `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;"><div style="display:flex; align-items:center; gap:10px;"><span style="font-size:22px;">${medal}</span><div><strong>${escapeHtml(member.name)}</strong><br><small style="color:#666;">${squad?.name || '-'} | ${member.rank}</small></div></div><div><strong style="color:#1a472a;">${member.points}</strong> نقطة</div></div>`;
        }).join('');
        listContainer.innerHTML = `<div style="margin-bottom:15px; text-align:center;"><span class="badge badge-active">🏆 أفضل 5 أعضاء</span></div>${rankingHtml}`;
    } else {
        const squadMembers = myMembers.filter(m => m.squadId == filterValue);
        if (squadMembers.length === 0) { listContainer.innerHTML = '<p style="text-align:center;">لا يوجد أعضاء في هذه الطليعة</p>'; return; }
        const squad = appData.squads.find(s => s.id == filterValue);
        const rankingHtml = squadMembers.map((member, idx) => `<div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee;"><div style="display:flex; align-items:center; gap:10px;"><span style="background:${idx === 0 ? '#d4a017' : idx === 1 ? '#c0c0c0' : idx === 2 ? '#cd7f32' : '#666'}; color:white; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${idx+1}</span><div><strong>${escapeHtml(member.name)}</strong><br><small>${member.rank} | ${member.points} نقطة</small></div></div><div><strong style="color:#1a472a;">${member.points}</strong> نقطة</div></div>`).join('');
        listContainer.innerHTML = `<div style="margin-bottom:15px; text-align:center;"><h4 style="color:#1a472a;">🏴 ${squad?.name || ''}</h4><span class="badge badge-active">إجمالي الأعضاء: ${squadMembers.length}</span></div>${rankingHtml}`;
    }
}

let leaderCountdownInterval = null;

function startLeaderCountdownUpdater() {
    if (leaderCountdownInterval) clearInterval(leaderCountdownInterval);
    leaderCountdownInterval = setInterval(() => {
        if (document.getElementById('leaderPageContent') && currentUser && isLeader) {
            renderLeaderDashboard();
        }
    }, 60000); // تحديث كل دقيقة
}

function stopLeaderCountdownUpdater() {
    if (leaderCountdownInterval) {
        clearInterval(leaderCountdownInterval);
        leaderCountdownInterval = null;
    }
}
